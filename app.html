async function actualizarLotesGravedad(){
  const finca = document.getElementById('gravFinca').value;
  const sel = document.getElementById('gravLote');
  if(!finca){
    sel.innerHTML = '<option value="">Primero elige finca</option>';
    return;
  }
  sel.innerHTML = '<option value="">Cargando lotes...</option>';

  const { data: lotes, error } = await sb.from('maestro_plantios')
    .select('lote')
    .eq('descripcion_finca', finca)
    .order('lote');

  if(error){
    sel.innerHTML = '<option value="">Error cargando lotes</option>';
    toast('Error: ' + error.message, 'error');
    return;
  }

  const lotesUnicos = [...new Set((lotes || []).map(p => p.lote))].filter(l => l != null);
  if(lotesUnicos.length === 0){
    sel.innerHTML = '<option value="">No hay lotes</option>';
    return;
  }
  sel.innerHTML = `<option value="">Seleccionar lote...</option>` +
    lotesUnicos.map(l => `<option value="${l}">Lote ${l}</option>`).join('');
}

async function guardarRiegoGravedad(){
  const btn = document.getElementById('btnGrav');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca       = document.getElementById('gravFinca').value;
    const loteRaw     = document.getElementById('gravLote').value;
    const fechaIni    = document.getElementById('gravFechaIni').value;
    const fechaFin    = document.getElementById('gravFechaFin').value;
    const horaIni     = document.getElementById('gravHoraIni').value || null;
    const horaFin     = document.getElementById('gravHoraFin').value || null;
    const haRaw       = document.getElementById('gravHa').value;
    const personalRaw = document.getElementById('gravPersonal').value;
    const tiempoRaw   = document.getElementById('gravTiempoAgua').value;
    const obs         = document.getElementById('gravObs').value.trim() || null;
    const prog        = window.__gravedadProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)    throw new Error('Selecciona una finca');
    if(!loteRaw)  throw new Error('Selecciona un lote');
    if(!fechaIni) throw new Error('Indica la fecha de inicio');

    const lote = parseInt(loteRaw);
    const haRegadas = haRaw === '' ? null : parseFloat(haRaw);
    const personal = personalRaw === '' ? null : parseInt(personalRaw);
    const tiempoAgua = tiempoRaw === '' ? null : parseFloat(tiempoRaw);

    if(haRegadas !== null && (isNaN(haRegadas) || haRegadas < 0))
      throw new Error('HA regadas debe ser un número válido');
    if(personal !== null && (isNaN(personal) || personal < 0))
      throw new Error('Personal debe ser un número válido');
    if(tiempoAgua !== null && (isNaN(tiempoAgua) || tiempoAgua < 0))
      throw new Error('Tiempo de agua debe ser un número válido');

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote,
      fecha_inicio: fechaIni,
      fecha_fin: fechaFin || fechaIni,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      personal,
      ha_regadas: haRegadas,
      tiempo_agua_lote: tiempoAgua,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    const { error: e1 } = await sb.from('avc_riego_gravedad').insert(payload);
    if(e1) throw new Error(e1.message);

    if(esProgramada){
      const updates = {
        estado: 'completada',
        ha_real: haRegadas,
        personal_real: personal,
        observacion_real: obs,
        cerrado_por: usuario.email,
        cerrado_en: new Date().toISOString()
      };
      const { error: e2 } = await sb.from('avc_programacion')
        .update(updates)
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Riego registrado y tarea completada' : 'Riego registrado correctamente');
    closeModal();
    window.__gravedadProgramacion = null;
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar registro';
  }
}


/* ============================================================

// Caches de catálogos
let tiposDrenajeCache = null;
let maquinariaDrenajeCache = null;
let actividadesDrenajeCache = null;

async function cargarCatalogosDrenaje(){
  if(tiposDrenajeCache && maquinariaDrenajeCache && actividadesDrenajeCache) return;
  const [tipos, maq, acts] = await Promise.all([
    sb.from('pm_tipos_drenaje').select('id, codigo, nombre, es_mecanizado').eq('activo', true).order('codigo'),
    sb.from('pm_tipos_maquinaria_drenaje').select('id, codigo, nombre').eq('activa', true).order('codigo'),
    sb.from('pm_actividades_drenaje').select('id, codigo, nombre').eq('activa', true).order('codigo')
  ]);
  tiposDrenajeCache = tipos.data || [];
  maquinariaDrenajeCache = maq.data || [];
  actividadesDrenajeCache = acts.data || [];
}

async function abrirCapturaDrenajes(programacion){
  const esProgramada = !!programacion;
  window.__drenajeProgramacion = programacion || null;

  await cargarCatalogosDrenaje();
  if(tiposDrenajeCache.length === 0){
    toast('No hay tipos de drenaje configurados. Pide al admin que los cargue.', 'error');
    return;
  }

  // Resolver finca/lote desde la programación
  let preFinca = '';
  let preLote = '';
  let preFincaDescripcion = '';

    const fLote = programacion.finca_lote;
    const reg = plantios.find(p => p.finca_lote === fLote);

      preFincaDescripcion = reg.descripcion_finca;
      preFinca = reg.descripcion_finca;
    } else {
      const { data } = await sb.from('maestro_plantios')
        .select('descripcion_finca, lote')
        .eq('finca_lote', fLote)
        .maybeSingle();

        preFincaDescripcion = data.descripcion_finca;
        preFinca = data.descripcion_finca;
        preLote = data.lote;

    if(!preLote){

      preLote = m ? parseInt(m[0]) : '';

  const fincasUnicas = [...new Set(plantios.map(p => p.descripcion_finca))]

  // Sugerir tipo de drenaje según el código de actividad (si es programada)
  let tipoSugeridoCodigo = null;
  if(esProgramada){
    const cod = programacion.codigo_actividad;
    if(cod === 10611 || cod === 12102 || cod === 12202) tipoSugeridoCodigo = 'DRENAJE_MANUAL';
    else if(cod === 10612 || cod === 12103 || cod === 12203) tipoSugeridoCodigo = 'DRENAJE_MECANIZADO';
    else if(cod === 10613 || cod === 12104 || cod === 12204) tipoSugeridoCodigo = 'MANTENIMIENTO_MECANIZADO';

      <div style="font-size:13px;color:#185FA5;margin-top:4px">
        <strong>${preFincaDescripcion || programacion.finca_lote}</strong> · Lote ${preLote}
      </div>
      <div style="font-size:11px;color:#185FA5;margin-top:2px">${actNombre(programacion.codigo_actividad)}</div>
      ${programacion.horas_estimadas ? `<div style="font-size:12px;color:#185FA5;margin-top:2px"><i class="ti ti-clock"></i> ${programacion.horas_estimadas} horas estimadas de duración</div>` : ''}
      ${programacion.observacion_plan ? `<div style="font-size:11px;color:#185FA5;margin-top:4px;font-style:italic">Nota del jefe: "${programacion.observacion_plan}"</div>` : ''}
    </div>
  ` : `
    <div style="background:#FBF5E6;border-left:3px solid #BA7517;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em">Captura libre</div>
      <div style="font-size:12px;color:#A06410;margin-top:2px">Registro espontáneo, fuera del plan diario</div>
    </div>
  `;

  const bloqueFincaLote = esProgramada ? `
    <div class="field">
      <label>Finca</label>
      <input type="text" value="${preFincaDescripcion || programacion.finca_lote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <div class="field">
      <label>Lote</label>
      <input type="text" value="Lote ${preLote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <input type="hidden" id="drnFinca" value="${preFinca}"/>
    <input type="hidden" id="drnLote" value="${preLote}"/>
  ` : `
    <div class="field">
      <label>Finca</label>
      <select id="drnFinca" onchange="actualizarLotesDrenaje()">
        <option value="">Seleccionar...</option>
        ${fincasUnicas.map(f => `<option value="${f}">${f}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Lote</label>
      <select id="drnLote"><option value="">Primero elige finca</option></select>
    </div>
  `;

  // Tipos de drenaje (4 opciones en grilla 2x2)
  const tipoButtons = tiposDrenajeCache.map(t => {
    const sugerido = tipoSugeridoCodigo === t.codigo;
    return `<button type="button" class="tipo-drn-btn" data-tipo-id="${t.id}" data-codigo="${t.codigo}" data-mec="${t.es_mecanizado ? '1' : '0'}"
              onclick="seleccionarTipoDrenaje(${t.id})"
              style="padding:11px 8px;border:1.5px solid ${sugerido?'#1D9E75':'#D1D5DB'};background:${sugerido?'#E8F5EE':'white'};color:${sugerido?'#0F5530':'#374151'};border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;text-align:center">

            </button>`;
  }).join('');

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Drenaje</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. ${esProgramada ? programacion.codigo_actividad : 'libre'}</div>
    ${contextoBanner}
    ${bloqueFincaLote}

    <div class="field">
      <label>Fecha</label>
      <input type="date" id="drnFecha" value="${hoyISO()}"/>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hora inicio</label>
        <input type="time" id="drnHoraIni"/>
      </div>
      <div class="field">
        <label>Hora fin</label>
        <input type="time" id="drnHoraFin"/>
      </div>
    </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">

      </div>
    </div>

    <div class="field">
      <label>Actividad de drenaje</label>
      <select id="drnActividad">
        <option value="">Seleccionar actividad...</option>
        ${actividadesDrenajeCache.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <label>Metros de avance</label>
      <input type="number" step="0.01" id="drnMetros" placeholder="0.00"/>
    </div>

    <!-- BLOQUE MECANIZADO (oculto por defecto) -->
    <div id="drnBloqueMec" style="display:none;background:#F9FAFB;border-radius:8px;padding:12px;margin-bottom:14px;border:1px dashed #D1D5DB">
      <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em">
        <i class="ti ti-tractor"></i> Detalles de maquinaria
      </div>

      <div class="field">
        <label>Maquinaria</label>
        <select id="drnMaquinaria">
          <option value="">Seleccionar...</option>
          ${maquinariaDrenajeCache.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('')}
        </select>
      </div>

      <div class="field">
        <label>Propio / Alquilado</label>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button type="button" class="propalq-btn" data-val="propio" onclick="seleccionarPropAlq('propio')"
                  style="flex:1;padding:9px;border:1.5px solid #D1D5DB;background:white;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
            Propio
          </button>
          <button type="button" class="propalq-btn" data-val="alquilado" onclick="seleccionarPropAlq('alquilado')"

      </div>

        <div class="field">
          <label>Horómetro inicio</label>
          <input type="number" step="0.01" id="drnHorIni" placeholder="0.00"/>
        </div>
        <div class="field">
          <label>Horómetro fin</label>
          <input type="number" step="0.01" id="drnHorFin" placeholder="0.00"/>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Observaciones</label>
      <textarea id="drnObs" placeholder="Detalles, incidencias..."></textarea>
    </div>

    <button class="btn btn-primary" id="btnDrn" onclick="guardarDrenaje()">
      <i class="ti ti-device-floppy"></i> Guardar drenaje
    </button>
  `;

  window.__drnTipoId = null;
  window.__drnEsMec = false;
  window.__drnPropAlq = null;

  showModal();

  // Si hay tipo sugerido, auto-seleccionarlo
  if(tipoSugeridoCodigo){

    if(sugerido) seleccionarTipoDrenaje(sugerido.id);

async function actualizarLotesDrenaje(){
  const finca = document.getElementById('drnFinca').value;
  const sel = document.getElementById('drnLote');
  if(!finca){
    sel.innerHTML = '<option value="">Primero elige finca</option>';
    return;
  }
  sel.innerHTML = '<option value="">Cargando lotes...</option>';

  const { data: lotes, error } = await sb.from('maestro_plantios')
    .select('lote')
    .eq('descripcion_finca', finca)
    .order('lote');

  if(error){
    sel.innerHTML = '<option value="">Error</option>';
    toast('Error: ' + error.message, 'error');
    return;
  }

  const lotesUnicos = [...new Set((lotes || []).map(p => p.lote))].filter(l => l != null);
  if(lotesUnicos.length === 0){
    sel.innerHTML = '<option value="">No hay lotes</option>';
    return;
  }
  sel.innerHTML = `<option value="">Seleccionar lote...</option>` +
    lotesUnicos.map(l => `<option value="${l}">Lote ${l}</option>`).join('');
}

function seleccionarTipoDrenaje(tipoId){
  window.__drnTipoId = tipoId;
  const tipo = tiposDrenajeCache.find(t => t.id === tipoId);
  window.__drnEsMec = !!(tipo && tipo.es_mecanizado);

  // Resaltar el botón seleccionado
  document.querySelectorAll('.tipo-drn-btn').forEach(b => {
    const sel = parseInt(b.dataset.tipoId) === tipoId;
    b.style.borderColor = sel ? '#1D9E75' : '#D1D5DB';
    b.style.background = sel ? '#E8F5EE' : 'white';
    b.style.color = sel ? '#0F5530' : '#374151';
    b.style.boxShadow = sel ? '0 0 0 3px rgba(29,158,117,0.18)' : 'none';
  });

  // Mostrar / ocultar bloque de maquinaria
  const bloqueMec = document.getElementById('drnBloqueMec');
  if(bloqueMec){
    bloqueMec.style.display = window.__drnEsMec ? 'block' : 'none';
  }
}

function seleccionarPropAlq(val){
  window.__drnPropAlq = val;
  document.querySelectorAll('.propalq-btn').forEach(b => {
    const sel = b.dataset.val === val;
    b.style.borderColor = sel ? '#1D9E75' : '#D1D5DB';
    b.style.background = sel ? '#E8F5EE' : 'white';
    b.style.color = sel ? '#0F5530' : '#374151';
    b.style.fontWeight = sel ? '600' : '500';
  });
}

async function guardarDrenaje(){
  const btn = document.getElementById('btnDrn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca       = document.getElementById('drnFinca').value;
    const loteRaw     = document.getElementById('drnLote').value;
    const fecha       = document.getElementById('drnFecha').value;
    const horaIni     = document.getElementById('drnHoraIni').value || null;
    const horaFin     = document.getElementById('drnHoraFin').value || null;
    const actId       = document.getElementById('drnActividad').value;
    const metrosRaw   = document.getElementById('drnMetros').value;
    const obs         = document.getElementById('drnObs').value.trim() || null;
    const tipoId      = window.__drnTipoId;
    const esMec       = window.__drnEsMec;
    const prog        = window.__drenajeProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)   throw new Error('Selecciona una finca');
    if(!loteRaw) throw new Error('Selecciona un lote');
    if(!fecha)   throw new Error('Indica la fecha');
    if(!tipoId)  throw new Error('Selecciona el tipo de drenaje');

    const lote = parseInt(loteRaw);
    const metros = metrosRaw === '' ? null : parseFloat(metrosRaw);
    if(metros !== null && (isNaN(metros) || metros < 0))
      throw new Error('Metros de avance debe ser un número válido');

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote,
      fecha,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      tipo_drenaje_id: tipoId,
      metros_avance: metros,
      actividad_drenaje_id: actId ? parseInt(actId) : null,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    if(esMec){
      const maqId = document.getElementById('drnMaquinaria').value;
      const horIniRaw = document.getElementById('drnHorIni').value;
      const horFinRaw = document.getElementById('drnHorFin').value;
      if(!maqId)             throw new Error('Selecciona la maquinaria');
      if(!window.__drnPropAlq) throw new Error('Indica si es propia o alquilada');
      payload.tipo_maquinaria_id = parseInt(maqId);
      payload.propio_alquilado = window.__drnPropAlq;
      payload.horometro_ini = horIniRaw === '' ? null : parseFloat(horIniRaw);
      payload.horometro_fin = horFinRaw === '' ? null : parseFloat(horFinRaw);
    }

    const { error: e1 } = await sb.from('avc_riego_drenajes').insert(payload);
    if(e1) throw new Error(e1.message);

    if(esProgramada){
      const { error: e2 } = await sb.from('avc_programacion')
        .update({
          estado: 'completada',
          observacion_real: obs,
          cerrado_por: usuario.email,
          cerrado_en: new Date().toISOString()
        })
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Drenaje registrado y tarea completada' : 'Drenaje registrado correctamente');
    closeModal();
    window.__drenajeProgramacion = null;
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar drenaje';
  }
}

async function guardarRiegoPivote(){
  const btn = document.getElementById('btnPvt');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca       = document.getElementById('pvtFinca').value;
    const loteRaw     = document.getElementById('pvtLote').value;
    const fechaIni    = document.getElementById('pvtFechaIni').value;
    const fechaFin    = document.getElementById('pvtFechaFin').value;
    const horaIni     = document.getElementById('pvtHoraIni').value || null;
    const horaFin     = document.getElementById('pvtHoraFin').value || null;
    const bomba       = document.getElementById('pvtBomba').value || null;
    const horIniRaw   = document.getElementById('pvtHorIni').value;
    const horFinRaw   = document.getElementById('pvtHorFin').value;
    const vueltasRaw  = document.getElementById('pvtVueltas').value;
    const haRaw       = document.getElementById('pvtHa').value;
    const obs         = document.getElementById('pvtObs').value.trim() || null;
    const tipoOp      = window.__pvtTipoOp;
    const tam         = window.__pvtTam;
    const pct         = window.__pvtPct;
    const prog        = window.__pivoteProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)    throw new Error('Selecciona una finca');
    if(!loteRaw)  throw new Error('Selecciona un lote');
    if(!fechaIni) throw new Error('Indica la fecha de inicio');
    if(!tipoOp)   throw new Error('Indica el tipo de operación (pivote / rebombeo)');
    if(!tam)      throw new Error('Indica el tamaño del pivote');

    const lote = parseInt(loteRaw);
    const horIni = horIniRaw === '' ? null : parseFloat(horIniRaw);
    const horFin = horFinRaw === '' ? null : parseFloat(horFinRaw);
    const vueltas = vueltasRaw === '' ? null : parseFloat(vueltasRaw);
    const ha = haRaw === '' ? null : parseFloat(haRaw);

    if(horIni !== null && (isNaN(horIni) || horIni < 0))
      throw new Error('Horómetro inicio inválido');
    if(horFin !== null && (isNaN(horFin) || horFin < 0))
      throw new Error('Horómetro fin inválido');
    if(vueltas !== null && (isNaN(vueltas) || vueltas < 0))
      throw new Error('Número de vueltas inválido');
    if(ha !== null && (isNaN(ha) || ha < 0))
      throw new Error('HA regadas inválido');

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote,
      fecha_inicio: fechaIni,
      fecha_fin: fechaFin || fechaIni,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      codigo_bomba: bomba,
      tipo_pivote_op: tipoOp,
      tipo_pivote_tam: tam,
      horometro_ini: horIni,
      horometro_fin: horFin,
      numero_vueltas: vueltas,
      pct_trabajo: pct,
      ha_regadas: ha,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    const { error: e1 } = await sb.from('avc_riego_pivote').insert(payload);
    if(e1) throw new Error(e1.message);

    if(esProgramada){
      const updates = {
        estado: 'completada',
        ha_real: ha,
        observacion_real: obs,
        cerrado_por: usuario.email,
        cerrado_en: new Date().toISOString()
      };
      const { error: e2 } = await sb.from('avc_programacion')
        .update(updates)
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Pivote registrado y tarea completada' : 'Pivote registrado correctamente');
    closeModal();
    window.__pivoteProgramacion = null;
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar registro';
  }
}

let bombasAspersionCache = null;

async function cargarBombasAspersion(){
  if(bombasAspersionCache) return bombasAspersionCache;
  const { data, error } = await sb.from('pm_bombas')
    .select('codigo, nombre, energia')
    .eq('aplica_aspersion', true)
    .eq('activa', true)
    .order('codigo');
  if(error){ console.error('Error cargando bombas aspersion:', error); return []; }
  bombasAspersionCache = data || [];
  return bombasAspersionCache;
}

async function cargarCausasTiempoPerdido(){
  if(causasTiempoPerdidoCache) return causasTiempoPerdidoCache;
  const { data, error } = await sb.from('pm_causas_tiempo_perdido')
    .select('id, codigo, nombre, aplica_aspersion')
    .eq('activa', true)
    .eq('aplica_aspersion', true)
    .order('nombre');
  if(error){ console.error('Error cargando causas:', error); return []; }
  causasTiempoPerdidoCache = data || [];
  return causasTiempoPerdidoCache;
}

function seleccionarEnergiaAsp(val){
  window.__aspEnergia = val;
  document.querySelectorAll('.asp-en-btn').forEach(b => {

    b.style.borderColor = sel ? '#1D9E75' : '#D1D5DB';

function calcularCumplimientoAsp(){
  // % cumplimiento = (horas reales / horas programadas) * 100 (si lo definimos así)
  // O alternativamente: (ha_regadas / ha_plan) * 100
  // Usamos HA porque es más estándar
  const haRaw = document.getElementById('aspHa').value;
  const prog = window.__aspProgramacion;
  const haPlan = prog && prog.ha_plan ? parseFloat(prog.ha_plan) : null;
  const ha = parseFloat(haRaw);
  const lbl = document.getElementById('aspPctCump');
  if(!isNaN(ha) && haPlan && haPlan > 0){
    const pct = (ha / haPlan) * 100;
    lbl.value = pct.toFixed(1) + '%';
  } else {
    lbl.value = '—';
  }
}

function quitarTiempoPerdidoAsp(idx){
  // Marcar como nulo (lo filtramos al guardar)
  window.__aspTiemposPerdidos[idx] = null;

  if(el) el.remove();

  const algunoVivo = window.__aspTiemposPerdidos.some(t => t !== null);
  if(!algunoVivo){

async function guardarRiegoAspersion(){
  const btn = document.getElementById('btnAsp');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca       = document.getElementById('aspFinca').value;
    const loteRaw     = document.getElementById('aspLote').value;
    const fechaIni    = document.getElementById('aspFechaIni').value;
    const fechaFin    = document.getElementById('aspFechaFin').value;
    const horaIni     = document.getElementById('aspHoraIni').value || null;
    const horaFin     = document.getElementById('aspHoraFin').value || null;
    const haRaw       = document.getElementById('aspHa').value;
    const personasRaw = document.getElementById('aspPersonas').value;
    const bomba       = document.getElementById('aspBomba').value || null;
    const horIniRaw   = document.getElementById('aspHorIni').value;
    const horFinRaw   = document.getElementById('aspHorFin').value;
    const horasProgRaw= document.getElementById('aspHorasProg').value;
    const pctCumpStr  = document.getElementById('aspPctCump').value;
    const numRiegoRaw = document.getElementById('aspNumRiego').value;
    const numCambRaw  = document.getElementById('aspNumCambios').value;
    const numAspRaw   = document.getElementById('aspNumAsp').value;
    const rpmRaw      = document.getElementById('aspRpm').value;
    const obs         = document.getElementById('aspObs').value.trim() || null;
    const energia     = window.__aspEnergia;
    const prog        = window.__aspProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)    throw new Error('Selecciona una finca');
    if(!loteRaw)  throw new Error('Selecciona un lote');
    if(!fechaIni) throw new Error('Indica la fecha de inicio');

    const lote = parseInt(loteRaw);
    const ha = haRaw === '' ? null : parseFloat(haRaw);
    const personas = personasRaw === '' ? null : parseInt(personasRaw);
    const horIni = horIniRaw === '' ? null : parseFloat(horIniRaw);
    const horFin = horFinRaw === '' ? null : parseFloat(horFinRaw);
    const horasProg = horasProgRaw === '' ? null : parseFloat(horasProgRaw);
    const numRiego = numRiegoRaw === '' ? null : parseInt(numRiegoRaw);
    const numCamb = numCambRaw === '' ? null : parseInt(numCambRaw);
    const numAsp = numAspRaw === '' ? null : parseInt(numAspRaw);
    const rpm = rpmRaw === '' ? null : parseFloat(rpmRaw);

    let pctCump = null;
    if(pctCumpStr && pctCumpStr !== '—'){
      pctCump = parseFloat(pctCumpStr.replace('%',''));
      if(isNaN(pctCump)) pctCump = null;
    }

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote,
      fecha_inicio: fechaIni,
      fecha_fin: fechaFin || fechaIni,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      ha_regadas: ha,
      codigo_bomba: bomba,
      energia,
      horometro_ini: horIni,
      horometro_fin: horFin,
      horas_programadas: horasProg,
      pct_cumplimiento: pctCump,
      numero_riego: numRiego,
      numero_cambios: numCamb,
      numero_aspersores: numAsp,
      rpm,
      cant_personas: personas,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    // 1) Insertar el riego principal y recuperar el id
    const { data: insertados, error: e1 } = await sb.from('avc_riego_aspersion')
      .insert(payload)
      .select('id')
      .single();
    if(e1) throw new Error(e1.message);
    const aspersionId = insertados.id;

    // 2) Insertar tiempos perdidos asociados (si hay)
    const tiempos = (window.__aspTiemposPerdidos || [])
      .filter(t => t !== null && t.causa_id && t.minutos != null && t.minutos > 0)
      .map(t => ({
        tipo_riego: 'aspersion',
        riego_id: aspersionId,
        causa_id: t.causa_id,
        minutos: t.minutos,
        observaciones: t.observaciones || null
      }));
    if(tiempos.length > 0){
      const { error: eTp } = await sb.from('avc_riego_tiempo_perdido').insert(tiempos);
      if(eTp) console.warn('Error guardando tiempos perdidos:', eTp);
    }

    // 3) Si era programada, cerrar la tarea
    if(esProgramada){
      const updates = {
        estado: 'completada',
        ha_real: ha,
        personal_real: personas,
        observacion_real: obs,
        cerrado_por: usuario.email,
        cerrado_en: new Date().toISOString()
      };
      const { error: e2 } = await sb.from('avc_programacion')
        .update(updates)
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Aspersión registrada y tarea completada' : 'Aspersión registrada correctamente');
    closeModal();
    window.__aspProgramacion = null;
    window.__aspTiemposPerdidos = [];
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar registro';
  }
}

async function renderDigitadorRiegosHistorial(){
  // Historial unificado: caudales + gravedad + drenajes + pivote + aspersión
  const [caudR, gravR, drnR, pvtR, aspR] = await Promise.all([
    sb.from('avc_riego_caudales')
      .select('*, pm_fuentes_agua(nombre, tipo, unidad)')
      .eq('registrado_por', usuario.email)
      .order('fecha', { ascending: false })
      .order('hora', { ascending: false })
      .limit(30),
    sb.from('avc_riego_gravedad')
      .select('*')
      .eq('registrado_por', usuario.email)
      .order('fecha_inicio', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30),
    sb.from('avc_riego_drenajes')
      .select('*, pm_tipos_drenaje(nombre, es_mecanizado), pm_tipos_maquinaria_drenaje(nombre), pm_actividades_drenaje(nombre)')
      .eq('registrado_por', usuario.email)
      .order('fecha', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30),
    sb.from('avc_riego_pivote')
      .select('*')
      .eq('registrado_por', usuario.email)
      .order('fecha_inicio', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30),
    sb.from('avc_riego_aspersion')
      .select('*')
      .eq('registrado_por', usuario.email)
      .order('fecha_inicio', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30)
  ]);

  if(caudR.error || gravR.error || drnR.error || pvtR.error || aspR.error){
    const msg = (caudR.error || gravR.error || drnR.error || pvtR.error || aspR.error).message;
    return `<div class="empty"><i class="ti ti-alert-triangle"></i>Error: ${msg}</div>`;
  }

  // Normalizar a un formato común para ordenar por fecha
  const items = [];

  (caudR.data || []).forEach(r => {
    const f = r.pm_fuentes_agua || {};
    const unidadLabel = (r.unidad === 'metros_cubicos') ? 'm³' : 'gal/min';
    const tipoLabel = f.tipo === 'rio' ? 'Río' : f.tipo === 'canal' ? 'Canal' : f.tipo === 'laguna' ? 'Laguna' : '';
    items.push({
      sortDate: r.fecha + ' ' + (r.hora || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('caudales', ${r.id})">
        <div class="reg-head">
          <span class="badge">Caudal · ${tipoLabel}</span>
          <span class="reg-fecha">${fmtFecha(r.fecha)}${r.hora ? ' · '+r.hora.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${f.nombre || '—'}</div>
        <div class="reg-meta"><strong>${r.valor_medido}</strong> ${unidadLabel}</div>
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  (gravR.data || []).forEach(r => {
    items.push({
      sortDate: r.fecha_inicio + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('gravedad', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#E6F1FB;color:#0C447C">Gravedad</span>
          <span class="reg-fecha">${fmtFecha(r.fecha_inicio)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${r.finca} · Lote ${r.lote}</div>
        <div class="reg-meta">${r.ha_regadas != null ? `<strong>${r.ha_regadas}</strong> ha · ` : ''}${r.personal != null ? `${r.personal} personas` : ''}${r.tiempo_agua_lote != null ? ` · ${r.tiempo_agua_lote} h de agua` : ''}</div>
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  (drnR.data || []).forEach(r => {
    const tipo = r.pm_tipos_drenaje || {};
    const maq = r.pm_tipos_maquinaria_drenaje || {};
    const act = r.pm_actividades_drenaje || {};
    const detalleMec = (tipo.es_mecanizado && maq.nombre)
      ? ` · ${maq.nombre} (${r.propio_alquilado || '—'})`
      : '';
    items.push({
      sortDate: r.fecha + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('drenajes', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#FBF1E0;color:#8A4B07">Drenaje</span>
          <span class="reg-fecha">${fmtFecha(r.fecha)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${r.finca} · Lote ${r.lote}</div>
        <div class="reg-meta">${tipo.nombre || ''}${detalleMec}${r.metros_avance != null ? ` · <strong>${r.metros_avance}</strong> mts` : ''}</div>

      </div>`
    });
  });

  (pvtR.data || []).forEach(r => {
    const tamLabel = r.tipo_pivote_tam === 'pequeno' ? 'Pequeño' :
                     r.tipo_pivote_tam === 'mediano' ? 'Mediano' :
                     r.tipo_pivote_tam === 'grande'  ? 'Grande' : '';
    const opLabel = r.tipo_pivote_op === 'pivote' ? 'Pivote' :
                    r.tipo_pivote_op === 'rebombeo' ? 'Rebombeo' : '';
    items.push({
      sortDate: r.fecha_inicio + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('pivote', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#EDE5F8;color:#5B279C">Pivote</span>
          <span class="reg-fecha">${fmtFecha(r.fecha_inicio)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${r.finca} · Lote ${r.lote}</div>
        <div class="reg-meta">
          ${opLabel}${tamLabel ? ' · '+tamLabel : ''}${r.codigo_bomba ? ' · Bomba '+r.codigo_bomba : ''}
          ${r.ha_regadas != null ? ` · <strong>${r.ha_regadas}</strong> ha` : ''}

        ${r.numero_vueltas != null ? `<div style="font-size:11px;color:#6b7280;margin-top:2px">${r.numero_vueltas} vueltas</div>` : ''}
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  (aspR.data || []).forEach(r => {
    items.push({
      sortDate: r.fecha_inicio + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('aspersion', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#DBEAFE;color:#1E40AF">Aspersión</span>
          <span class="reg-fecha">${fmtFecha(r.fecha_inicio)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${r.finca} · Lote ${r.lote}</div>
        <div class="reg-meta">
          ${r.ha_regadas != null ? `<strong>${r.ha_regadas}</strong> ha` : ''}
          ${r.codigo_bomba ? ` · Bomba ${r.codigo_bomba}` : ''}
          ${r.energia ? ` · ${r.energia}` : ''}
          ${r.pct_cumplimiento != null ? ` · ${r.pct_cumplimiento}% cumpl.` : ''}
        </div>
        ${r.numero_aspersores != null || r.numero_cambios != null ? `<div style="font-size:11px;color:#6b7280;margin-top:2px">${r.numero_aspersores != null ? r.numero_aspersores+' aspersores' : ''}${r.numero_cambios != null ? (r.numero_aspersores != null ? ' · ' : '')+r.numero_cambios+' cambios' : ''}${r.cant_personas != null ? ' · '+r.cant_personas+' personas' : ''}</div>` : ''}
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  if(items.length === 0){
    return '<div class="empty"><i class="ti ti-file-text"></i>Aún no tienes registros.</div>';
  }

  items.sort((a,b) => b.sortDate.localeCompare(a.sortDate));
  return items.map(i => i.html).join('');
}

async function renderOperadorRiegosTareas(){

  const pend  = (tareas || []).filter(t => t.estado === 'planificado' || t.estado === 'pendiente').length;

    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${compl}</div></div>
      <div class="stat"><div class="stat-lbl">Pend.</div><div class="stat-val">${pend}</div></div>
    </div>
  `;

  if(total === 0){
    html += `<div class="empty"><i class="ti ti-calendar-off"></i>Sin tareas asignadas hoy. Puedes registrar un riego espontáneo desde "Captura libre".</div>`;
    return html;
  }

  tareas.forEach(t => {
    const ico = iconoActividad(t.codigo_actividad);
    const prio = t.prioridad === 'alta' ? '<span class="badge b-prio-alta">ALTA</span>' :
                 t.prioridad === 'baja' ? '<span class="badge b-prio-baja">BAJA</span>' : '';
    let metaTxt = '';
    if(t.estado === 'planificado' || t.estado === 'pendiente'){
      metaTxt = `Pendiente de registro`;
    } else if(t.estado === 'completada' || t.estado === 'modificada'){
      metaTxt = `Completada`;
    } else {
      metaTxt = t.estado;
    }
    const turnoTxt = t.turno ? ` · TURNO ${t.turno}` : '';
    html += `<div class="tarea-card estado-${t.estado}" onclick="abrirTareaOperadorRiegos(${t.id})">
      <div class="tarea-head">
        <div class="tarea-left">
          <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
          <div class="tarea-info">
            ${t.hora_programada ? `<div class="tarea-hora">${t.hora_programada}</div>` : ''}
            <div class="tarea-title">${actNombre(t.codigo_actividad)}${turnoTxt}</div>
          </div>
        </div>
        <div class="tarea-tags">${badge(t.estado)}${prio}</div>
      </div>
      <div class="tarea-sub">${t.finca_lote || '—'}</div>
      <div class="tarea-meta">${metaTxt}</div>
    </div>`;
  });

  return html;
}

async function abrirTareaOperadorRiegos(progId){
  const { data: t, error } = await sb.from('avc_programacion')
    .select('*').eq('id', progId).maybeSingle();
  if(error || !t){
    toast('No se pudo cargar la tarea', 'error');
    return;
  }

  if(t.estado === 'completada' || t.estado === 'modificada'){
    toast('Esta tarea ya fue completada', 'info');
    return;
  }

  const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
  if(!act){
    toast('Actividad no encontrada en catálogo', 'error');
    return;
  }

  if(act.requiere_detalle === 'avc_riego_goteo'){
    return abrirCapturaGoteo(t);
  }
  if(act.requiere_detalle === 'avc_riego_reparacion_goteo'){
    return abrirCapturaReparacionGoteo(t);
  }
  toast('Tipo de actividad no manejado: ' + (act.requiere_detalle || 'sin tabla detalle'), 'error');
}

// Caches
let bombasGoteoCache = null;
let tiposRiegoGoteoCache = null;
let fincasEstacionCache = null;  // fincas de la estación del operador

async function cargarBombasGoteo(){
  if(bombasGoteoCache) return bombasGoteoCache;
  const { data, error } = await sb.from('pm_bombas')
    .select('codigo, nombre, energia, estacion_id')
    .eq('aplica_goteo', true)
    .eq('activa', true)
    .order('codigo');
  // Como no hay bombas marcadas con aplica_goteo=true por defecto,
  // este resultado va a venir vacío. El operador puede dejar bomba en blanco
  // o el admin puede después marcar bombas como aplica_goteo.
  bombasGoteoCache = (error ? [] : (data || []));
  return bombasGoteoCache;
}

async function cargarTiposRiegoGoteo(){
  if(tiposRiegoGoteoCache) return tiposRiegoGoteoCache;
  const { data, error } = await sb.from('pm_tipos_riego_goteo')
    .select('id, codigo, nombre, requiere_producto')
    .eq('activo', true)
    .order('id');
  tiposRiegoGoteoCache = (error ? [] : (data || []));
  return tiposRiegoGoteoCache;
}

async function cargarFincasEstacion(estacionId){
  // Cache por estación
  if(fincasEstacionCache && fincasEstacionCache._estacionId === estacionId)
    return fincasEstacionCache.data;
  const { data, error } = await sb.from('pm_estacion_fincas')
    .select('finca_nombre')
    .eq('estacion_id', estacionId)
    .order('finca_nombre');
  const result = error ? [] : (data || []).map(r => r.finca_nombre);
  fincasEstacionCache = { _estacionId: estacionId, data: result };
  return result;
}

async function abrirCapturaGoteo(programacion){
  const esProgramada = !!programacion;
  window.__goteoProgramacion = programacion || null;
  window.__goteoTiemposPerdidos = [];

  // Determinar la estación del operador
  const estacionId = usuario.estacion_default;
  if(!estacionId){
    toast('Tu usuario no tiene estación asignada. Pide al admin que la configure.', 'error');
    return;
  }

  // Cargar nombre de la estación
  const { data: est } = await sb.from('pm_estaciones_riego')
    .select('id, nombre, codigo').eq('id', estacionId).maybeSingle();
  if(!est){
    toast('Estación no encontrada', 'error');
    return;
  }

  const [bombas, tipos, fincasEst] = await Promise.all([
    cargarBombasGoteo(),
    cargarTiposRiegoGoteo(),
    cargarFincasEstacion(estacionId),
    cargarCausasTiempoPerdido()

  if(fincasEst.length === 0){

    return;

  // Resolver finca/turno desde la programación

  let preTurno = '';

    // finca_lote suele venir como "AGRICASA01" - extraer la parte alfa
    const m = fLote.match(/^([A-ZÁÉÍÓÚÑ\s]+)/i);
    if(m){
      const fincaCandidata = m[1].trim().toUpperCase();

  // Selector de finca (siempre editable - dentro de la estación del operador)
  const fincaSelector = `
    <div class="field">
      <label>Finca</label>
      <select id="gotFinca">

  // Selector de turno (1-6)

    <div class="field">

      </select>
    </div>
  `;

  // Selector de tipo de riego
  const tipoSelector = `
    <div class="field">
      <label>Tipo de riego</label>
      <select id="gotTipo" onchange="onCambioTipoGoteo()">
        <option value="">Seleccionar tipo...</option>
        ${tipos.map(t => `<option value="${t.id}" data-codigo="${t.codigo}" data-prod="${t.requiere_producto ? '1' : '0'}">${t.nombre}</option>`).join('')}
      </select>
    </div>
  `;

  // Selector de bomba (puede estar vacío)
  const bombaOpts = bombas.length > 0
    ? bombas.map(b => `<option value="${b.codigo}" data-energia="${b.energia || ''}">${b.codigo}${b.nombre ? ' · '+b.nombre : ''}</option>`).join('')
    : '';
  const bombaSelector = bombas.length > 0 ? `
    <div class="field">
      <label>Bomba</label>
      <select id="gotBomba" onchange="actualizarEnergiaGoteo()">
        <option value="">Seleccionar bomba...</option>
        ${bombaOpts}
      </select>
    </div>
  ` : `
    <div class="field">
      <label>Bomba</label>
      <input type="text" id="gotBomba" placeholder="Código de bomba (opcional)"/>
      <div class="field-help" style="font-size:11px;color:#6b7280;margin-top:4px">No hay bombas configuradas para goteo. Pide al admin que las marque.</div>
    </div>
  `;

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Riego por goteo</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. ${esProgramada ? programacion.codigo_actividad : '10701'}</div>
    ${contextoBanner}

    ${fincaSelector}
    ${turnoSelector}

    <div class="field-row">
      <div class="field">
        <label>Fecha inicio</label>
        <input type="date" id="gotFechaIni" value="${hoyISO()}"/>
      </div>
      <div class="field">
        <label>Fecha fin</label>
        <input type="date" id="gotFechaFin" value="${hoyISO()}"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hora inicio</label>
        <input type="time" id="gotHoraIni"/>
      </div>
      <div class="field">
        <label>Hora fin</label>
        <input type="time" id="gotHoraFin"/>
      </div>
    </div>

    ${tipoSelector}

    <!-- Producto aplicado (oculto por defecto, aparece si tipo = OTRAS_APLICACIONES) -->
    <div class="field" id="gotProductoCampo" style="display:none">
      <label>Producto aplicado</label>
      <input type="text" id="gotProducto" placeholder="Detalle del producto..."/>
    </div>

    ${bombaSelector}

    <div class="field">
      <label>Tipo de energía</label>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button type="button" class="got-en-btn" data-val="diesel" onclick="seleccionarEnergiaGoteo('diesel')"
                style="flex:1;padding:9px;border:1.5px solid #D1D5DB;background:white;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
          Diesel
        </button>
        <button type="button" class="got-en-btn" data-val="electrica" onclick="seleccionarEnergiaGoteo('electrica')"
                style="flex:1;padding:9px;border:1.5px solid #D1D5DB;background:white;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
          Eléctrica
        </button>
        <button type="button" class="got-en-btn" data-val="mixta" onclick="seleccionarEnergiaGoteo('mixta')"
                style="flex:1;padding:9px;border:1.5px solid #D1D5DB;background:white;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
          Mixta

    <div class="field">
      <label>Horas solicitadas <span style="color:#6b7280;font-weight:400">(las que pidió el jefe)</span></label>
      <input type="number" step="0.01" id="gotHorasSol" placeholder="0.00" value="${esProgramada && programacion.horas_estimadas ? programacion.horas_estimadas : ''}"/>
    </div>

    <!-- BLOQUE LECTURAS -->
    <div style="background:#F9FAFB;border:1px dashed #D1D5DB;border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em">
        <i class="ti ti-gauge"></i> Lecturas
      </div>

      <div class="field-row">
        <div class="field">
          <label>Horómetro inicio</label>
          <input type="number" step="0.01" id="gotHorIni" placeholder="0.00"/>
        </div>
        <div class="field">
          <label>Horómetro fin</label>
          <input type="number" step="0.01" id="gotHorFin" placeholder="0.00"/>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>KW inicio</label>
          <input type="number" step="0.01" id="gotKwIni" placeholder="0.00"/>

        <div class="field">
          <label>KW fin</label>
          <input type="number" step="0.01" id="gotKwFin" placeholder="0.00"/>

          <input type="number" step="0.01" id="gotCaudIni" placeholder="0.00"/>

function onCambioTipoGoteo(){
  const sel = document.getElementById('gotTipo');
  const opt = sel.options[sel.selectedIndex];
  const reqProd = opt && opt.getAttribute('data-prod') === '1';
  const campo = document.getElementById('gotProductoCampo');
  if(campo){
    campo.style.display = reqProd ? '' : 'none';
  }
}

function actualizarEnergiaGoteo(){
  const sel = document.getElementById('gotBomba');
  // Si es un <select> con opciones
  if(sel.tagName === 'SELECT'){
    const opt = sel.options[sel.selectedIndex];
    if(!opt) return;
    const energia = opt.getAttribute('data-energia');
    if(energia) seleccionarEnergiaGoteo(energia);
  }
}

function seleccionarEnergiaGoteo(val){
  window.__gotEnergia = val;
  document.querySelectorAll('.got-en-btn').forEach(b => {
    const sel = b.dataset.val === val;
    b.style.borderColor = sel ? '#1D9E75' : '#D1D5DB';
    b.style.background = sel ? '#E8F5EE' : 'white';
    b.style.color = sel ? '#0F5530' : '#374151';
    b.style.boxShadow = sel ? '0 0 0 3px rgba(29,158,117,0.18)' : 'none';
  });
}

function agregarTiempoPerdidoGoteo(){
  const causas = (causasTiempoPerdidoCache || []).filter(c => c.aplica_goteo !== false);
  if(causas.length === 0){
    toast('No hay causas configuradas', 'error');
    return;
  }
  const idx = window.__goteoTiemposPerdidos.length;
  window.__goteoTiemposPerdidos.push({ causa_id: null, minutos: null, observaciones: '' });

  const lista = document.getElementById('gotTiempoPerdidoLista');
  const vacio = document.getElementById('gotTiempoPerdidoVacio');
  vacio.style.display = 'none';

  const item = document.createElement('div');
  item.style.cssText = 'background:white;border:1px solid #F87171;border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:6px';
  item.id = 'gotTp-' + idx;
  item.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center">
      <select onchange="window.__goteoTiemposPerdidos[${idx}].causa_id = this.value ? parseInt(this.value) : null"
              style="flex:1;padding:6px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px">
        <option value="">Causa...</option>
        ${causas.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}
      </select>
      <input type="number" placeholder="min"
             onchange="window.__goteoTiemposPerdidos[${idx}].minutos = this.value === '' ? null : parseFloat(this.value)"
             style="width:70px;padding:6px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px"/>
      <button type="button" onclick="quitarTiempoPerdidoGoteo(${idx})"
              style="padding:6px 8px;background:white;border:1px solid #F87171;color:#7F1D1D;border-radius:6px;font-size:11px;cursor:pointer">
        <i class="ti ti-x"></i>
      </button>
    </div>
    <input type="text" placeholder="Observación (opcional)"
           onchange="window.__goteoTiemposPerdidos[${idx}].observaciones = this.value"
           style="padding:6px 8px;border:1px solid #E5E7EB;border-radius:6px;font-size:11px"/>
  `;
  lista.appendChild(item);
}

function quitarTiempoPerdidoGoteo(idx){
  window.__goteoTiemposPerdidos[idx] = null;
  const el = document.getElementById('gotTp-' + idx);
  if(el) el.remove();
  const algunoVivo = window.__goteoTiemposPerdidos.some(t => t !== null);
  if(!algunoVivo){
    document.getElementById('gotTiempoPerdidoVacio').style.display = '';
  }
}

async function guardarRiegoGoteo(){
  const btn = document.getElementById('btnGot');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const estacionId = parseInt(document.getElementById('gotEstacionId').value);
    const finca = document.getElementById('gotFinca').value;
    const turnoRaw = document.getElementById('gotTurno').value;
    const fechaIni = document.getElementById('gotFechaIni').value;
    const fechaFin = document.getElementById('gotFechaFin').value;
    const horaIni = document.getElementById('gotHoraIni').value || null;
    const horaFin = document.getElementById('gotHoraFin').value || null;
    const tipoId = document.getElementById('gotTipo').value;
    const productoRaw = document.getElementById('gotProducto') ? document.getElementById('gotProducto').value : '';
    const bombaEl = document.getElementById('gotBomba');
    const bomba = bombaEl ? (bombaEl.value || null) : null;
    const horasSolRaw = document.getElementById('gotHorasSol').value;
    const horIniRaw = document.getElementById('gotHorIni').value;
    const horFinRaw = document.getElementById('gotHorFin').value;
    const kwIniRaw = document.getElementById('gotKwIni').value;
    const kwFinRaw = document.getElementById('gotKwFin').value;
    const presEntRaw = document.getElementById('gotPresEnt').value;
    const presSalRaw = document.getElementById('gotPresSal').value;
    const caudIniRaw = document.getElementById('gotCaudIni').value;
    const caudFinRaw = document.getElementById('gotCaudFin').value;
    const obs = document.getElementById('gotObs').value.trim() || null;
    const energia = window.__gotEnergia;
    const prog = window.__goteoProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)    throw new Error('Selecciona una finca');
    if(!turnoRaw) throw new Error('Indica el turno');
    if(!fechaIni) throw new Error('Indica la fecha de inicio');
    if(!tipoId)   throw new Error('Selecciona el tipo de riego goteo');

    const turno = parseInt(turnoRaw);
    const num = (v) => v === '' || v == null ? null : parseFloat(v);

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      estacion_id: estacionId,
      finca,
      turno,
      fecha_inicio: fechaIni,
      fecha_fin: fechaFin || fechaIni,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      tipo_riego_id: parseInt(tipoId),
      codigo_bomba: bomba,
      energia,
      horas_solicitadas: num(horasSolRaw),
      horometro_ini: num(horIniRaw),
      horometro_fin: num(horFinRaw),
      kw_ini: num(kwIniRaw),
      kw_fin: num(kwFinRaw),
      presion_entrada: num(presEntRaw),
      presion_salida: num(presSalRaw),
      caudal_ini: num(caudIniRaw),
      caudal_fin: num(caudFinRaw),
      producto_aplicado: productoRaw ? productoRaw.trim() : null,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    // 1) Insertar el riego y recuperar id
    const { data: insertados, error: e1 } = await sb.from('avc_riego_goteo')
      .insert(payload)
      .select('id')
      .single();
    if(e1) throw new Error(e1.message);
    const goteoId = insertados.id;

    // 2) Insertar tiempos perdidos
    const tiempos = (window.__goteoTiemposPerdidos || [])
      .filter(t => t !== null && t.causa_id && t.minutos != null && t.minutos > 0)
      .map(t => ({
        tipo_riego: 'goteo',
        riego_id: goteoId,
        causa_id: t.causa_id,
        minutos: t.minutos,
        observaciones: t.observaciones || null
      }));
    if(tiempos.length > 0){
      const { error: eTp } = await sb.from('avc_riego_tiempo_perdido').insert(tiempos);
      if(eTp) console.warn('Error guardando tiempos perdidos:', eTp);
    }

    // 3) Si era programada, cerrar la tarea
    if(esProgramada){
      const { error: e2 } = await sb.from('avc_programacion')
        .update({
          estado: 'completada',
          observacion_real: obs,
          cerrado_por: usuario.email,
          cerrado_en: new Date().toISOString()
        })
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Riego goteo registrado y tarea completada' : 'Riego goteo registrado correctamente');
    closeModal();
    window.__goteoProgramacion = null;
    window.__goteoTiemposPerdidos = [];
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar registro';
  }
}

async function renderOperadorRiegosHistorial(){
  const [gotR, repR] = await Promise.all([
    sb.from('avc_riego_goteo')
      .select('*, pm_estaciones_riego(nombre), pm_tipos_riego_goteo(nombre, requiere_producto)')
      .eq('registrado_por', usuario.email)
      .order('fecha_inicio', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30),
    sb.from('avc_riego_reparacion_goteo')
      .select('*')
      .eq('registrado_por', usuario.email)
      .order('fecha', { ascending: false })
      .order('hora_inicio', { ascending: false })
      .limit(30)
  ]);

  if(gotR.error || repR.error){
    const msg = (gotR.error || repR.error).message;
    return `<div class="empty"><i class="ti ti-alert-triangle"></i>Error: ${msg}</div>`;
  }
  if((!gotR.data || gotR.data.length === 0) && (!repR.data || repR.data.length === 0)){
    return '<div class="empty"><i class="ti ti-file-text"></i>Aún no tienes registros.</div>';
  }

  const items = [];

  (gotR.data || []).forEach(r => {
    const est = r.pm_estaciones_riego || {};
    const tipo = r.pm_tipos_riego_goteo || {};
    items.push({
      sortDate: r.fecha_inicio + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('goteo', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#D1FAE5;color:#065F46">Goteo</span>
          <span class="reg-fecha">${fmtFecha(r.fecha_inicio)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${est.nombre || ''} · ${r.finca}${r.turno ? ' · TURNO '+r.turno : ''}</div>
        <div class="reg-meta">
          ${tipo.nombre || ''}
          ${r.codigo_bomba ? ' · Bomba '+r.codigo_bomba : ''}
          ${r.energia ? ' · '+r.energia : ''}
        </div>
        ${r.producto_aplicado ? `<div style="font-size:11px;color:#6b7280;margin-top:2px">Producto: ${r.producto_aplicado}</div>` : ''}
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  (repR.data || []).forEach(r => {
    items.push({
      sortDate: r.fecha + ' ' + (r.hora_inicio || '00:00:00'),
      html: `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('reparacion_goteo', ${r.id})">
        <div class="reg-head">
          <span class="badge" style="background:#E0F2FE;color:#075985">Reparación</span>
          <span class="reg-fecha">${fmtFecha(r.fecha)}${r.hora_inicio ? ' · '+r.hora_inicio.substring(0,5) : ''}</span>
        </div>
        <div class="reg-finca">${r.finca}${r.lote_o_turno ? ' · '+r.lote_o_turno : ''}</div>
        <div class="reg-meta">
          ${r.avance_ha != null ? '<strong>'+r.avance_ha+'</strong> ha · ' : ''}${r.personal != null ? r.personal+' personas' : ''}
        </div>
        ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
      </div>`
    });
  });

  items.sort((a,b) => b.sortDate.localeCompare(a.sortDate));
  return items.map(i => i.html).join('');
}

let materialesReparacionCache = null;
async function cargarMaterialesReparacion(){
  if(materialesReparacionCache) return materialesReparacionCache;
  const { data, error } = await sb.from('pm_materiales_reparacion_goteo')
    .select('id, codigo, nombre, unidad')
    .eq('activo', true)
    .order('nombre');
  materialesReparacionCache = (error ? [] : (data || []));
  return materialesReparacionCache;
}

async function abrirCapturaReparacionGoteo(programacion){
  const esProgramada = !!programacion;
  window.__repProgramacion = programacion || null;
  window.__repMateriales = [];

  // Cargar fincas de la estación del operador
  const estacionId = usuario.estacion_default;
  if(!estacionId){
    toast('Tu usuario no tiene estación asignada.', 'error');
    return;
  }
  const { data: est } = await sb.from('pm_estaciones_riego')
    .select('nombre').eq('id', estacionId).maybeSingle();
  const nombreEst = est ? est.nombre : '';

  const fincasEst = await cargarFincasEstacion(estacionId);
  await cargarMaterialesReparacion();

  // Resolver finca/lote desde programación
  let preFinca = '';
  let preLote = '';
  if(esProgramada){
    const fLote = programacion.finca_lote || '';
    const m = fLote.match(/^([A-ZÁÉÍÓÚÑ\s]+)/i);
    if(m){
      const fincaCand = m[1].trim().toUpperCase();
      const match = fincasEst.find(f => f.toUpperCase() === fincaCand);
      if(match) preFinca = match;
    }
    const m2 = fLote.match(/\d+$/);
    if(m2) preLote = m2[0];
  }

  const contextoBanner = esProgramada ? `
    <div style="background:#E6F1FB;border-left:3px solid #185FA5;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#0C447C;text-transform:uppercase;letter-spacing:0.04em">Tarea programada</div>
      <div style="font-size:13px;color:#185FA5;margin-top:4px">${actNombre(programacion.codigo_actividad)}</div>
      ${preFinca ? `<div style="font-size:12px;color:#185FA5;margin-top:2px">${preFinca}${preLote ? ' · Lote '+preLote : ''}</div>` : ''}
      ${programacion.horas_estimadas ? `<div style="font-size:12px;color:#185FA5;margin-top:2px"><i class="ti ti-clock"></i> ${programacion.horas_estimadas} horas estimadas de duración</div>` : ''}
      ${programacion.observacion_plan ? `<div style="font-size:11px;color:#185FA5;margin-top:4px;font-style:italic">Nota del jefe: "${programacion.observacion_plan}"</div>` : ''}
    </div>
  ` : `
    <div style="background:#FBF5E6;border-left:3px solid #BA7517;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em">Captura libre</div>
      <div style="font-size:12px;color:#A06410;margin-top:2px">${nombreEst} · Reparación espontánea</div>
    </div>
  `;

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Reparación de goteo</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. ${esProgramada ? programacion.codigo_actividad : '10704'}</div>
    ${contextoBanner}

    <div class="field">
      <label>Finca</label>
      <select id="repFinca">
        <option value="">Seleccionar finca...</option>
        ${fincasEst.map(f => `<option value="${f}" ${f === preFinca ? 'selected' : ''}>${f}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <label>Lote / Turno</label>
      <input type="text" id="repLoteTurno" value="${preLote ? 'Lote '+preLote : ''}" placeholder="Ej: Lote 3, o Turno 2"/>
      <div class="field-help" style="font-size:11px;color:#6b7280;margin-top:4px">Puede ser lote (ej "Lote 5") o turno (ej "Turno 2")</div>
    </div>

    <div class="field">
      <label>Fecha</label>
      <input type="date" id="repFecha" value="${hoyISO()}"/>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hora inicio</label>
        <input type="time" id="repHoraIni"/>
      </div>
      <div class="field">
        <label>Hora fin</label>
        <input type="time" id="repHoraFin"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Avance (ha)</label>
        <input type="number" step="0.01" id="repAvanceHa" placeholder="0.00"/>
      </div>
      <div class="field">
        <label>Personal</label>
        <input type="number" id="repPersonal" placeholder="0"/>
      </div>
    </div>

    <!-- BLOQUE MATERIALES -->
    <div style="background:#F0F9FF;border:1px dashed #38BDF8;border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;font-weight:600;color:#075985;text-transform:uppercase;letter-spacing:0.04em">
          <i class="ti ti-tools"></i> Materiales utilizados
        </div>
        <button type="button" onclick="agregarMaterialReparacion()"
                style="padding:4px 10px;background:white;border:1px solid #38BDF8;color:#075985;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer">
          + Agregar
        </button>
      </div>
      <div id="repMaterialesLista" style="display:flex;flex-direction:column;gap:6px"></div>
      <div id="repMaterialesVacio" style="font-size:11px;color:#075985;opacity:0.6;text-align:center;padding:6px">
        Sin materiales registrados
      </div>
    </div>

    <div class="field">
      <label>Observaciones</label>
      <textarea id="repObs" placeholder="Tipo de falla, ubicación específica..."></textarea>
    </div>

    <button class="btn btn-primary" id="btnRep" onclick="guardarReparacionGoteo()">
      <i class="ti ti-device-floppy"></i> Guardar reparación
    </button>
  `;

  showModal();
}

function agregarMaterialReparacion(){
  const mats = materialesReparacionCache || [];
  if(mats.length === 0){
    toast('No hay materiales configurados', 'error');
    return;
  }
  const idx = window.__repMateriales.length;
  window.__repMateriales.push({ material_id: null, cantidad: null });

  const lista = document.getElementById('repMaterialesLista');
  const vacio = document.getElementById('repMaterialesVacio');
  vacio.style.display = 'none';

  const item = document.createElement('div');
  item.style.cssText = 'background:white;border:1px solid #38BDF8;border-radius:6px;padding:8px;display:flex;gap:6px;align-items:center';
  item.id = 'repMat-' + idx;
  item.innerHTML = `
    <select onchange="onCambioMaterialReparacion(${idx}, this)"
            style="flex:1;padding:6px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px">
      <option value="">Material...</option>
      ${mats.map(m => `<option value="${m.id}" data-unidad="${m.unidad || ''}">${m.nombre}</option>`).join('')}
    </select>
    <input type="number" step="0.01" placeholder="Cant."
           onchange="window.__repMateriales[${idx}].cantidad = this.value === '' ? null : parseFloat(this.value)"
           style="width:80px;padding:6px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px"/>
    <span id="repMatUnidad-${idx}" style="font-size:11px;color:#6b7280;min-width:32px">—</span>
    <button type="button" onclick="quitarMaterialReparacion(${idx})"
            style="padding:6px 8px;background:white;border:1px solid #F87171;color:#7F1D1D;border-radius:6px;font-size:11px;cursor:pointer">
      <i class="ti ti-x"></i>
    </button>
  `;
  lista.appendChild(item);
}

function onCambioMaterialReparacion(idx, sel){
  const matId = sel.value ? parseInt(sel.value) : null;
  window.__repMateriales[idx].material_id = matId;
  const opt = sel.options[sel.selectedIndex];
  const unidad = opt ? opt.getAttribute('data-unidad') : '';
  const unidadEl = document.getElementById('repMatUnidad-' + idx);
  if(unidadEl) unidadEl.textContent = unidad || '—';
}

function quitarMaterialReparacion(idx){
  window.__repMateriales[idx] = null;
  const el = document.getElementById('repMat-' + idx);
  if(el) el.remove();
  const algunoVivo = window.__repMateriales.some(m => m !== null);
  if(!algunoVivo){
    document.getElementById('repMaterialesVacio').style.display = '';
  }
}

async function guardarReparacionGoteo(){
  const btn = document.getElementById('btnRep');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca = document.getElementById('repFinca').value;
    const loteTurno = document.getElementById('repLoteTurno').value.trim() || null;
    const fecha = document.getElementById('repFecha').value;
    const horaIni = document.getElementById('repHoraIni').value || null;
    const horaFin = document.getElementById('repHoraFin').value || null;
    const avanceRaw = document.getElementById('repAvanceHa').value;
    const personalRaw = document.getElementById('repPersonal').value;
    const obs = document.getElementById('repObs').value.trim() || null;
    const prog = window.__repProgramacion || null;
    const esProgramada = !!prog;

    if(!finca) throw new Error('Selecciona una finca');
    if(!fecha) throw new Error('Indica la fecha');

    const avance = avanceRaw === '' ? null : parseFloat(avanceRaw);
    const personal = personalRaw === '' ? null : parseInt(personalRaw);

    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote_o_turno: loteTurno,
      fecha,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      avance_ha: avance,
      personal,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    // 1) Insertar reparación
    const { data: insertados, error: e1 } = await sb.from('avc_riego_reparacion_goteo')
      .insert(payload)
      .select('id')
      .single();
    if(e1) throw new Error(e1.message);
    const reparacionId = insertados.id;

    // 2) Insertar materiales
    const materiales = (window.__repMateriales || [])
      .filter(m => m !== null && m.material_id && m.cantidad != null && m.cantidad > 0)
      .map(m => ({
        reparacion_id: reparacionId,
        material_id: m.material_id,
        cantidad: m.cantidad
      }));
    if(materiales.length > 0){
      const { error: eMat } = await sb.from('avc_riego_reparacion_materiales').insert(materiales);
      if(eMat) console.warn('Error guardando materiales:', eMat);
    }

    // 3) Cerrar tarea si era programada
    if(esProgramada){
      const { error: e2 } = await sb.from('avc_programacion')
        .update({
          estado: 'completada',
          ha_real: avance,
          personal_real: personal,
          observacion_real: obs,
          cerrado_por: usuario.email,
          cerrado_en: new Date().toISOString()
        })
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Reparación registrada y tarea completada' : 'Reparación registrada correctamente');
    closeModal();
    window.__repProgramacion = null;
    window.__repMateriales = [];
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar reparación';
  }
}
