async function renderEncargadoTareas(){
  const hoy = hoyISO();
  const { data: tareas } = await sb.from('avc_programacion')
    .select('*')
    .eq('email_encargado', usuario.email)
    .eq('fecha', hoy)
    .eq('eliminada', false)
    .order('hora_programada', { nullsFirst: false });

  const total = (tareas || []).length;
  const completadas = (tareas || []).filter(t => t.estado === 'completada' || t.estado === 'modificada').length;
  const haPlan = (tareas || []).reduce((s,t) => s + parseFloat(t.ha_plan || 0), 0);
  const haReal = (tareas || []).reduce((s,t) => s + parseFloat(t.ha_real || 0), 0);

  let html = `
    <div class="banner">
      <div class="banner-lbl">Programación recibida</div>
      <div class="banner-txt">${total} tarea${total!==1?'s':''} hoy · ${haPlan.toFixed(1)} ha proyectadas</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${completadas}</div></div>
      <div class="stat"><div class="stat-lbl">HA real</div><div class="stat-val">${haReal.toFixed(1)}</div></div>
    </div>
  `;

  if(total === 0){
    html += '<div class="empty"><i class="ti ti-calendar-off"></i>No tienes tareas asignadas para hoy.</div>';
  } else {
    html += '<div class="sec-h">Hoy</div>';
    tareas.forEach(t => {
      const compartida = esCompartida(t.codigo_actividad);
      const ico = iconoActividad(t.codigo_actividad);
      const prio = t.prioridad === 'alta' ? '<span class="badge b-prio-alta">ALTA</span>' :
                   t.prioridad === 'baja' ? '<span class="badge b-prio-baja">BAJA</span>' : '';
      let metaTxt = '';
      if(t.estado === 'planificado' || t.estado === 'pendiente'){
        metaTxt = `Plan: ${t.ha_plan} ha · ${t.personal_plan} personas`;
      } else if(t.estado === 'esperando_supervisor'){
        metaTxt = `Esperando que el supervisor abra la operación`;
      } else if(t.estado === 'esperando_encargado'){
        metaTxt = `Supervisor registró <strong>${t.ha_real || 0} ha</strong> · falta tu parte`;
      } else if(t.estado === 'completada' || t.estado === 'modificada'){
        metaTxt = `${t.ha_real || 0} ha completadas`;
      } else {
        metaTxt = `${t.ha_real || 0}/${t.ha_plan} ha`;
      }

      html += `<div class="tarea-card estado-${t.estado}" onclick="abrirTarea(${t.id})">
        <div class="tarea-head">
          <div class="tarea-left">
            <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
            <div class="tarea-info">
              ${t.hora_programada ? `<div class="tarea-hora">${t.hora_programada}</div>` : ''}
              <div class="tarea-title">${actNombre(t.codigo_actividad)}</div>
            </div>
          </div>
          <div class="tarea-tags">
            ${badge(t.estado)}
            ${prio}
          </div>
        </div>
        <div class="tarea-sub">${t.finca_lote}${compartida ? ' · con supervisor' : ''}</div>
        <div class="tarea-meta">${metaTxt}</div>
      </div>`;
    });
  }
  return html;
}

async function abrirTarea(id){
  currentDetailId = id;
  console.log('abrirTarea llamada con id:', id, 'tipo:', typeof id);
  
  const { data: t, error } = await sb.from('avc_programacion').select('*').eq('id', id).maybeSingle();
  if(error){ 
    console.error('Error trayendo tarea:', error);
    toast('Error: ' + error.message, 'error'); 
    return; 
  }
  if(!t){ 
    console.warn('Tarea no encontrada para id:', id);
    toast('Tarea no encontrada','error'); 
    return; 
  }
  console.log('Tarea cargada:', t);

  // Traer registros existentes vinculados a esta programación
  const { data: regs } = await sb.from('avc_registros')
    .select('*')
    .eq('programacion_id', id);

  modalContent = renderTareaDetalle(t, regs || []);
  showModal();
}

function renderTareaDetalle(t, regs){
  const compartida = esCompartida(t.codigo_actividad);
  const parteSup = regs.find(r => r.parte_de === 'supervisor');
  const parteEnc = regs.find(r => r.parte_de === 'encargado');
  const parteUnica = regs.find(r => r.parte_de === 'unico');

  let acciones = '';
  if(usuario.rol_avc === 'encargado_finca'){
    if(compartida && parteSup && !parteEnc){
      // Operación compartida, supervisor abrió, falta mi parte
      acciones = `<button class="btn btn-purple" onclick="capturarParteEncargado(${t.id})">Aportar mi parte</button>`;
    } else if(compartida && !parteSup){
      acciones = `<div class="banner amber" style="margin-top:8px"><div class="banner-txt">⏳ Esperando que el supervisor abra la operación</div></div>`;
    } else if(!compartida && !parteUnica && (t.estado === 'planificado' || t.estado === 'pendiente' || t.estado === 'en_curso')){
      // No compartida, no hay registro aún → puedo registrar
      acciones = `<button class="btn btn-primary" onclick="capturarTareaUnica(${t.id})">Registrar avance</button>`;
    }
  } else if(usuario.rol_avc === 'supervisor_actividad'){
    // Modelo COMPARTIDA o EXTERNA: el supervisor abre la operación y el encargado aporta su parte
    if(compartida && !parteSup){
      acciones = `<button class="btn btn-primary" onclick="capturarParteSupervisor(${t.id})">Abrir operación</button>`;
    }
    // Modelo SUPERVISOR puro (ej. SIEMBRA, PREPARACIÓN): el supervisor es el único ejecutor
    else if(!compartida && !parteUnica && (t.estado === 'planificado' || t.estado === 'pendiente' || t.estado === 'en_curso')){
      acciones = `<button class="btn btn-primary" onclick="capturarTareaUnica(${t.id})">Registrar avance</button>`;
    }
  }

  return `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${actNombre(t.codigo_actividad)}</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">${t.finca_lote} · ${t.fecha}${t.hora_programada?' · '+t.hora_programada:''}</div>

    <div class="detail-section">
      <div class="detail-lbl">Plan</div>
      <div class="detail-row"><span class="key">HA proyectadas</span><span class="val">${t.ha_plan}</span></div>
      <div class="detail-row"><span class="key">Personal proyectado</span><span class="val">${t.personal_plan}</span></div>
      <div class="detail-row"><span class="key">Prioridad</span><span class="val">${t.prioridad || 'media'}</span></div>
      ${t.observacion_plan ? `<div style="font-size:12px;color:#374151;margin-top:8px;background:#f9fafb;padding:8px;border-radius:6px">${t.observacion_plan}</div>` : ''}
    </div>

    ${parteSup ? `<div class="parte parte-supervisor">
      <div class="detail-lbl">Parte del supervisor</div>
      <div class="detail-row"><span class="key">HA registradas</span><span class="val">${parteSup.ha_avance}</span></div>
      ${parteSup.personal_cantidad ? `<div class="detail-row"><span class="key">Personal</span><span class="val">${parteSup.personal_cantidad}</span></div>` : ''}
      ${parteSup.observaciones ? `<div style="font-size:12px;color:#04342C;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteSup.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteSup.registrado_por} · ${fmtFecha(parteSup.fecha_registro)}</div>
    </div>` : ''}

    ${parteEnc ? `<div class="parte parte-encargado">
      <div class="detail-lbl">Parte del encargado</div>
      <div class="detail-row"><span class="key">Personal</span><span class="val">${parteEnc.personal_cantidad}</span></div>
      ${parteEnc.observaciones ? `<div style="font-size:12px;color:#042C53;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteEnc.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteEnc.registrado_por} · ${fmtFecha(parteEnc.fecha_registro)}</div>
    </div>` : ''}

    ${parteUnica ? `<div class="parte parte-encargado">
      <div class="detail-lbl">Registro</div>
      <div class="detail-row"><span class="key">HA real</span><span class="val">${parteUnica.ha_avance}</span></div>
      <div class="detail-row"><span class="key">Personal</span><span class="val">${parteUnica.personal_cantidad}</span></div>
      ${parteUnica.observaciones ? `<div style="font-size:12px;color:#042C53;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteUnica.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteUnica.registrado_por} · ${fmtFecha(parteUnica.fecha_registro)}</div>
    </div>` : ''}

    ${acciones}
  `;
}

function capturarTareaUnica(progId){
  closeModal();
  captureMode = 'plan';
  captureContext = { progId, parte: 'unico' };
  renderCapturaPlanModal();
}

function capturarParteEncargado(progId){
  closeModal();
  captureMode = 'plan';
  captureContext = { progId, parte: 'encargado' };
  renderCapturaPlanModal();
}

function capturarParteSupervisor(progId){
  closeModal();
  captureMode = 'plan';
  captureContext = { progId, parte: 'supervisor' };
  renderCapturaPlanModal();
}

async function renderCapturaPlanModal(){
  const { progId, parte } = captureContext;
  const { data: t } = await sb.from('avc_programacion').select('*').eq('id', progId).single();
  if(!t) return;

  const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
  const lote = plantios.find(p => p.finca_lote === t.finca_lote);
  if(!act){ toast('Actividad no encontrada en catálogo','error'); return; }

  // Si es EXTERNA y tiene mezcla planificada, traer los datos para mostrar al ejecutor
  let mezclaInfo = '';
  if(act.modelo_comparticion === 'EXTERNA' && t.mezcla_id){
    const mezclas = await cargarMezclas();
    const mezcla = mezclas.find(m => m.id === t.mezcla_id);
    if(mezcla){
      const ajustes = t.dosis_ajustes || {};
      const productosHtml = mezcla.productos.map(p => {
        const dosisReal = ajustes[p.producto_id] != null ? ajustes[p.producto_id] : p.dosis_default;
        return `<div style="font-size:12px;color:#854F0B;padding:3px 0;display:flex;justify-content:space-between">
          <span>${p.nombre}</span>
          <span style="font-weight:600">${dosisReal} ${p.unidad}/ha</span>
        </div>`;
      }).join('');
      
      mezclaInfo = `
        <div style="background:#FAF5E8;border:1px solid #E0CFA8;border-radius:8px;padding:10px 12px;margin-bottom:14px">
          <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">
            🧪 Plan PM: ${mezcla.nombre}
          </div>
          ${productosHtml}
          ${t.jornada ? `<div style="font-size:11px;color:#A06410;margin-top:8px;padding-top:6px;border-top:1px solid #E0CFA8">Jornada: <strong>${t.jornada}</strong></div>` : ''}
          ${t.observacion_pm ? `<div style="font-size:11px;color:#854F0B;margin-top:6px;font-style:italic">"${t.observacion_pm}"</div>` : ''}
        </div>
      `;
    }
  }

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Registrar avance</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">${actNombre(t.codigo_actividad)} · ${t.finca_lote}${lote ? ` (${lote.area_ha} ha)` : ''}</div>
    ${mezclaInfo}
    ${armarFormularioCaptura(act, parte, t)}
    <button class="btn btn-primary" id="btnCaptura" onclick="guardarCapturaPlan()">Guardar registro</button>
  `;
  showModal();
}

function armarFormularioCaptura(act, parte, prog){
  // act: row de avc_actividades con tipo_captura, modelo_comparticion, requiere_personal/horario/vs
  // parte: 'unico' | 'supervisor' | 'encargado'
  // prog: row de avc_programacion (puede ser null en captura libre)
  const planHa  = prog ? (prog.ha_plan || '')       : '';
  const planPer = prog ? (prog.personal_plan || 0)  : 0;

  // === CASO ESPECIAL: encargado en compartida/externa → solo personal + obs ===
  if(parte === 'encargado'){
    return `
      <div class="banner blue">
        <div class="banner-lbl">Parte del encargado</div>
        <div class="banner-txt">Aporta personal y observaciones. El HA y datos técnicos los registra el supervisor.</div>
      </div>
      <div class="field">
        <label>Personal asignado</label>
        <input type="number" id="cPersonal" value="${planPer}" min="0"/>
      </div>
      <input type="hidden" id="cHa" value="0"/>
      <input type="hidden" id="cFin"/>
      <div class="field" style="margin-top:13px">
        <label>Observaciones</label>
        <textarea id="cObs" placeholder="Notas operativas, clima, incidencias..."></textarea>
      </div>
    `;
  }

  // === FORMULARIO COMPLETO (unico o supervisor) ===
  const tipo = act.tipo_captura;
  
  // El supervisor NO captura personal en operaciones COMPARTIDA/EXTERNA:
  // ese campo lo aporta el encargado en su parte. En modelos ENCARGADO/SUPERVISOR puro
  // (parte='unico'), respeta el flag de la actividad.
  const esComparticionDoble = (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');
  let reqPersonal = act.requiere_personal !== false;
  if(parte === 'supervisor' && esComparticionDoble) reqPersonal = false;
  
  const reqHorario  = act.requiere_horario  !== false;
  const reqVs       = act.requiere_vs       === true;

  // Banner según parte
  let banner = '';
  if(parte === 'supervisor'){
    banner = `<div class="banner purple">
      <div class="banner-lbl">Parte del supervisor</div>
      <div class="banner-txt">Al guardar, la tarea pasará a esperar al encargado.</div>
    </div>`;
  } else {
    banner = `<div class="banner">
      <div class="banner-lbl">Registrar avance</div>
      <div class="banner-txt">${actNombre(act.codigo_actividad)}</div>
    </div>`;
  }

  let html = banner;

  // ====== CAMPOS DE AVANCE según tipo_captura ======
  if(tipo === 'HA'){
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>`;
  } else if(tipo === 'MTS'){
    html += `<div class="field">
      <label>Metros avanzados</label>
      <input type="number" step="0.01" id="cMts" value="" min="0"/>
    </div>
    <input type="hidden" id="cHa" value="0"/>`;
  } else if(tipo === 'NINGUNA'){
    html += `<input type="hidden" id="cHa" value="0"/>`;
  } else if(tipo === 'HA_QQ'){
    const qqSugerido = prog && prog.qq_plan ? prog.qq_plan : '';
    html += `<div class="field-row">
      <div class="field"><label>HA avanzadas</label><input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/></div>
      <div class="field"><label>Quintales aplicados</label><input type="number" step="0.01" id="cQq" value="${qqSugerido}" min="0"/></div>
    </div>
    ${prog && prog.qq_plan ? `<div class="field-help" style="margin-top:-8px;margin-bottom:14px;color:#0F4F8C">📋 Plan: ${prog.qq_plan} qq</div>` : ''}`;
  } else if(tipo === 'HA_VARIEDAD'){
    const varSugerida = (prog && prog.variedad_plan) ? prog.variedad_plan : lote_variedad_default(prog);
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>
    <div class="field">
      <label>Variedad</label>
      <input type="text" id="cVariedad" value="${varSugerida.replace(/"/g,'&quot;')}" placeholder="Ej: LAICA 00-301"/>
      ${prog && prog.variedad_plan ? `<div class="field-help" style="color:#0F4F8C">📋 Plan: ${prog.variedad_plan}</div>` : ''}
    </div>`;
  } else if(tipo === 'HA_SIEMBRA'){
    const varSugerida = (prog && prog.variedad_plan) ? prog.variedad_plan : lote_variedad_default(prog);
    const distSugerida = (prog && prog.distancia_siembra_plan) ? prog.distancia_siembra_plan : '1.5';
    const anchoSugerido = (prog && prog.ancho_surco_plan) ? prog.ancho_surco_plan : '2';
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>
    <div class="field">
      <label>Variedad</label>
      <input type="text" id="cVariedad" value="${varSugerida.replace(/"/g,'&quot;')}" placeholder="Ej: LAICA 00-301"/>
    </div>
    <div class="field-row">
      <div class="field"><label>Distancia siembra (m)</label><input type="number" step="0.01" id="cDist" value="${distSugerida}"/></div>
      <div class="field"><label>Ancho surco (m)</label><input type="number" step="0.01" id="cAncho" value="${anchoSugerido}"/></div>
    </div>
    ${prog && (prog.variedad_plan || prog.distancia_siembra_plan) ? `<div class="field-help" style="margin-top:-8px;margin-bottom:14px;color:#0F4F8C">📋 Plan: ${prog.variedad_plan || '—'} · ${prog.distancia_siembra_plan || '?'}×${prog.ancho_surco_plan || '?'} m</div>` : ''}`;
  } else {
    // Tipo NULL (monitoreos pendientes) o desconocido → fallback
    html += `<input type="hidden" id="cHa" value="0"/>
    <div class="field-help" style="color:#B91C1C;margin-bottom:10px">⚠ Esta actividad aún no tiene campos definidos. Solo se guardará personal y observaciones.</div>`;
  }

  // ====== PERSONAL ======
  if(reqPersonal){
    html += `<div class="field">
      <label>Personal</label>
      <input type="number" id="cPersonal" value="${planPer}" min="0"/>
    </div>`;
  } else {
    html += `<input type="hidden" id="cPersonal" value="0"/>`;
  }

  // ====== HORARIO ======
  if(reqHorario){
    html += `<div class="field-row">
      <div class="field"><label>Hora inicio</label><input type="time" id="cHoraIni"/></div>
      <div class="field"><label>Hora fin</label><input type="time" id="cHoraFin"/></div>
    </div>`;
  }

  // ====== VASOS COTESIA ======
  if(reqVs){
    html += `<div class="field">
      <label>Vasos cotesia</label>
      <input type="number" id="cVs" value="" min="0"/>
    </div>`;
  }

  // ====== CHECKBOX LOTE FINALIZADO ======
  html += `<div class="check-row" id="cFinChk" onclick="toggleCFin()">
    <input type="checkbox" id="cFin"/>
    <label>Marcar lote como finalizado</label>
  </div>`;

  // ====== OBSERVACIONES ======
  html += `<div class="field" style="margin-top:13px">
    <label>Observaciones</label>
    <textarea id="cObs" placeholder="Notas operativas, clima, incidencias..."></textarea>
  </div>`;

  return html;
}

function lote_variedad_default(prog){
  if(!prog) return '';
  const lote = plantios.find(p => p.finca_lote === prog.finca_lote);
  return lote && lote.variedad ? lote.variedad.replace(/"/g,'&quot;') : '';
}

function toggleCFin(){
  const chk = document.getElementById('cFin');
  chk.checked = !chk.checked;
  const wrap = document.getElementById('cFinChk');
  if(wrap) wrap.classList.toggle('checked', chk.checked);
}

async function guardarCapturaPlan(){
  const btn = document.getElementById('btnCaptura');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const { progId, parte } = captureContext;
    const { data: t } = await sb.from('avc_programacion').select('*').eq('id', progId).single();
    if(!t) throw new Error('Programación no encontrada');

    // Leer todos los campos posibles (sólo si el input existe)
    const $ = id => document.getElementById(id);
    const numOrNull = id => { const el = $(id); if(!el || el.value === '') return null; const v = parseFloat(el.value); return isNaN(v) ? null : v; };
    const intOrNull = id => { const el = $(id); if(!el || el.value === '') return null; const v = parseInt(el.value); return isNaN(v) ? null : v; };
    const strOrNull = id => { const el = $(id); if(!el) return null; const v = (el.value||'').trim(); return v || null; };

    const ha          = parseFloat($('cHa')?.value || 0);
    const personal    = parseInt($('cPersonal')?.value || 0);
    const finalizado  = $('cFin')?.checked || false;
    const obs         = strOrNull('cObs');
    const mts         = numOrNull('cMts');
    const qq          = numOrNull('cQq');
    const variedad    = strOrNull('cVariedad');
    const distancia   = numOrNull('cDist');
    const anchoSurco  = numOrNull('cAncho');
    const horaIni     = strOrNull('cHoraIni');
    const horaFin     = strOrNull('cHoraFin');
    const vs          = intOrNull('cVs');

    // Catálogo de la actividad para validar requerimientos
    const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
    const tipo = act?.tipo_captura;

    // Validaciones según parte
    if(parte === 'encargado'){
      if(personal <= 0) throw new Error('Indica personal');
    } else {
      // Validar avance según tipo
      if(tipo === 'HA' || tipo === 'HA_QQ' || tipo === 'HA_VARIEDAD' || tipo === 'HA_SIEMBRA'){
        if(ha <= 0) throw new Error('Indica HA avanzadas');
      }
      if(tipo === 'MTS' && (!mts || mts <= 0)) throw new Error('Indica metros avanzados');
      if(tipo === 'HA_QQ' && (qq == null || qq < 0)) throw new Error('Indica quintales aplicados');
      if((tipo === 'HA_VARIEDAD' || tipo === 'HA_SIEMBRA') && !variedad) throw new Error('Indica variedad');
      
      // Personal: solo validar si la actividad lo requiere Y no es supervisor en compartida/externa
      const esComparticionDoble2 = act && (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');
      const supervisorEnCompartida = (parte === 'supervisor' && esComparticionDoble2);
      if(act?.requiere_personal !== false && !supervisorEnCompartida && personal <= 0){
        throw new Error('Indica personal');
      }
      
      if(act?.requiere_vs === true && (vs == null || vs < 0)) throw new Error('Indica vasos cotesia');
    }

    // Insertar registro con TODOS los campos posibles
    const { error: e1 } = await sb.from('avc_registros').insert({
      programacion_id: progId,
      fecha: t.fecha,
      finca_lote: t.finca_lote,
      codigo_actividad: t.codigo_actividad,
      ha_avance: parte === 'encargado' ? 0 : ha,
      mts_avance: mts,
      qq_aplicados: qq,
      variedad: variedad,
      distancia_siembra: distancia,
      ancho_surco: anchoSurco,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      vasos_cotesia: vs,
      lote_finalizado: finalizado,
      personal_cantidad: personal,
      observaciones: obs,
      registrado_por: usuario.email,
      parte_de: parte,
      fuera_de_plan: false,
      dispositivo: navigator.userAgent.substring(0, 100)
    });
    if(e1) throw new Error(e1.message);

    // Actualizar estado de la programación
    let nuevoEstado = 'completada';
    let updates = {};

    // Determinar si la actividad es compartida según el modelo de la BD (no por lista hardcoded)
    const esCompartidaReal = act && (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');

    if(esCompartidaReal){
      if(parte === 'supervisor'){
        nuevoEstado = 'esperando_encargado';
        updates.ha_real = ha;
        updates.observacion_real = obs;
      } else if(parte === 'encargado'){
        nuevoEstado = 'completada';
        updates.personal_real = personal;
        updates.cerrado_por = usuario.email;
        updates.cerrado_en = new Date().toISOString();
      }
    } else {
      // No compartida: parte 'unico' → cierra de una vez
      nuevoEstado = 'completada';
      updates.ha_real = ha;
      updates.personal_real = personal;
      updates.observacion_real = obs;
      updates.cerrado_por = usuario.email;
      updates.cerrado_en = new Date().toISOString();
    }

    updates.estado = nuevoEstado;

    const { error: e2 } = await sb.from('avc_programacion').update(updates).eq('id', progId);
    if(e2) throw new Error(e2.message);

    // Notificar al jefe que creó la tarea, solo si quedó como completada
    if(nuevoEstado === 'completada'){
      const { data: progActual } = await sb.from('avc_programacion')
        .select('*').eq('id', progId).maybeSingle();
      if(progActual) await notificarTareaCompletada(progActual);
    }

    toast('Registro guardado correctamente');
    closeModal();
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

async function renderEncargadoCapturar(){
  // Captura libre (fuera de plan) - similar a index.html
  const actsDisponibles = actividadesPerm.filter(a => a.requiere_detalle || a.es_fertirriego);

  if(actsDisponibles.length === 0){
    return '<div class="empty">No tienes actividades habilitadas para captura libre. Contacta a tu administrador.</div>';
  }

  return `
    <div class="banner amber">
      <div class="banner-lbl">Captura fuera de plan</div>
      <div class="banner-txt">Para registros no programados. Requiere justificación.</div>
    </div>
    <div class="card">
      <div class="card-title">Selecciona actividad</div>
      <div class="act-grid">
        ${actsDisponibles.map(a => {
          const ico = iconoActividad(a.codigo_actividad);
          return `<button class="act-btn" onclick="iniciarCapturaLibre(${a.codigo_actividad})"><i class="ti ${ico.icon}"></i>${a.nombre_actividad}</button>`;
        }).join('')}
      </div>
    </div>
  `;
}

function iniciarCapturaLibre(codigo){
  const act = actividadesAll.find(a => a.codigo_actividad === codigo);
  if(!act) return;

  if(act.es_fertirriego){
    toast('Fertirriego usa flujo especial. Por favor usa la app de captura clásica.', 'info');
    return;
  }

  captureMode = 'libre';
  captureContext = { codigo };
  renderCapturaLibreModal();
}

async function renderCapturaLibreModal(){
  const { codigo } = captureContext;
  const act = actividadesAll.find(a => a.codigo_actividad === codigo);

  // Lotes accesibles según rol
  let lotesDisp = plantios;
  if(usuario.rol_avc === 'encargado_finca'){
    lotesDisp = plantios.filter(p => p.encargado_finca === usuario.nombre_completo);
  }

  // Agrupar por finca para el dropdown
  const fincasUnicas = [...new Set(lotesDisp.map(p => p.descripcion_finca))].sort();

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${act.nombre_actividad}</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">Captura libre · ${act.codigo_actividad}</div>

    <div class="field">
      <label>Finca</label>
      <select id="clFinca" onchange="actualizarLotesCaptura()">
        <option value="">Seleccionar...</option>
        ${fincasUnicas.map(f => `<option value="${f}">${f}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Lote</label>
      <select id="clLote"><option value="">Primero elige finca</option></select>
    </div>
    <div class="field-row">
      <div class="field"><label>Fecha</label><input type="date" id="clFecha" value="${hoyISO()}"/></div>
      <div class="field"><label>HA avance</label><input type="number" step="0.01" id="clHa" placeholder="0.00"/></div>
    </div>
    <div class="field">
      <label>Personal</label>
      <input type="number" id="clPersonal" placeholder="0"/>
    </div>
    <div class="check-row" id="clFinChk" onclick="document.getElementById('clFin').checked=!document.getElementById('clFin').checked;document.getElementById('clFinChk').classList.toggle('checked',document.getElementById('clFin').checked)">
      <input type="checkbox" id="clFin"/>
      <label>Lote finalizado</label>
    </div>
    <div class="field" style="margin-top:13px">
      <label>Observaciones</label>
      <textarea id="clObs"></textarea>
    </div>
    <div class="field">
      <label style="color:#B91C1C">Justificación fuera de plan (obligatoria)</label>
      <textarea id="clObsFp" placeholder="Por qué se registra fuera del plan diario"></textarea>
    </div>
    <button class="btn btn-primary" id="btnCL" onclick="guardarCapturaLibre()">Guardar registro</button>
  `;
  showModal();
}

function actualizarLotesCaptura(){
  const finca = document.getElementById('clFinca').value;
  const sel = document.getElementById('clLote');
  if(!finca){ sel.innerHTML = '<option value="">Primero elige finca</option>'; return; }

  let lotesDisp = plantios.filter(p => p.descripcion_finca === finca);
  if(usuario.rol_avc === 'encargado_finca'){
    lotesDisp = lotesDisp.filter(p => p.encargado_finca === usuario.nombre_completo);
  }

  sel.innerHTML = '<option value="">Seleccionar lote...</option>' +
    lotesDisp.map(p => `<option value="${p.finca_lote}">${p.finca_lote} (${p.area_ha} ha)</option>`).join('');
}

async function guardarCapturaLibre(){
  const btn = document.getElementById('btnCL');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const { codigo } = captureContext;
    const finca_lote = document.getElementById('clLote').value;
    const fecha = document.getElementById('clFecha').value;
    const ha = parseFloat(document.getElementById('clHa').value || 0);
    const personal = parseInt(document.getElementById('clPersonal').value || 0);
    const obs = document.getElementById('clObs').value.trim() || null;
    const obsFp = document.getElementById('clObsFp').value.trim();

    if(!finca_lote) throw new Error('Selecciona un lote');
    if(!fecha) throw new Error('Selecciona fecha');
    if(ha <= 0) throw new Error('Indica HA avance');
    if(!obsFp) throw new Error('La justificación fuera de plan es obligatoria');

    const { error } = await sb.from('avc_registros').insert({
      programacion_id: null,
      fecha,
      finca_lote,
      codigo_actividad: codigo,
      ha_avance: ha,
      lote_finalizado: document.getElementById('clFin').checked,
      personal_cantidad: personal > 0 ? personal : null,
      observaciones: obs,
      observacion_fuera_plan: obsFp,
      fuera_de_plan: true,
      parte_de: 'unico',
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 100)
    });

    if(error) throw new Error(error.message);
    toast('Registro guardado');
    closeModal();
  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

async function renderEncargadoHistorial(){
  const { data: regs } = await sb.from('avc_registros')
    .select('*')
    .eq('registrado_por', usuario.email)
    .order('fecha_registro', { ascending: false })
    .limit(50);

  if(!regs || regs.length === 0){
    return '<div class="empty"><i class="ti ti-file-text"></i>Aún no tienes registros.</div>';
  }

  return regs.map(r => `<div class="reg-item">
    <div class="reg-head">
      <span class="badge ${r.fuera_de_plan?'fp':''}">${actNombre(r.codigo_actividad)}${r.fuera_de_plan?' (fuera plan)':''}</span>
      <span class="reg-fecha">${fmtFecha(r.fecha_registro)}</span>
    </div>
    <div class="reg-finca">${r.finca_lote}</div>
    <div class="reg-meta">${r.ha_avance} ha · ${r.personal_cantidad || 0} personas · ${r.parte_de}</div>
  </div>`).join('');
}

async function renderSupervisor(){
  if(!currentTab || currentTab === 'capturar') currentTab = 'ops';
  const tabs = [
    {id:'ops', label:'Mis operaciones'},
    {id:'historial', label:'Historial'}
  ];

  renderHeader();

  let body = '';
  if(currentTab === 'ops')             body = await renderSupervisorOps();
  else if(currentTab === 'historial')  body = await renderSupervisorHistorial();
  else                                 body = await renderSupervisorOps();

  document.getElementById('appBody').innerHTML = renderTabs(tabs) + `<div class="sec active">${body}</div>`;
}

async function renderSupervisorOps(){
  const hoy = hoyISO();

  // Ops donde soy supervisor asignado por el jefe (no eliminadas)
  // Excluimos solicitud_pm porque esas todavía no fueron aprobadas por PM
  const { data: progs } = await sb.from('avc_programacion')
    .select('*')
    .eq('email_supervisor', usuario.email)
    .eq('fecha', hoy)
    .eq('eliminada', false)
    .neq('estado', 'solicitud_pm')
    .order('hora_programada', { nullsFirst: false });

  const total = (progs || []).length;
  const compl = (progs || []).filter(p => p.estado === 'completada').length;
  const pendientes = (progs || []).filter(p => p.estado === 'planificado' || p.estado === 'pendiente').length;

  let html = `
    <div class="banner purple">
      <div class="banner-lbl">${usuario.cargo}</div>
      <div class="banner-txt">${total} operacion${total!==1?'es':''} compartidas hoy</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${compl}</div></div>
      <div class="stat"><div class="stat-lbl">Pend.</div><div class="stat-val">${pendientes}</div></div>
    </div>
  `;

  if(total === 0){
    html += `<div class="empty"><i class="ti ti-calendar-off"></i>Sin operaciones asignadas hoy.</div>`;
  } else {
    // Agrupar por finca
    const grouped = {};
    progs.forEach(p => {
      const lote = plantios.find(l => l.finca_lote === p.finca_lote);
      const fincaNombre = lote ? lote.descripcion_finca : p.finca_lote;
      if(!grouped[fincaNombre]) grouped[fincaNombre] = [];
      grouped[fincaNombre].push(p);
    });

    Object.entries(grouped).forEach(([finca, ops]) => {
      html += `<div class="sec-h"><span><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${finca}</span></div>`;
      ops.forEach(p => {
        const enc = p.email_encargado;
        const ico = iconoActividad(p.codigo_actividad);
        html += `<div class="tarea-card estado-${p.estado}" onclick="abrirTarea(${p.id})">
          <div class="tarea-head">
            <div class="tarea-left">
              <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
              <div class="tarea-info">
                ${p.hora_programada ? `<div class="tarea-hora">${p.hora_programada}</div>` : ''}
                <div class="tarea-title">${actNombre(p.codigo_actividad)}</div>
              </div>
            </div>
            ${badge(p.estado)}
          </div>
          <div class="tarea-sub">${p.finca_lote} · con ${enc || 'encargado'}</div>
          <div class="tarea-meta">Plan: ${p.ha_plan} ha${p.ha_real?` · Real: ${p.ha_real} ha`:''}</div>
        </div>`;
      });
    });
  }

  return html;
}

async function renderSupervisorCapturar(){
  // Captura libre de actividades del supervisor (no compartidas)
  const actsDisponibles = actividadesPerm.filter(a => a.requiere_detalle || a.es_fertirriego);

  if(actsDisponibles.length === 0){
    return '<div class="empty">No tienes actividades habilitadas. Contacta al administrador.</div>';
  }

  // Separar fertirriegos (que usan flujo especial)
  const fertirriegos = actsDisponibles.filter(a => a.es_fertirriego);
  const normales = actsDisponibles.filter(a => !a.es_fertirriego);

  let html = `
    <div class="banner amber">
      <div class="banner-lbl">Captura libre</div>
      <div class="banner-txt">Registros sin programación previa</div>
    </div>
  `;

  if(normales.length > 0){
    html += `
      <div class="card">
        <div class="card-title">Actividades normales</div>
        <div class="act-grid">
          ${normales.map(a => {
            const ico = iconoActividad(a.codigo_actividad);
            return `<button class="act-btn" onclick="iniciarCapturaLibre(${a.codigo_actividad})"><i class="ti ${ico.icon}"></i>${a.nombre_actividad}</button>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  if(fertirriegos.length > 0){
    html += `
      <div class="card" style="margin-top:14px">
        <div class="card-title">Fertirriegos</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">El flujo de fertirriego usa la app de captura clásica con turnos.</div>
        <a href="index.html" target="_blank"><button class="btn btn-secondary"><i class="ti ti-external-link"></i>Abrir app clásica para fertirriego</button></a>
      </div>
    `;
  }

  return html;
}

async function renderSupervisorHistorial(){
  const { data: regs } = await sb.from('avc_registros')
    .select('*')
    .eq('registrado_por', usuario.email)
    .order('fecha_registro', { ascending: false })
    .limit(50);

  if(!regs || regs.length === 0){
    return '<div class="empty"><i class="ti ti-file-text"></i>Aún no tienes registros.</div>';
  }

  return regs.map(r => `<div class="reg-item">
    <div class="reg-head">
      <span class="badge ${r.fuera_de_plan?'fp':''}">${actNombre(r.codigo_actividad)}</span>
      <span class="reg-fecha">${fmtFecha(r.fecha_registro)}</span>
    </div>
    <div class="reg-finca">${r.finca_lote}</div>
    <div class="reg-meta">${r.ha_avance} ha · ${r.personal_cantidad || 0} personas · ${r.parte_de}</div>
  </div>`).join('');
}

async function impersonar(rol){
  // Listar usuarios del rol para elegir
  const { data: users } = await sb.from('user_perfiles')
    .select('email, nombre_completo, cargo')
    .eq('rol_avc', rol)
    .eq('activo', true)
    .order('nombre_completo');

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Elegir usuario</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">Vas a impersonar a un ${rol.replace('_',' ')}</div>

async function aplicarImpersonacion(email){
  closeModal();
  const { data: perfil } = await sb.from('user_perfiles').select('*').eq('email', email).maybeSingle();
  if(!perfil) return toast('Usuario no encontrado','error');
  usuario = perfil;
  currentTab = '';
  await cargarMaestros();
  routerPorRol();
}

============================================================ */
function showModal(){
  const old = document.querySelector('.modal-overlay');
  if(old) old.remove();
  const div = document.createElement('div');
  div.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${modalContent}</div></div>`;
  document.body.appendChild(div.firstChild);
}

function closeModal(){
  modalContent = null;
  const old = document.querySelector('.modal-overlay');
  if(old) old.remove();
}

/* ============================================================
   MÓDULO DE NOTIFICACIONES (in-app, Fase 1)

let notifPollInterval = null;
let notifContadorActual = 0;

async function crearNotificacion({destinatario, tipo, titulo, mensaje, prog_id}){
  if(!destinatario) return;
  // Auto-skip si el destinatario es uno mismo (no avisar al jefe que él mismo creó algo)
  if(destinatario === usuario?.email) return;
  try {
    await sb.from('avc_notificaciones').insert({
      destinatario,
      tipo,
      titulo,
      mensaje: mensaje || null,
      prog_id: prog_id || null,
      creada_por: usuario?.email || null
    });
  } catch(err){
    console.error('Error creando notificación:', err);
    // No bloqueamos el flujo principal si la notificación falla
  }
}

async function notificarTareaAsignada(prog, modelo){
  // Disparada al programar una tarea. Notifica a quien la ejecutará.
  const act = actividadesAll.find(a => a.codigo_actividad === prog.codigo_actividad);
  const nombreAct = act ? act.nombre_actividad : `Actividad ${prog.codigo_actividad}`;
  const tituloMsg = `Nueva tarea asignada`;
  const fechaTxt = prog.fecha ? new Date(prog.fecha + 'T00:00:00').toLocaleDateString('es-HN', {day:'numeric', month:'short'}) : '';
  const haTxt = prog.ha_plan ? `${prog.ha_plan} ha` : '';
  const mensajeBase = [nombreAct, prog.finca_lote, haTxt, fechaTxt].filter(Boolean).join(' · ');
  
  // EXTERNA solicitud_pm: no notificamos al supervisor todavía, lo hace PM al aprobar
  // (las EXTERNA caen primero en estado solicitud_pm, PM las aprueba desde Matriz)
  if(modelo === 'EXTERNA') return;
  
  // Notificar al encargado
  if(prog.email_encargado){
    await crearNotificacion({
      destinatario: prog.email_encargado,
      tipo: 'tarea_asignada',
      titulo: tituloMsg,
      mensaje: mensajeBase,
      prog_id: prog.id
    });
  }
  // Notificar al supervisor (si existe y es distinto del encargado)
  if(prog.email_supervisor && prog.email_supervisor !== prog.email_encargado){
    await crearNotificacion({
      destinatario: prog.email_supervisor,
      tipo: 'tarea_asignada',
      titulo: tituloMsg,
      mensaje: mensajeBase,
      prog_id: prog.id
    });
  }
}

async function notificarTareaCompletada(prog){
  // Disparada cuando una tarea pasa a 'completada'. Notifica al jefe que la creó.
  if(!prog || !prog.creado_por) return;
  const act = actividadesAll.find(a => a.codigo_actividad === prog.codigo_actividad);
  const nombreAct = act ? act.nombre_actividad : `Actividad ${prog.codigo_actividad}`;
  const haTxt = prog.ha_plan ? `${prog.ha_plan} ha` : '';
  const ejecutor = usuario?.nombre_completo || 'Operador';
  
  await crearNotificacion({
    destinatario: prog.creado_por,
    tipo: 'tarea_completada',
    titulo: `✓ Tarea completada`,
    mensaje: `${ejecutor} terminó: ${nombreAct} en ${prog.finca_lote}${haTxt?' · '+haTxt:''}`,
    prog_id: prog.id
  });
}

async function actualizarContadorNotif(){
  if(!usuario?.email) return;
  try {
    const { count, error } = await sb.from('avc_notificaciones')
      .select('id', { count: 'exact', head: true })
      .eq('destinatario', usuario.email)
      .eq('leida', false);
    if(error){ console.error(error); return; }
    notifContadorActual = count || 0;
    const badge = document.getElementById('notifBadge');
    if(badge){
      if(notifContadorActual > 0){
        badge.style.display = 'flex';
        badge.textContent = notifContadorActual > 99 ? '99+' : notifContadorActual;
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(err){
    console.error('Error contando notificaciones:', err);
  }
}

function iniciarPollingNotif(){
  if(notifPollInterval) clearInterval(notifPollInterval);
  actualizarContadorNotif();
  notifPollInterval = setInterval(actualizarContadorNotif, 30000); // 30 segundos
}

function detenerPollingNotif(){
  if(notifPollInterval){ clearInterval(notifPollInterval); notifPollInterval = null; }
}

async function togglePanelNotif(){
  const panel = document.getElementById('notifPanel');
  const overlay = document.getElementById('notifOverlay');
  if(panel.classList.contains('open')){
    cerrarPanelNotif();
  } else {
    panel.classList.add('open');
    overlay.classList.add('open');
    await cargarPanelNotif();
  }
}

function cerrarPanelNotif(){
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

async function cargarPanelNotif(){
  const body = document.getElementById('notifPanelBody');
  const foot = document.getElementById('notifFootInfo');
  const btnMarcar = document.getElementById('notifMarcarTodo');
  body.innerHTML = '<div class="notif-empty"><i class="ti ti-loader"></i><div>Cargando...</div></div>';
  
  try {
    const { data, error } = await sb.from('avc_notificaciones')
      .select('*')
      .eq('destinatario', usuario.email)
      .order('creada_en', { ascending: false })
      .limit(50);
    if(error) throw error;
    
    const notifs = data || [];
    const noLeidas = notifs.filter(n => !n.leida).length;
    
    foot.textContent = `${notifs.length} ${notifs.length === 1 ? 'notificación' : 'notificaciones'} · ${noLeidas} no leídas`;
    btnMarcar.disabled = noLeidas === 0;
    
    if(notifs.length === 0){
      body.innerHTML = '<div class="notif-empty"><i class="ti ti-bell-off"></i><div>No tienes notificaciones</div></div>';
      return;
    }
    
    body.innerHTML = notifs.map(n => {
      const cuandoTxt = fmtTiempoRelativo(n.creada_en);
      const icono = n.tipo === 'tarea_completada' ? '✓' : (n.tipo === 'tarea_asignada' ? '🆕' : '🔔');
      return `<div class="notif-item ${n.leida?'':'no-leida'}" onclick="abrirNotif(${n.id}, ${n.prog_id || 'null'})">
        <div class="notif-item-titulo">${icono} ${escapeHtml(n.titulo)}</div>
        ${n.mensaje ? `<div class="notif-item-msg">${escapeHtml(n.mensaje)}</div>` : ''}
        <div class="notif-item-time">${cuandoTxt}</div>
      </div>`;
    }).join('');
  } catch(err){
    body.innerHTML = `<div class="notif-empty"><i class="ti ti-alert-circle"></i><div>Error: ${err.message}</div></div>`;
  }
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtTiempoRelativo(iso){
  if(!iso) return '';
  const ahora = Date.now();
  const cuando = new Date(iso).getTime();
  const segs = Math.floor((ahora - cuando) / 1000);
  if(segs < 60) return 'Hace un momento';
  const mins = Math.floor(segs / 60);
  if(mins < 60) return `Hace ${mins} min`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `Hace ${hrs} h`;
  const dias = Math.floor(hrs / 24);
  if(dias < 7) return `Hace ${dias} día${dias>1?'s':''}`;
  return new Date(iso).toLocaleDateString('es-HN', {day:'numeric', month:'short'});
}

async function abrirNotif(notifId, progId){
  // Marca como leída y navega a la tarea si tiene referencia
  try {
    await sb.from('avc_notificaciones')
      .update({ leida: true, leida_en: new Date().toISOString() })
      .eq('id', notifId);
    actualizarContadorNotif();
  } catch(err){ console.error(err); }
  
  cerrarPanelNotif();
  
  if(progId){
    // Abrir el detalle de la tarea
    abrirTarea(progId);
  }
}

async function marcarTodasLeidas(){
  try {
    const { error } = await sb.from('avc_notificaciones')
      .update({ leida: true, leida_en: new Date().toISOString() })
      .eq('destinatario', usuario.email)
      .eq('leida', false);
    if(error) throw error;
    toast('Notificaciones marcadas como leídas', 'success');
    actualizarContadorNotif();
    cargarPanelNotif();
  } catch(err){
    toast('Error: ' + err.message, 'error');
  }
}

/* ============================================================
   PWA: Banner "Instalar app" (opcional, aparece la primera vez en Android)
   ============================================================ */
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Mostrar banner sutil después de 5 segundos de uso (no apenas entran)
  setTimeout(mostrarBannerInstalar, 5000);
});

function mostrarBannerInstalar(){
  // Solo mostrar si el usuario ya está logueado y no rechazó antes
  if(!usuario || !deferredInstallPrompt) return;
  if(localStorage.getItem('install_rechazado') === '1') return;
  
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1D9E75;color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;z-index:9999;box-shadow:0 -4px 16px rgba(0,0,0,0.15);font-size:13px';
  banner.innerHTML = `
    <i class="ti ti-device-mobile" style="font-size:22px;flex-shrink:0"></i>
    <div style="flex:1">
      <div style="font-weight:600;margin-bottom:2px">Instalar CSIA Campo</div>
      <div style="font-size:11px;opacity:0.9">Acceso rápido desde tu pantalla de inicio</div>
    </div>
    <button onclick="instalarPWA()" style="background:white;color:#0F6E56;border:none;padding:8px 14px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer">Instalar</button>
    <button onclick="rechazarInstalar()" style="background:transparent;border:none;color:white;padding:6px;font-size:18px;cursor:pointer;line-height:1"><i class="ti ti-x"></i></button>
  `;
  document.body.appendChild(banner);
}

async function instalarPWA(){
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  console.log('[PWA] Usuario eligió:', outcome);
  deferredInstallPrompt = null;
  document.getElementById('installBanner')?.remove();
}

function rechazarInstalar(){
  localStorage.setItem('install_rechazado', '1');
  document.getElementById('installBanner')?.remove();
}

// Detectar si ya está instalada (modo standalone)
window.addEventListener('DOMContentLoaded', () => {
  if(window.matchMedia('(display-mode: standalone)').matches){
    console.log('[PWA] App corriendo como instalada (standalone)');
    document.body.classList.add('pwa-installed');
  }
});
