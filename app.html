let notifPollInterval = null;
let notifContadorActual = 0;

async function crearNotificacion({destinatario, tipo, titulo, mensaje, prog_id}){
  if(!destinatario) return;
  // Auto-skip si el destinatario es uno mismo (no avisar al jefe que él mismo creó algo)
  if(destinatario === usuario?.email) return;
  try {
    await sb.from('avc_notificaciones').insert({
      destinatario,
      tipo,
      titulo,
      mensaje: mensaje || null,
      prog_id: prog_id || null,
      creada_por: usuario?.email || null
    });
    
    // ENVÍO DE PUSH NOTIFICATION (no bloquea el flujo si falla)
    // Llama a la Edge Function 'enviar-push' que despacha al celular
    enviarPushAsync(destinatario, titulo, mensaje, prog_id);
  } catch(err){
    console.error('Error creando notificación:', err);
    // No bloqueamos el flujo principal si la notificación falla
  }
}

// Llamada fire-and-forget a Edge Function (no esperamos respuesta)
async function enviarPushAsync(destinatario, titulo, mensaje, prog_id){
  try {
    const { error } = await sb.functions.invoke('enviar-push', {
      body: {
        destinatario,
        titulo,
        mensaje: mensaje || '',
        url: './app.html',
        prog_id: prog_id || null
      }
    });
    if(error) console.warn('[Push] Edge Function falló:', error);
  } catch(err){
    console.warn('[Push] No se pudo invocar Edge Function:', err);
  }
}

async function notificarTareaAsignada(prog, modelo){
  // Disparada al programar una tarea. Notifica a quien la ejecutará.
  const act = actividadesAll.find(a => a.codigo_actividad === prog.codigo_actividad);
  const nombreAct = act ? act.nombre_actividad : `Actividad ${prog.codigo_actividad}`;
  const tituloMsg = `Nueva tarea asignada`;
  const fechaTxt = prog.fecha ? new Date(prog.fecha + 'T00:00:00').toLocaleDateString('es-HN', {day:'numeric', month:'short'}) : '';
  const haTxt = prog.ha_plan ? `${prog.ha_plan} ha` : '';
  const mensajeBase = [nombreAct, prog.finca_lote, haTxt, fechaTxt].filter(Boolean).join(' · ');
  
  // EXTERNA solicitud_pm: no notificamos al supervisor todavía, lo hace PM al aprobar
  // (las EXTERNA caen primero en estado solicitud_pm, PM las aprueba desde Matriz)
  if(modelo === 'EXTERNA') return;
  
  // Notificar al encargado
  if(prog.email_encargado){
    await crearNotificacion({
      destinatario: prog.email_encargado,
      tipo: 'tarea_asignada',
      titulo: tituloMsg,
      mensaje: mensajeBase,
      prog_id: prog.id
    });
  }
  // Notificar al supervisor (si existe y es distinto del encargado)
  if(prog.email_supervisor && prog.email_supervisor !== prog.email_encargado){
    await crearNotificacion({
      destinatario: prog.email_supervisor,
      tipo: 'tarea_asignada',
      titulo: tituloMsg,
      mensaje: mensajeBase,
      prog_id: prog.id
    });
  }
}

async function notificarTareaCompletada(prog){
  // Disparada cuando una tarea pasa a 'completada'. Notifica al jefe que la creó.
  if(!prog || !prog.creado_por) return;
  const act = actividadesAll.find(a => a.codigo_actividad === prog.codigo_actividad);
  const nombreAct = act ? act.nombre_actividad : `Actividad ${prog.codigo_actividad}`;
  const haTxt = prog.ha_plan ? `${prog.ha_plan} ha` : '';
  const ejecutor = usuario?.nombre_completo || 'Operador';
  
  await crearNotificacion({
    destinatario: prog.creado_por,
    tipo: 'tarea_completada',
    titulo: `✓ Tarea completada`,
    mensaje: `${ejecutor} terminó: ${nombreAct} en ${prog.finca_lote}${haTxt?' · '+haTxt:''}`,
    prog_id: prog.id
  });
}

async function actualizarContadorNotif(){
  if(!usuario?.email) return;
  try {
    const { count, error } = await sb.from('avc_notificaciones')
      .select('id', { count: 'exact', head: true })
      .eq('destinatario', usuario.email)
      .eq('leida', false);
    if(error){ console.error(error); return; }
    notifContadorActual = count || 0;
    const badge = document.getElementById('notifBadge');
    if(badge){
      if(notifContadorActual > 0){
        badge.style.display = 'flex';
        badge.textContent = notifContadorActual > 99 ? '99+' : notifContadorActual;
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(err){
    console.error('Error contando notificaciones:', err);
  }
}

function iniciarPollingNotif(){
  if(notifPollInterval) clearInterval(notifPollInterval);
  actualizarContadorNotif();
  notifPollInterval = setInterval(actualizarContadorNotif, 30000); // 30 segundos
}

function detenerPollingNotif(){
  if(notifPollInterval){ clearInterval(notifPollInterval); notifPollInterval = null; }
}

async function togglePanelNotif(){
  const panel = document.getElementById('notifPanel');
  const overlay = document.getElementById('notifOverlay');
  if(panel.classList.contains('open')){
    cerrarPanelNotif();
  } else {
    panel.classList.add('open');
    overlay.classList.add('open');
    await cargarPanelNotif();
  }
}

function cerrarPanelNotif(){
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

async function cargarPanelNotif(){
  const body = document.getElementById('notifPanelBody');
  const foot = document.getElementById('notifFootInfo');
  const btnMarcar = document.getElementById('notifMarcarTodo');
  body.innerHTML = '<div class="notif-empty"><i class="ti ti-loader"></i><div>Cargando...</div></div>';
  
  try {
    const { data, error } = await sb.from('avc_notificaciones')
      .select('*')
      .eq('destinatario', usuario.email)
      .order('creada_en', { ascending: false })
      .limit(50);
    if(error) throw error;
    
    const notifs = data || [];
    const noLeidas = notifs.filter(n => !n.leida).length;
    
    foot.textContent = `${notifs.length} ${notifs.length === 1 ? 'notificación' : 'notificaciones'} · ${noLeidas} no leídas`;
    btnMarcar.disabled = noLeidas === 0;
    
    if(notifs.length === 0){
      body.innerHTML = '<div class="notif-empty"><i class="ti ti-bell-off"></i><div>No tienes notificaciones</div></div>';
      return;
    }
    
    body.innerHTML = notifs.map(n => {
      const cuandoTxt = fmtTiempoRelativo(n.creada_en);
      const icono = n.tipo === 'tarea_completada' ? '✓' : (n.tipo === 'tarea_asignada' ? '🆕' : '🔔');
      return `<div class="notif-item ${n.leida?'':'no-leida'}" onclick="abrirNotif(${n.id}, ${n.prog_id || 'null'})">
        <div class="notif-item-titulo">${icono} ${escapeHtml(n.titulo)}</div>
        ${n.mensaje ? `<div class="notif-item-msg">${escapeHtml(n.mensaje)}</div>` : ''}
        <div class="notif-item-time">${cuandoTxt}</div>
      </div>`;
    }).join('');
  } catch(err){
    body.innerHTML = `<div class="notif-empty"><i class="ti ti-alert-circle"></i><div>Error: ${err.message}</div></div>`;
  }
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtTiempoRelativo(iso){
  if(!iso) return '';
  const ahora = Date.now();
  const cuando = new Date(iso).getTime();
  const segs = Math.floor((ahora - cuando) / 1000);
  if(segs < 60) return 'Hace un momento';
  const mins = Math.floor(segs / 60);
  if(mins < 60) return `Hace ${mins} min`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `Hace ${hrs} h`;
  const dias = Math.floor(hrs / 24);
  if(dias < 7) return `Hace ${dias} día${dias>1?'s':''}`;
  return new Date(iso).toLocaleDateString('es-HN', {day:'numeric', month:'short'});
}

async function abrirNotif(notifId, progId){
  // Marca como leída y navega a la tarea si tiene referencia
  try {
    await sb.from('avc_notificaciones')
      .update({ leida: true, leida_en: new Date().toISOString() })
      .eq('id', notifId);
    actualizarContadorNotif();
  } catch(err){ console.error(err); }
  
  cerrarPanelNotif();
  
  if(progId){
    // Abrir el detalle de la tarea
    abrirTarea(progId);
  }
}

async function marcarTodasLeidas(){
  try {
    const { error } = await sb.from('avc_notificaciones')
      .update({ leida: true, leida_en: new Date().toISOString() })
      .eq('destinatario', usuario.email)
      .eq('leida', false);
    if(error) throw error;
    toast('Notificaciones marcadas como leídas', 'success');
    actualizarContadorNotif();
    cargarPanelNotif();
  } catch(err){
    toast('Error: ' + err.message, 'error');
  }
}

// Clave VAPID pública (Public Key generada con vapidkeys.com)
const VAPID_PUBLIC_KEY = 'BMnntyPyuZhiT2KzJGuxmidzIL8LxbAKK6YzqoA671riZAjCPaz6TdnmmlrG3Y5b7gf0QOas6jfdoBkZcxpRxJM';

// Helper: convertir Public Key base64-url a Uint8Array
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = window.atob(base64);
  const output = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; ++i) output[i] = raw.charCodeAt(i);
  return output;
}

// Estado actual del permiso de notificaciones
function pushSoportado() {
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}

function estadoPushPermiso() {
  if (!pushSoportado()) return 'no-soportado';
  return Notification.permission;  // 'default', 'granted', 'denied'
}

// Pedir permiso y suscribir el celular al servicio de push
async function activarPushNotifications() {
  if (!pushSoportado()) {
    toast('Tu navegador no soporta notificaciones push', 'error');
    return false;
  }
  
  if (!usuario || !usuario.email) {
    toast('Necesitas estar logueado', 'error');
    return false;
  }
  
  try {
    // 1. Pedir permiso al usuario
    const permiso = await Notification.requestPermission();
    if (permiso !== 'granted') {
      toast('Activa las notificaciones en la configuración del navegador', 'error');
      return false;
    }
    
    // 2. Esperar a que el Service Worker esté listo
    const registration = await navigator.serviceWorker.ready;
    
    // 3. Si hay suscripción previa (de otro usuario en el mismo celular), darse de baja
    // Esto fuerza generar un endpoint nuevo y limpio
    const subscriptionPrevia = await registration.pushManager.getSubscription();
    if (subscriptionPrevia) {
      // Borrar de BD primero (esta suscripción puede haber sido de otro usuario)
      await sb.from('avc_push_subs')
        .delete()
        .eq('endpoint', subscriptionPrevia.endpoint);
      // Cancelar del navegador
      await subscriptionPrevia.unsubscribe();
    }
    
    // 4. Crear suscripción nueva limpia
    const applicationServerKey = urlBase64ToUint8Array(VAPID_PUBLIC_KEY);
    const subscription = await registration.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey
    });
    
    // 5. Guardar en BD (sb es el cliente Supabase)
    const subData = subscription.toJSON();
    
    // Limpiar cualquier suscripción HUÉRFANA del mismo email pero endpoint distinto
    // (caso: el mismo usuario reinstaló la PWA en este mismo celular)
    // Para esto detectamos por user-agent: si hay otra fila con mismo email y mismo user_agent
    // pero distinto endpoint, es huérfana porque el navegador solo escucha 1 endpoint por device.
    const userAgent = navigator.userAgent.substring(0, 200);
    await sb.from('avc_push_subs')
      .delete()
      .eq('email', usuario.email)
      .eq('user_agent', userAgent)
      .neq('endpoint', subData.endpoint);
    
    // Verificar si esta exacta suscripción ya existe (raro, pero por las dudas)
    const { data: existente } = await sb.from('avc_push_subs')
      .select('id')
      .eq('endpoint', subData.endpoint)
      .maybeSingle();
    
    if (existente) {
      // Actualizar email por si cambió de usuario en el mismo celular
      await sb.from('avc_push_subs')
        .update({
          email: usuario.email,
          ultima_uso: new Date().toISOString()
        })
        .eq('id', existente.id);
    } else {
      // Crear nueva
      await sb.from('avc_push_subs').insert({
        email: usuario.email,
        endpoint: subData.endpoint,
        p256dh_key: subData.keys.p256dh,
        auth_key: subData.keys.auth,
        user_agent: navigator.userAgent.substring(0, 200)
      });
    }
    
    console.log('[Push] Suscripción registrada en BD');
    toast('Notificaciones activadas ✓', 'success');
    localStorage.setItem('push_activado', '1');
    actualizarUIPush();
    return true;
    
  } catch (err) {
    console.error('[Push] Error activando push:', err);
    toast('Error: ' + err.message, 'error');
    return false;
  }
}

// Desactivar push (borrar suscripción)
async function desactivarPushNotifications() {
  try {
    const registration = await navigator.serviceWorker.ready;
    const subscription = await registration.pushManager.getSubscription();
    
    if (subscription) {
      // Borrar de BD primero
      await sb.from('avc_push_subs')
        .delete()
        .eq('endpoint', subscription.endpoint);
      
      // Cancelar suscripción del navegador
      await subscription.unsubscribe();
    }
    
    localStorage.setItem('push_activado', '0');
    toast('Notificaciones desactivadas', 'info');
    actualizarUIPush();
  } catch (err) {
    console.error('[Push] Error desactivando:', err);
    toast('Error: ' + err.message, 'error');
  }
}

// Al hacer login, si ya hay suscripción push activa, reasignarla al usuario actual
// Esto evita el bug donde un cel con varios logins envía push al usuario equivocado
async function reasignarPushAlUsuarioActual() {
  if (!pushSoportado() || !usuario?.email) return;
  if (estadoPushPermiso() !== 'granted') return;
  
  try {
    const registration = await navigator.serviceWorker.ready;
    const subscription = await registration.pushManager.getSubscription();
    if (!subscription) return;
    
    const endpoint = subscription.endpoint;
    const userAgent = navigator.userAgent.substring(0, 200);
    
    // Buscar la fila por endpoint
    const { data: existente } = await sb.from('avc_push_subs')
      .select('id, email')
      .eq('endpoint', endpoint)
      .maybeSingle();
    
    if (existente && existente.email !== usuario.email) {
      // El endpoint estaba registrado a otro email → cambiar al actual
      await sb.from('avc_push_subs')
        .update({ email: usuario.email, ultima_uso: new Date().toISOString() })
        .eq('id', existente.id);
      console.log('[Push] Reasignada suscripción de', existente.email, 'a', usuario.email);
    } else if (existente) {
      // Mismo usuario, solo actualizar ultima_uso
      await sb.from('avc_push_subs')
        .update({ ultima_uso: new Date().toISOString() })
        .eq('id', existente.id);
    }
    
    // Limpiar suscripciones huérfanas del mismo email en este mismo dispositivo
    await sb.from('avc_push_subs')
      .delete()
      .eq('email', usuario.email)
      .eq('user_agent', userAgent)
      .neq('endpoint', endpoint);
      
  } catch (err) {
    console.warn('[Push] Error reasignando suscripción:', err);
  }
}

// Cuando el usuario está logueado, intentar mostrar banner de push
window.addEventListener('csia-usuario-listo', () => {
  reasignarPushAlUsuarioActual();
  maybeShowPushBanner();
});
