// ============================================================
// VALIDACIÓN DE ÁREA DEL LOTE (en vivo)
// ============================================================
async function validarAreaPlan(){
  const loteSel = document.getElementById('progLote');
  const actSel = document.getElementById('progActividad');
  const haInput = document.getElementById('progHa');
  const info = document.getElementById('progAreaInfo');
  const btnProg = document.getElementById('btnProg');
  const box = document.getElementById('progAsignacion');
  if(!loteSel || !actSel || !info) return;

  const loteOpt = loteSel.options[loteSel.selectedIndex];
  const cod = parseInt(actSel.value);
  const ha = parseFloat(haInput?.value || 0);

  if(!loteOpt || !loteOpt.value || !cod){
    info.style.display = 'none';
    return;
  }

  const finca_lote = loteOpt.value;
  const area = parseFloat(loteOpt.getAttribute('data-area') || 0);
  const act = actividadesAll.find(a => a.codigo_actividad === cod);
  const tipo = act?.tipo_captura;

  // Para MTS y NINGUNA no aplica validación de área
  if(tipo === 'MTS' || tipo === 'NINGUNA'){
    info.style.display = 'none';
    // Quitar bloqueo por área si lo había
    haInput.setAttribute('data-area-ok', '1');
    if(btnProg && box && box.getAttribute('data-bloqueado') !== '1') btnProg.disabled = false;
    return;
  }

  if(!area || area <= 0){
    info.style.display = 'none';
    return;
  }

  // Consultar acumulado planificado para misma actividad y lote
  // Solo cuenta no-eliminadas (que estén en cualquier estado, porque todas consumen área)
  const { data } = await sb.from('avc_programacion')
    .select('id, ha_plan, estado, fecha')
    .eq('finca_lote', finca_lote)
    .eq('codigo_actividad', cod)
    .eq('eliminada', false);

  const acumPlan = (data || []).reduce((s, p) => s + parseFloat(p.ha_plan || 0), 0);
  const disponible = area - acumPlan;
  const excede = ha > disponible;
  const cuantasPrevias = (data || []).length;

  let bg = '#E1F5EE', color = '#0F6E56', icon = 'ti-circle-check';
  let msg = '';

  if(cuantasPrevias === 0){
    bg = '#EFF6FF'; color = '#1E40AF'; icon = 'ti-info-circle';
    msg = `<i class="ti ${icon}"></i> Lote ${area} ha · sin tareas previas para esta actividad · disponible <strong>${area.toFixed(2)} ha</strong>`;
  } else if(ha <= 0){
    bg = '#FAF5EE'; color = '#854F0B'; icon = 'ti-info-circle';
    msg = `<i class="ti ${icon}"></i> Lote ${area} ha · ${cuantasPrevias} tarea${cuantasPrevias!==1?'s':''} previa${cuantasPrevias!==1?'s':''} (${acumPlan.toFixed(2)} ha) · disponible <strong>${disponible.toFixed(2)} ha</strong>`;
  } else if(excede){
    bg = '#FCE9E9'; color = '#A32D2D'; icon = 'ti-alert-triangle';
    msg = `<i class="ti ${icon}"></i> <strong>Excede el área disponible</strong>. Lote ${area} ha · ya planificado ${acumPlan.toFixed(2)} ha · estás intentando ${ha.toFixed(2)} ha · máximo permitido <strong>${disponible.toFixed(2)} ha</strong>`;
  } else {
    bg = '#E1F5EE'; color = '#0F6E56'; icon = 'ti-circle-check';
    msg = `<i class="ti ${icon}"></i> Lote ${area} ha · planificado ${acumPlan.toFixed(2)} ha · esta tarea ${ha.toFixed(2)} ha · restará <strong>${(disponible - ha).toFixed(2)} ha</strong>`;
  }

  info.style.background = bg;
  info.style.color = color;
  info.style.border = '1px solid ' + color + '40';
  info.innerHTML = msg;
  info.style.display = 'block';

  // Marcar estado de validación de área
  haInput.setAttribute('data-area-ok', excede ? '0' : '1');

  // Bloquear el botón si excede (sólo si no hay otro bloqueo activo)
  if(btnProg){
    const bloqueadoAsignacion = box && box.getAttribute('data-bloqueado') === '1';
    btnProg.disabled = bloqueadoAsignacion || excede;
  }
}

async function guardarProgramacion(){
  const btn = document.getElementById('btnProg');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const fecha = document.getElementById('progFecha').value;
    const finca_lote = document.getElementById('progLote').value;
    const codigo_actividad = parseInt(document.getElementById('progActividad').value);
    const ha_plan = parseFloat(document.getElementById('progHa').value || 0);
    const personal_plan = parseInt(document.getElementById('progPersonal').value || 0);
    const prioridad = document.getElementById('progPrioridad').value;
    const hora = document.getElementById('progHora').value || null;
    const obs = document.getElementById('progObs').value.trim() || null;

    if(!fecha || !finca_lote || !codigo_actividad)
      throw new Error('Completa fecha, lote y actividad');

    // Leer el bloque de auto-deducción
    const box = document.getElementById('progAsignacion');
    if(!box || box.getAttribute('data-bloqueado') === '1')
      throw new Error('No se puede programar: actividad sin configurar correctamente');

    const modelo = box.getAttribute('data-modelo');
    let email_encargado = box.getAttribute('data-email-encargado') || null;
    let email_supervisor = box.getAttribute('data-email-supervisor') || null;

    // Ajustar según modelo
    if(modelo === 'SUPERVISOR'){
      // En SUPERVISOR solo el supervisor ejecuta; el encargado no recibe la tarea
      email_encargado = null;
    } else if(modelo === 'ENCARGADO'){
      // En ENCARGADO no hay supervisor
      email_supervisor = null;
    }
    // En COMPARTIDA y EXTERNA: ambos email_encargado y email_supervisor se mantienen

    // Validación dinámica según tipo de actividad
    const act = actividadesAll.find(a => a.codigo_actividad === codigo_actividad);
    const tipo = act?.tipo_captura;
    
    if(tipo === 'MTS'){
      if(ha_plan <= 0) throw new Error('Indica los metros proyectados');
    } else if(tipo === 'NINGUNA'){
      // No requiere métrica de avance
    } else {
      if(ha_plan <= 0) throw new Error('Indica HA proyectadas');
      
      // Validación final de área (server-side check para evitar carreras)
      const loteOpt = document.getElementById('progLote').options[document.getElementById('progLote').selectedIndex];
      const area = parseFloat(loteOpt.getAttribute('data-area') || 0);
      if(area > 0){
        const { data: previas } = await sb.from('avc_programacion')
          .select('ha_plan')
          .eq('finca_lote', finca_lote)
          .eq('codigo_actividad', codigo_actividad)
          .eq('eliminada', false);
        const acumPlan = (previas || []).reduce((s, p) => s + parseFloat(p.ha_plan || 0), 0);
        const disponible = area - acumPlan;
        if(ha_plan > disponible){
          throw new Error(`Excede el área disponible. Lote tiene ${area} ha · planificado ${acumPlan.toFixed(2)} ha · máximo permitido para esta tarea: ${disponible.toFixed(2)} ha`);
        }
      }
    }
    // Personal: solo validar si la actividad lo requiere
    if(act?.requiere_personal !== false){
      if(personal_plan <= 0) throw new Error('Indica personal proyectado');
    }

    // Validar que tengamos al menos un destinatario
    if(!email_encargado && !email_supervisor)
      throw new Error('No se puede determinar a quién asignar la tarea');

    // Leer y validar campos extras según tipo_captura
    let qq_plan = null, variedad_plan = null, distancia_siembra_plan = null, ancho_surco_plan = null;
    
    if(tipo === 'HA_QQ'){
      const qqEl = document.getElementById('progQq');
      qq_plan = parseFloat(qqEl?.value || 0);
      if(!qq_plan || qq_plan <= 0) throw new Error('Indica los quintales a aplicar');
    } else if(tipo === 'HA_VARIEDAD'){
      const vEl = document.getElementById('progVariedad');
      variedad_plan = (vEl?.value || '').trim();
      if(!variedad_plan) throw new Error('Indica la variedad planificada');
    } else if(tipo === 'HA_SIEMBRA'){
      const vEl = document.getElementById('progVariedad');
      const dEl = document.getElementById('progDistancia');
      const aEl = document.getElementById('progAncho');
      variedad_plan = (vEl?.value || '').trim();
      distancia_siembra_plan = parseFloat(dEl?.value || 0);
      ancho_surco_plan = parseFloat(aEl?.value || 0);
      if(!variedad_plan) throw new Error('Indica la variedad planificada');
      if(!distancia_siembra_plan || distancia_siembra_plan <= 0) throw new Error('Indica la distancia de siembra');
      if(!ancho_surco_plan || ancho_surco_plan <= 0) throw new Error('Indica el ancho de surco');
    }

    // Campos PM si la actividad es EXTERNA (aplicaciones químicas)
    let mezcla_id = null, dosis_ajustes = null, jornada = null, observacion_pm = null;
    
    if(modelo === 'EXTERNA'){
      const mezclaSel = document.getElementById('progMezcla');
      const jornadaSel = document.getElementById('progJornada');
      const obsPmEl = document.getElementById('progObsPM');
      
      mezcla_id = parseInt(mezclaSel?.value || 0);
      jornada = jornadaSel?.value || '';
      observacion_pm = (obsPmEl?.value || '').trim() || null;
      
      if(!mezcla_id) throw new Error('Selecciona una mezcla para aplicar');
      if(!jornada) throw new Error('Indica la jornada (diurna o nocturna)');
      
      // Capturar dosis ajustadas
      const dosisInputs = document.querySelectorAll('.prog-dosis-input');
      const ajustes = {};
      let alMenosUnaDosis = false;
      dosisInputs.forEach(inp => {
        const pid = parseInt(inp.getAttribute('data-producto-id'));
        const dosis = parseFloat(inp.value || 0);
        if(dosis > 0){
          ajustes[pid] = dosis;
          alMenosUnaDosis = true;
        }
      });
      
      if(!alMenosUnaDosis) throw new Error('Al menos un producto debe tener dosis mayor a cero');
      dosis_ajustes = ajustes;
    }

    // Capturar turno si la actividad es de riego goteo
    let turno = null;
    if(act && act.requiere_detalle === 'avc_riego_goteo'){
      const turnoEl = document.getElementById('progTurno');
      if(turnoEl && turnoEl.value){
        turno = parseInt(turnoEl.value);
      }
    }

    // Capturar horas estimadas si es actividad de riego (cualquier tipo)
    let horas_estimadas = null;
    if(act && (act.requiere_detalle === 'avc_riego_goteo'
            || act.requiere_detalle === 'avc_riego_aspersion'
            || act.requiere_detalle === 'avc_riego_gravedad'
            || act.requiere_detalle === 'avc_riego_pivote')){
      const horasEl = document.getElementById('progHorasEst');
      if(horasEl && horasEl.value !== ''){
        horas_estimadas = parseFloat(horasEl.value);
      }
    }

    // Si es EXTERNA → cae primero a PM como solicitud, no directo al supervisor.
    // PM revisará, ajustará si hace falta y "enviará" a los supervisores.
    const estadoInicial = (modelo === 'EXTERNA') ? 'solicitud_pm' : 'planificado';

    const { data: inserted, error } = await sb.from('avc_programacion').insert({
      fecha,
      finca_lote,
      codigo_actividad,
      ha_plan,
      personal_plan,
      qq_plan,
      variedad_plan,
      distancia_siembra_plan,
      ancho_surco_plan,
      mezcla_id,
      dosis_ajustes,
      jornada,
      observacion_pm,
      observacion_plan: obs,
      estado: estadoInicial,
      creado_por: usuario.email,
      email_encargado,
      email_supervisor,
      hora_programada: hora,
      prioridad,
      turno,
      horas_estimadas
    }).select().single();

    if(error) throw new Error(error.message);

    // Disparar notificación al asignatario (no aplica a EXTERNA: esa la notifica PM al aprobar)
    if(inserted){
      await notificarTareaAsignada(inserted, modelo);
    }

    const msgOk = (modelo === 'EXTERNA') 
      ? 'Solicitud enviada a Planta Mezcla' 
      : 'Tarea programada correctamente';
    toast(msgOk);
    renderJefe(); // refresh
  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Crear tarea';
  }
}

// Variables para el filtro del historial del jefe
let histJefeFiltro = 'todas'; // todas | planificadas | activas | completadas | eliminadas

async function renderJefeHistorial(){
  const distritoNombre = encontrarDistritoDeJefe(usuario.nombre_completo);
  if(!distritoNombre) return '<div class="empty">No se encontró tu distrito.</div>';
  const distrito = jerarquia[distritoNombre];
  const emailsEnc = distrito.encargados.map(e => e.email).filter(Boolean);

  // También incluir lotes donde el supervisor recibe (a través de finca_lote del distrito)
  // Por simplicidad: filtramos por encargado_email O por finca del distrito
  const fincasDistrito = new Set();
  distrito.encargados.forEach(e => e.fincas.forEach(f => fincasDistrito.add(f.codigo)));
  
  // Query: todas las tareas del distrito (encargado del distrito O lote en finca del distrito)
  let query = sb.from('avc_programacion').select('*');
  
  if(histJefeFiltro === 'eliminadas'){
    query = query.eq('eliminada', true);
  } else {
    query = query.eq('eliminada', false);
  }

  if(histJefeFiltro === 'planificadas'){
    query = query.in('estado', ['planificado','pendiente','esperando_supervisor']);
  } else if(histJefeFiltro === 'activas'){
    query = query.in('estado', ['en_curso','esperando_encargado','esperando_supervisor']);
  } else if(histJefeFiltro === 'completadas'){
    query = query.eq('estado', 'completada');
  }
  
  // Filtro por distrito: encargado_email del distrito O finca empieza con código del distrito
  if(emailsEnc.length > 0){
    query = query.in('email_encargado', emailsEnc);
  }
  
  const { data: progs } = await query
    .order('fecha', { ascending: false })
    .order('id', { ascending: false })
    .limit(100);

  // Conteo por filtro para los chips
  const cuentas = await contarHistorialPorFiltro(emailsEnc);

  const chips = [
    {id:'todas', label:'Todas', count: cuentas.todas},
    {id:'planificadas', label:'No ejecutadas', count: cuentas.planificadas},
    {id:'activas', label:'En curso', count: cuentas.activas},
    {id:'completadas', label:'Completadas', count: cuentas.completadas},
    {id:'eliminadas', label:'Eliminadas', count: cuentas.eliminadas}
  ];

  let chipsHtml = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">

  </div>`;

  if(!progs || progs.length === 0){
    return chipsHtml + '<div class="empty"><i class="ti ti-calendar-plus"></i>No hay tareas en este filtro.</div>';
  }

  const itemsHtml = progs.map(p => {
    const enc = distrito.encargados.find(e => e.email === p.email_encargado);
    const noEjecutada = (p.estado === 'planificado' || p.estado === 'pendiente' || p.estado === 'esperando_supervisor');
    const haAtrasada = p.fecha < hoyISO() && noEjecutada;
    const puedeEliminar = !p.eliminada && noEjecutada;
    
    let extra = '';
    if(p.eliminada){
      extra = `<div style="background:#f3f4f6;border-left:3px solid #9ca3af;padding:6px 10px;margin-top:6px;border-radius:4px;font-size:11px;color:#6b7280">
        <strong>Eliminada</strong> ${p.razon_eliminada ? '· ' + p.razon_eliminada : ''}
        <div style="margin-top:2px">${p.eliminada_por || ''} · ${p.eliminada_en ? new Date(p.eliminada_en).toLocaleString('es-HN') : ''}</div>
      </div>`;
    } else if(haAtrasada){
      extra = `<div style="font-size:11px;color:#A32D2D;margin-top:4px"><i class="ti ti-alert-triangle"></i> Atrasada (programada para ${p.fecha})</div>`;
    }
    
    return `<div class="reg-item" ${p.eliminada?'style="opacity:0.6"':''}>
      <div class="reg-head">
        ${p.eliminada ? '<span class="badge" style="background:#e5e7eb;color:#4b5563">Eliminada</span>' : badge(p.estado)}
        <span class="reg-fecha">${p.fecha}</span>
      </div>
      <div class="reg-finca">${actNombre(p.codigo_actividad)} · ${p.finca_lote}</div>
      <div class="reg-meta">${enc ? enc.nombre : (p.email_encargado || p.email_supervisor || '—')} · plan ${p.ha_plan} ha${p.ha_real?` · real ${p.ha_real} ha`:''}</div>
      ${extra}
      ${puedeEliminar ? `<button class="btn-eliminar" onclick="abrirModalEliminar(${p.id}, '${(actNombre(p.codigo_actividad)||'').replace(/'/g,"\\'")}', '${p.finca_lote}')"><i class="ti ti-trash"></i> Eliminar</button>` : ''}
    </div>`;
  }).join('');

  return chipsHtml + itemsHtml;
}

async function contarHistorialPorFiltro(emailsEnc){
  if(emailsEnc.length === 0) return {todas:0,planificadas:0,activas:0,completadas:0,eliminadas:0};
  
  const { data: todasAll } = await sb.from('avc_programacion')
    .select('id, estado, eliminada')
    .in('email_encargado', emailsEnc);
  
  const todas = (todasAll||[]).filter(p => !p.eliminada);
  return {
    todas: todas.length,
    planificadas: todas.filter(p => ['planificado','pendiente','esperando_supervisor'].includes(p.estado)).length,
    activas: todas.filter(p => ['en_curso','esperando_encargado','esperando_supervisor'].includes(p.estado)).length,
    completadas: todas.filter(p => p.estado === 'completada').length,
    eliminadas: (todasAll||[]).filter(p => p.eliminada).length
  };
}

function cambiarFiltroHistorial(filtro){
  histJefeFiltro = filtro;
  routerPorRol();
}

async function confirmarEliminar(progId){
  const razon = (document.getElementById('razonEliminar').value || '').trim();
  if(razon.length < 5){
    toast('La razón debe tener al menos 5 caracteres','error');
    return;
  }
  
  const { error } = await sb.from('avc_programacion').update({
    eliminada: true,
    eliminada_en: new Date().toISOString(),
    eliminada_por: usuario.email,
    razon_eliminada: razon
  }).eq('id', progId);
  
  if(error){
    toast('Error: ' + error.message, 'error');
    return;
  }
  
  closeModal();
  toast('Tarea eliminada');
  routerPorRol();
}

async function renderEncargado(){
  // Defaults y fallback si quedó un tab viejo (capturar) que ya no existe
  if(!currentTab || currentTab === 'capturar') currentTab = 'tareas';
  const tabs = [
    {id:'tareas', label:'Mis tareas'},
    {id:'historial', label:'Historial'}
  ];

  if(currentTab === 'tareas')         body = await renderEncargadoTareas();
  else if(currentTab === 'historial') body = await renderEncargadoHistorial();
  else                                body = await renderEncargadoTareas();

  document.getElementById('appBody').innerHTML = renderTabs(tabs) + `<div class="sec active">${body}</div>`;
}

async function renderEncargadoTareas(){
  const hoy = hoyISO();

  // Traemos en una sola query: hoy + futuras + pendientes (vencidas no completadas)
  // Pendientes vencidas = fecha < hoy AND estado NOT IN (completada, modificada, no_ejecutable)
  const { data: todas, error } = await sb.from('avc_programacion')
    .select('*')
    .eq('email_encargado', usuario.email)
    .eq('eliminada', false)
    .order('fecha', { ascending: true })
    .order('hora_programada', { nullsFirst: false });

  if(error){
    return `<div class="empty"><i class="ti ti-alert-triangle"></i>Error: ${error.message}</div>`;
  }

  // Clasificar
  const estadosCerrados = new Set(['completada','modificada','no_ejecutable']);
  const dHoy = [];
  const dFuturas = [];
  const dVencidas = [];

  (todas || []).forEach(t => {
    if(t.fecha === hoy){
      dHoy.push(t);
    } else if(t.fecha > hoy){
      dFuturas.push(t);
    } else if(!estadosCerrados.has(t.estado)){
      // Pasado, no completada → pendiente
      dVencidas.push(t);
    }
    // Pasado completada → no se muestra
  });

  // Stats de hoy
  const total = dHoy.length;
  const completadas = dHoy.filter(t => estadosCerrados.has(t.estado)).length;
  const haPlan = dHoy.reduce((s,t) => s + parseFloat(t.ha_plan || 0), 0);
  const haReal = dHoy.reduce((s,t) => s + parseFloat(t.ha_real || 0), 0);

  let html = `
    <div class="banner">
      <div class="banner-lbl">Programación recibida</div>
      <div class="banner-txt">${total} tarea${total!==1?'s':''} hoy · ${haPlan.toFixed(1)} ha proyectadas</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Hoy</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${completadas}</div></div>
      <div class="stat"><div class="stat-lbl">Pendientes</div><div class="stat-val" style="${dVencidas.length>0?'color:#A32D2D':''}">${dVencidas.length}</div></div>
    </div>
  `;

  if(total === 0 && dFuturas.length === 0 && dVencidas.length === 0){
    html += '<div class="empty"><i class="ti ti-calendar-off"></i>No tienes tareas asignadas.</div>';
    return html;
  }

  // Helper para renderizar una tarea
  const renderTarea = (t, contexto) => {
    const compartida = esCompartida(t.codigo_actividad);
    const ico = iconoActividad(t.codigo_actividad);
    const prio = t.prioridad === 'alta' ? '<span class="badge b-prio-alta">ALTA</span>' :
                 t.prioridad === 'baja' ? '<span class="badge b-prio-baja">BAJA</span>' : '';
    let metaTxt = '';
    if(t.estado === 'planificado' || t.estado === 'pendiente'){
      metaTxt = `Plan: ${t.ha_plan} ha · ${t.personal_plan} personas`;
    } else if(t.estado === 'esperando_supervisor'){
      metaTxt = `Esperando que el supervisor abra la operación`;
    } else if(t.estado === 'esperando_encargado'){
      metaTxt = `Supervisor registró <strong>${t.ha_real || 0} ha</strong> · falta tu parte`;
    } else if(estadosCerrados.has(t.estado)){
      metaTxt = `${t.ha_real || 0} ha completadas`;
    } else {
      metaTxt = `${t.ha_real || 0}/${t.ha_plan} ha`;
    }

    // En vencidas mostrar el aviso de cuántos días atrás
    let avisoVencida = '';
    if(contexto === 'vencida'){
      const diff = Math.floor((new Date(hoy) - new Date(t.fecha)) / 86400000);
      avisoVencida = `<div style="font-size:11px;color:#A32D2D;font-weight:600;margin-top:4px"><i class="ti ti-alert-circle"></i> Vencida hace ${diff} día${diff!==1?'s':''} (${fmtFecha(t.fecha)})</div>`;
    } else if(contexto === 'futura'){
      avisoVencida = `<div style="font-size:11px;color:#6b7280;margin-top:4px"><i class="ti ti-calendar"></i> Programada para ${fmtFecha(t.fecha)}</div>`;
    }

    return `<div class="tarea-card estado-${t.estado}" onclick="abrirTarea(${t.id})">
      <div class="tarea-head">
        <div class="tarea-left">
          <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
          <div class="tarea-info">
            ${t.hora_programada ? `<div class="tarea-hora">${t.hora_programada}</div>` : ''}
            <div class="tarea-title">${actNombre(t.codigo_actividad)}</div>
          </div>
        </div>
        <div class="tarea-tags">
          ${badge(t.estado)}
          ${prio}
        </div>
      </div>
      <div class="tarea-sub">${t.finca_lote}${compartida ? ' · con supervisor' : ''}</div>
      <div class="tarea-meta">${metaTxt}</div>
      ${avisoVencida}
    </div>`;
  };

  // SECCIÓN 1: HOY
  if(dHoy.length > 0){
    html += '<div class="sec-h">Hoy</div>';
    dHoy.forEach(t => { html += renderTarea(t, 'hoy'); });
  } else {
    html += '<div class="sec-h">Hoy</div>';
    html += '<div class="empty" style="padding:14px"><i class="ti ti-calendar-off"></i>Sin tareas para hoy</div>';
  }

  // SECCIÓN 2: PRÓXIMAS
  if(dFuturas.length > 0){
    html += `<div class="sec-h" style="margin-top:18px">Próximas (${dFuturas.length})</div>`;
    dFuturas.forEach(t => { html += renderTarea(t, 'futura'); });
  }

  // SECCIÓN 3: PENDIENTES VENCIDAS
  if(dVencidas.length > 0){
    html += `<div class="sec-h" style="margin-top:18px;color:#A32D2D"><i class="ti ti-alert-circle"></i> Pendientes sin completar (${dVencidas.length})</div>`;
    dVencidas.forEach(t => { html += renderTarea(t, 'vencida'); });
  }

  return html;
}

async function abrirTarea(id){
  currentDetailId = id;
  console.log('abrirTarea llamada con id:', id, 'tipo:', typeof id);
  
  const { data: t, error } = await sb.from('avc_programacion').select('*').eq('id', id).maybeSingle();
  if(error){ 
    console.error('Error trayendo tarea:', error);
    toast('Error: ' + error.message, 'error'); 
    return; 
  }
  if(!t){ 
    console.warn('Tarea no encontrada para id:', id);
    toast('Tarea no encontrada','error'); 
    return; 
  }
  console.log('Tarea cargada:', t);

  // Traer registros existentes vinculados a esta programación
  const { data: regs } = await sb.from('avc_registros')
    .select('*')
    .eq('programacion_id', id);

  modalContent = renderTareaDetalle(t, regs || []);
  showModal();
}

function renderTareaDetalle(t, regs){
  const compartida = esCompartida(t.codigo_actividad);
  const parteSup = regs.find(r => r.parte_de === 'supervisor');
  const parteEnc = regs.find(r => r.parte_de === 'encargado');
  const parteUnica = regs.find(r => r.parte_de === 'unico');

  let acciones = '';
  if(usuario.rol_avc === 'encargado_finca'){
    if(compartida && parteSup && !parteEnc){
      // Operación compartida, supervisor abrió, falta mi parte
      acciones = `<button class="btn btn-purple" onclick="capturarParteEncargado(${t.id})">Aportar mi parte</button>`;
    } else if(compartida && !parteSup){
      acciones = `<div class="banner amber" style="margin-top:8px"><div class="banner-txt">⏳ Esperando que el supervisor abra la operación</div></div>`;
    } else if(!compartida && !parteUnica && (t.estado === 'planificado' || t.estado === 'pendiente' || t.estado === 'en_curso')){
      // No compartida, no hay registro aún → puedo registrar
      acciones = `<button class="btn btn-primary" onclick="capturarTareaUnica(${t.id})">Registrar avance</button>`;
    }
  } else if(usuario.rol_avc === 'supervisor_actividad' && compartida && !parteSup){
    acciones = `<button class="btn btn-primary" onclick="capturarParteSupervisor(${t.id})">Abrir operación</button>`;
  }

  return `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${actNombre(t.codigo_actividad)}</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">${t.finca_lote} · ${t.fecha}${t.hora_programada?' · '+t.hora_programada:''}</div>

    <div class="detail-section">
      <div class="detail-lbl">Plan</div>
      <div class="detail-row"><span class="key">HA proyectadas</span><span class="val">${t.ha_plan}</span></div>
      <div class="detail-row"><span class="key">Personal proyectado</span><span class="val">${t.personal_plan}</span></div>
      <div class="detail-row"><span class="key">Prioridad</span><span class="val">${t.prioridad || 'media'}</span></div>
      ${t.observacion_plan ? `<div style="font-size:12px;color:#374151;margin-top:8px;background:#f9fafb;padding:8px;border-radius:6px">${t.observacion_plan}</div>` : ''}
    </div>

    ${parteSup ? `<div class="parte parte-supervisor">
      <div class="detail-lbl">Parte del supervisor</div>
      <div class="detail-row"><span class="key">HA registradas</span><span class="val">${parteSup.ha_avance}</span></div>
      ${parteSup.personal_cantidad ? `<div class="detail-row"><span class="key">Personal</span><span class="val">${parteSup.personal_cantidad}</span></div>` : ''}
      ${parteSup.observaciones ? `<div style="font-size:12px;color:#04342C;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteSup.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteSup.registrado_por} · ${fmtFecha(parteSup.fecha_registro)}</div>
    </div>` : ''}

    ${parteEnc ? `<div class="parte parte-encargado">
      <div class="detail-lbl">Parte del encargado</div>
      <div class="detail-row"><span class="key">Personal</span><span class="val">${parteEnc.personal_cantidad}</span></div>
      ${parteEnc.observaciones ? `<div style="font-size:12px;color:#042C53;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteEnc.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteEnc.registrado_por} · ${fmtFecha(parteEnc.fecha_registro)}</div>
    </div>` : ''}

    ${parteUnica ? `<div class="parte parte-encargado">
      <div class="detail-lbl">Registro</div>
      <div class="detail-row"><span class="key">HA real</span><span class="val">${parteUnica.ha_avance}</span></div>
      <div class="detail-row"><span class="key">Personal</span><span class="val">${parteUnica.personal_cantidad}</span></div>
      ${parteUnica.observaciones ? `<div style="font-size:12px;color:#042C53;margin-top:8px;background:white;padding:8px;border-radius:6px">${parteUnica.observaciones}</div>` : ''}
      <div class="firma">Firmado por ${parteUnica.registrado_por} · ${fmtFecha(parteUnica.fecha_registro)}</div>
    </div>` : ''}

    ${acciones}
  `;
}

  if(!act){ toast('Actividad no encontrada en catálogo','error'); return; }

function armarFormularioCaptura(act, parte, prog){
  // act: row de avc_actividades con tipo_captura, modelo_comparticion, requiere_personal/horario/vs
  // parte: 'unico' | 'supervisor' | 'encargado'
  // prog: row de avc_programacion (puede ser null en captura libre)
  const planHa  = prog ? (prog.ha_plan || '')       : '';
  const planPer = prog ? (prog.personal_plan || 0)  : 0;

  // === CASO ESPECIAL: encargado en compartida/externa → solo personal + obs ===
  if(parte === 'encargado'){
    return `
      <div class="banner blue">
        <div class="banner-lbl">Parte del encargado</div>
        <div class="banner-txt">Aporta personal y observaciones. El HA y datos técnicos los registra el supervisor.</div>
      </div>
      <div class="field">
        <label>Personal asignado</label>
        <input type="number" id="cPersonal" value="${planPer}" min="0"/>
      </div>
      <input type="hidden" id="cHa" value="0"/>
      <input type="hidden" id="cFin"/>
      <div class="field" style="margin-top:13px">
        <label>Observaciones</label>
        <textarea id="cObs" placeholder="Notas operativas, clima, incidencias..."></textarea>
      </div>
    `;
  }

  // === FORMULARIO COMPLETO (unico o supervisor) ===
  const tipo = act.tipo_captura;
  
  // El supervisor NO captura personal en operaciones COMPARTIDA/EXTERNA:
  // ese campo lo aporta el encargado en su parte. En modelos ENCARGADO/SUPERVISOR puro
  // (parte='unico'), respeta el flag de la actividad.
  const esComparticionDoble = (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');
  let reqPersonal = act.requiere_personal !== false;
  if(parte === 'supervisor' && esComparticionDoble) reqPersonal = false;
  
  const reqHorario  = act.requiere_horario  !== false;
  const reqVs       = act.requiere_vs       === true;

  // Banner según parte
  let banner = '';
  if(parte === 'supervisor'){
    banner = `<div class="banner purple">
      <div class="banner-lbl">Parte del supervisor</div>
      <div class="banner-txt">Al guardar, la tarea pasará a esperar al encargado.</div>
    </div>`;
  } else {
    banner = `<div class="banner">
      <div class="banner-lbl">Registrar avance</div>
      <div class="banner-txt">${actNombre(act.codigo_actividad)}</div>
    </div>`;
  }

  let html = banner;

  // ====== CAMPOS DE AVANCE según tipo_captura ======
  if(tipo === 'HA'){
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>`;
  } else if(tipo === 'MTS'){
    html += `<div class="field">
      <label>Metros avanzados</label>
      <input type="number" step="0.01" id="cMts" value="" min="0"/>
    </div>
    <input type="hidden" id="cHa" value="0"/>`;
  } else if(tipo === 'NINGUNA'){
    html += `<input type="hidden" id="cHa" value="0"/>`;
  } else if(tipo === 'HA_QQ'){
    const qqSugerido = prog && prog.qq_plan ? prog.qq_plan : '';
    html += `<div class="field-row">
      <div class="field"><label>HA avanzadas</label><input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/></div>
      <div class="field"><label>Quintales aplicados</label><input type="number" step="0.01" id="cQq" value="${qqSugerido}" min="0"/></div>
    </div>
    ${prog && prog.qq_plan ? `<div class="field-help" style="margin-top:-8px;margin-bottom:14px;color:#0F4F8C">📋 Plan: ${prog.qq_plan} qq</div>` : ''}`;
  } else if(tipo === 'HA_VARIEDAD'){
    const varSugerida = (prog && prog.variedad_plan) ? prog.variedad_plan : lote_variedad_default(prog);
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>
    <div class="field">
      <label>Variedad</label>
      <input type="text" id="cVariedad" value="${varSugerida.replace(/"/g,'&quot;')}" placeholder="Ej: LAICA 00-301"/>
      ${prog && prog.variedad_plan ? `<div class="field-help" style="color:#0F4F8C">📋 Plan: ${prog.variedad_plan}</div>` : ''}
    </div>`;
  } else if(tipo === 'HA_SIEMBRA'){
    const varSugerida = (prog && prog.variedad_plan) ? prog.variedad_plan : lote_variedad_default(prog);
    const distSugerida = (prog && prog.distancia_siembra_plan) ? prog.distancia_siembra_plan : '1.5';
    const anchoSugerido = (prog && prog.ancho_surco_plan) ? prog.ancho_surco_plan : '2';
    html += `<div class="field">
      <label>HA avanzadas</label>
      <input type="number" step="0.01" id="cHa" value="${planHa}" min="0"/>
    </div>
    <div class="field">
      <label>Variedad</label>
      <input type="text" id="cVariedad" value="${varSugerida.replace(/"/g,'&quot;')}" placeholder="Ej: LAICA 00-301"/>
    </div>
    <div class="field-row">
      <div class="field"><label>Distancia siembra (m)</label><input type="number" step="0.01" id="cDist" value="${distSugerida}"/></div>
      <div class="field"><label>Ancho surco (m)</label><input type="number" step="0.01" id="cAncho" value="${anchoSugerido}"/></div>
    </div>
    ${prog && (prog.variedad_plan || prog.distancia_siembra_plan) ? `<div class="field-help" style="margin-top:-8px;margin-bottom:14px;color:#0F4F8C">📋 Plan: ${prog.variedad_plan || '—'} · ${prog.distancia_siembra_plan || '?'}×${prog.ancho_surco_plan || '?'} m</div>` : ''}`;
  } else {
    // Tipo NULL (monitoreos pendientes) o desconocido → fallback
    html += `<input type="hidden" id="cHa" value="0"/>
    <div class="field-help" style="color:#B91C1C;margin-bottom:10px">⚠ Esta actividad aún no tiene campos definidos. Solo se guardará personal y observaciones.</div>`;
  }

  // ====== PERSONAL ======
  if(reqPersonal){
    html += `<div class="field">
      <label>Personal</label>
      <input type="number" id="cPersonal" value="${planPer}" min="0"/>
    </div>`;
  } else {
    html += `<input type="hidden" id="cPersonal" value="0"/>`;
  }

  // ====== HORARIO ======
  if(reqHorario){
    html += `<div class="field-row">
      <div class="field"><label>Hora inicio</label><input type="time" id="cHoraIni"/></div>
      <div class="field"><label>Hora fin</label><input type="time" id="cHoraFin"/></div>
    </div>`;
  }

  // ====== VASOS COTESIA ======
  if(reqVs){
    html += `<div class="field">
      <label>Vasos cotesia</label>
      <input type="number" id="cVs" value="" min="0"/>
    </div>`;
  }

  // ====== CHECKBOX LOTE FINALIZADO ======
  html += `<div class="check-row" id="cFinChk" onclick="toggleCFin()">
    <input type="checkbox" id="cFin"/>
    <label>Marcar lote como finalizado</label>
  </div>`;

  // ====== OBSERVACIONES ======
  html += `<div class="field" style="margin-top:13px">
    <label>Observaciones</label>
    <textarea id="cObs" placeholder="Notas operativas, clima, incidencias..."></textarea>
  </div>`;

  return html;
}

function lote_variedad_default(prog){
  if(!prog) return '';
  const lote = plantios.find(p => p.finca_lote === prog.finca_lote);
  return lote && lote.variedad ? lote.variedad.replace(/"/g,'&quot;') : '';
}

function toggleCFin(){
  const chk = document.getElementById('cFin');
  chk.checked = !chk.checked;
  const wrap = document.getElementById('cFinChk');
  if(wrap) wrap.classList.toggle('checked', chk.checked);
}

async function guardarCapturaPlan(){
  const btn = document.getElementById('btnCaptura');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const { progId, parte } = captureContext;
    const { data: t } = await sb.from('avc_programacion').select('*').eq('id', progId).single();
    if(!t) throw new Error('Programación no encontrada');

    // Leer todos los campos posibles (sólo si el input existe)
    const $ = id => document.getElementById(id);
    const numOrNull = id => { const el = $(id); if(!el || el.value === '') return null; const v = parseFloat(el.value); return isNaN(v) ? null : v; };
    const intOrNull = id => { const el = $(id); if(!el || el.value === '') return null; const v = parseInt(el.value); return isNaN(v) ? null : v; };
    const strOrNull = id => { const el = $(id); if(!el) return null; const v = (el.value||'').trim(); return v || null; };

    const ha          = parseFloat($('cHa')?.value || 0);
    const personal    = parseInt($('cPersonal')?.value || 0);
    const finalizado  = $('cFin')?.checked || false;
    const obs         = strOrNull('cObs');
    const mts         = numOrNull('cMts');
    const qq          = numOrNull('cQq');
    const variedad    = strOrNull('cVariedad');
    const distancia   = numOrNull('cDist');
    const anchoSurco  = numOrNull('cAncho');
    const horaIni     = strOrNull('cHoraIni');
    const horaFin     = strOrNull('cHoraFin');
    const vs          = intOrNull('cVs');

    // Catálogo de la actividad para validar requerimientos
    const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
    const tipo = act?.tipo_captura;

    // Validaciones según parte
    if(parte === 'encargado'){
      if(personal <= 0) throw new Error('Indica personal');
    } else {
      // Validar avance según tipo
      if(tipo === 'HA' || tipo === 'HA_QQ' || tipo === 'HA_VARIEDAD' || tipo === 'HA_SIEMBRA'){
        if(ha <= 0) throw new Error('Indica HA avanzadas');
      }
      if(tipo === 'MTS' && (!mts || mts <= 0)) throw new Error('Indica metros avanzados');
      if(tipo === 'HA_QQ' && (qq == null || qq < 0)) throw new Error('Indica quintales aplicados');
      if((tipo === 'HA_VARIEDAD' || tipo === 'HA_SIEMBRA') && !variedad) throw new Error('Indica variedad');
      
      // Personal: solo validar si la actividad lo requiere Y no es supervisor en compartida/externa
      const esComparticionDoble2 = act && (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');
      const supervisorEnCompartida = (parte === 'supervisor' && esComparticionDoble2);
      if(act?.requiere_personal !== false && !supervisorEnCompartida && personal <= 0){
        throw new Error('Indica personal');
      }
      
      if(act?.requiere_vs === true && (vs == null || vs < 0)) throw new Error('Indica vasos cotesia');
    }

    // Insertar registro con TODOS los campos posibles
    const { error: e1 } = await sb.from('avc_registros').insert({
      programacion_id: progId,
      fecha: t.fecha,
      finca_lote: t.finca_lote,
      codigo_actividad: t.codigo_actividad,
      ha_avance: parte === 'encargado' ? 0 : ha,
      mts_avance: mts,
      qq_aplicados: qq,
      variedad: variedad,
      distancia_siembra: distancia,
      ancho_surco: anchoSurco,
      hora_inicio: horaIni,
      hora_fin: horaFin,
      vasos_cotesia: vs,
      lote_finalizado: finalizado,
      personal_cantidad: personal,
      observaciones: obs,
      registrado_por: usuario.email,
      parte_de: parte,
      fuera_de_plan: false,
      dispositivo: navigator.userAgent.substring(0, 100)
    });
    if(e1) throw new Error(e1.message);

    // Actualizar estado de la programación
    let nuevoEstado = 'completada';
    let updates = {};

    // Determinar si la actividad es compartida según el modelo de la BD (no por lista hardcoded)
    const esCompartidaReal = act && (act.modelo_comparticion === 'COMPARTIDA' || act.modelo_comparticion === 'EXTERNA');

    if(esCompartidaReal){
      if(parte === 'supervisor'){
        nuevoEstado = 'esperando_encargado';
        updates.ha_real = ha;
        updates.observacion_real = obs;
      } else if(parte === 'encargado'){
        nuevoEstado = 'completada';
        updates.personal_real = personal;
        updates.cerrado_por = usuario.email;
        updates.cerrado_en = new Date().toISOString();
      }
    } else {
      // No compartida: parte 'unico' → cierra de una vez
      nuevoEstado = 'completada';
      updates.ha_real = ha;
      updates.personal_real = personal;
      updates.observacion_real = obs;
      updates.cerrado_por = usuario.email;
      updates.cerrado_en = new Date().toISOString();
    }

    updates.estado = nuevoEstado;

    const { error: e2 } = await sb.from('avc_programacion').update(updates).eq('id', progId);
    if(e2) throw new Error(e2.message);

    // Notificar al jefe que creó la tarea, solo si quedó como completada
    if(nuevoEstado === 'completada'){
      const { data: progActual } = await sb.from('avc_programacion')
        .select('*').eq('id', progId).maybeSingle();
      if(progActual) await notificarTareaCompletada(progActual);
    }

    toast('Registro guardado correctamente');
    closeModal();
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

function actualizarLotesCaptura(){

  let lotesDisp = plantios.filter(p => p.descripcion_finca === finca);
  if(usuario.rol_avc === 'encargado_finca'){
    lotesDisp = lotesDisp.filter(p => p.encargado_finca === usuario.nombre_completo);
  }

  sel.innerHTML = '<option value="">Seleccionar lote...</option>' +
    lotesDisp.map(p => `<option value="${p.finca_lote}">${p.finca_lote} (${p.area_ha} ha)</option>`).join('');

async function guardarCapturaLibre(){
  const btn = document.getElementById('btnCL');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const { codigo } = captureContext;
    const finca_lote = document.getElementById('clLote').value;
    const fecha = document.getElementById('clFecha').value;
    const ha = parseFloat(document.getElementById('clHa').value || 0);
    const personal = parseInt(document.getElementById('clPersonal').value || 0);
    const obs = document.getElementById('clObs').value.trim() || null;
    const obsFp = document.getElementById('clObsFp').value.trim();

    if(!finca_lote) throw new Error('Selecciona un lote');
    if(!fecha) throw new Error('Selecciona fecha');
    if(ha <= 0) throw new Error('Indica HA avance');
    if(!obsFp) throw new Error('La justificación fuera de plan es obligatoria');

    const { error } = await sb.from('avc_registros').insert({
      programacion_id: null,
      fecha,
      finca_lote,
      codigo_actividad: codigo,
      ha_avance: ha,
      lote_finalizado: document.getElementById('clFin').checked,
      personal_cantidad: personal > 0 ? personal : null,
      observaciones: obs,
      observacion_fuera_plan: obsFp,
      fuera_de_plan: true,
      parte_de: 'unico',
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 100)
    });

    if(error) throw new Error(error.message);
    toast('Registro guardado');
    closeModal();
  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

    .neq('estado', 'solicitud_pm')
    .order('hora_programada', { nullsFirst: false });

  const total = (progs || []).length;
  const compl = (progs || []).filter(p => p.estado === 'completada').length;

      const fincaNombre = lote ? lote.descripcion_finca : p.finca_lote;

      grouped[fincaNombre].push(p);

    Object.entries(grouped).forEach(([finca, ops]) => {
      html += `<div class="sec-h"><span><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${finca}</span></div>`;

        html += `<div class="tarea-card estado-${p.estado}" onclick="abrirTarea(${p.id})">

        </div>`;
      });
    });
  }

  return html;
}

    {id:'libre',     label:'Captura libre'},
    {id:'historial', label:'Historial'}
  ];
  if(!currentTab) currentTab = 'tareas';

  renderHeader();

  let body = '';
  if(currentTab === 'tareas')          body = await renderOperadorCampoTareas();
  else if(currentTab === 'libre')      body = await renderOperadorCampoCapturar();
  else if(currentTab === 'historial')  body = await renderOperadorCampoHistorial();
  else                                 body = await renderOperadorCampoTareas();

  document.getElementById('appBody').innerHTML = `
    ${renderTabs(tabs)}
    <div class="sec active">${body}</div>
  `;
}

async function renderOperadorCampoTareas(){
  const hoy = hoyISO();

  // El jefe asigna las mediciones poniendo el email del operador en email_supervisor
  // (reutilizamos esa columna porque el flujo es: 1 ejecutor único, sin encargado)
  const { data: tareas, error } = await sb.from('avc_programacion')
    .select('*')
    .eq('email_supervisor', usuario.email)
    .eq('fecha', hoy)
    .eq('eliminada', false)
    .neq('estado', 'solicitud_pm')
    .order('hora_programada', { nullsFirst: false });

  if(error){
    return `<div class="empty"><i class="ti ti-alert-triangle"></i>Error: ${error.message}</div>`;
  }

  const total = (tareas || []).length;
  const compl = (tareas || []).filter(t => t.estado === 'completada' || t.estado === 'modificada').length;
  const pend  = (tareas || []).filter(t => t.estado === 'planificado' || t.estado === 'pendiente').length;

  let html = `
    <div class="banner blue">
      <div class="banner-lbl">Mediciones del día</div>
      <div class="banner-txt">${total} tarea${total!==1?'s':''} asignada${total!==1?'s':''} hoy</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${compl}</div></div>
      <div class="stat"><div class="stat-lbl">Pend.</div><div class="stat-val">${pend}</div></div>
    </div>
  `;

  if(total === 0){
    html += `<div class="empty"><i class="ti ti-calendar-off"></i>Sin tareas asignadas hoy. Puedes registrar una medición espontánea desde "Captura libre".</div>`;
    return html;
  }

  tareas.forEach(t => {
    const ico = iconoActividad(t.codigo_actividad);
    const prio = t.prioridad === 'alta' ? '<span class="badge b-prio-alta">ALTA</span>' :
                 t.prioridad === 'baja' ? '<span class="badge b-prio-baja">BAJA</span>' : '';
    let metaTxt = '';
    if(t.estado === 'planificado' || t.estado === 'pendiente'){
      metaTxt = `Pendiente de medición`;
    } else if(t.estado === 'completada' || t.estado === 'modificada'){
      metaTxt = `Completada`;
    } else {
      metaTxt = t.estado;
    }
    html += `<div class="tarea-card estado-${t.estado}" onclick="abrirTareaOperador(${t.id})">
      <div class="tarea-head">
        <div class="tarea-left">
          <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
          <div class="tarea-info">
            ${t.hora_programada ? `<div class="tarea-hora">${t.hora_programada}</div>` : ''}
            <div class="tarea-title">${actNombre(t.codigo_actividad)}</div>
          </div>
        </div>
        <div class="tarea-tags">${badge(t.estado)}${prio}</div>
      </div>
      <div class="tarea-sub">${t.finca_lote}</div>
      <div class="tarea-meta">${metaTxt}</div>
    </div>`;
  });

  return html;
}

async function abrirTareaOperador(progId){
  // Cargar la programación
  const { data: t, error } = await sb.from('avc_programacion')
    .select('*').eq('id', progId).maybeSingle();
  if(error || !t){
    toast('No se pudo cargar la tarea', 'error');
    return;
  }

  // Si la tarea ya está completada, abrir en modo lectura
  if(t.estado === 'completada' || t.estado === 'modificada'){
    toast('Esta tarea ya fue completada', 'info');
    return;
  }

  // Detectar el flujo según la actividad
  const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
  if(!act){
    toast('Actividad no encontrada en catálogo', 'error');
    return;
  }

  if(act.requiere_detalle === 'avc_riego_humedad'){
    return abrirCapturaHumedad(t);
  }
  if(act.requiere_detalle === 'avc_riego_caudales'){
    toast('Captura de caudales aún no implementada', 'info');
    return;
  }
  toast('Tipo de actividad no manejado por la app del operador: ' + (act.requiere_detalle || 'sin tabla detalle'), 'error');
}

async function abrirCapturaHumedad(programacion){
  // Si llega con `programacion`, es captura desde tarea asignada.
  // Si no, es captura libre (fuera de plan).
  const esProgramada = !!programacion;

  // Guardar contexto para guardarMedicionHumedad
  window.__humProgramacion = programacion || null;

  // Determinar finca/lote preseleccionados si viene de programación
  let preFinca = '';
  let preLote = '';
  let preFincaDescripcion = '';
  if(esProgramada){
    // finca_lote viene como "AGRICASA01" → necesitamos descripcion_finca para mostrar bonito
    const fLote = programacion.finca_lote;
    // Buscar en plantios para sacar descripción
    const reg = plantios.find(p => p.finca_lote === fLote);
    if(reg){
      preFincaDescripcion = reg.descripcion_finca;
      preFinca = reg.descripcion_finca;
    } else {
      // Si no está en plantios cargados, consultamos directo
      const { data } = await sb.from('maestro_plantios')
        .select('descripcion_finca, lote')
        .eq('finca_lote', fLote)
        .maybeSingle();
      if(data){
        preFincaDescripcion = data.descripcion_finca;
        preFinca = data.descripcion_finca;
        preLote = data.lote;
      }
    }
    // Si no obtuvimos el lote por la búsqueda anterior, extraerlo del finca_lote
    if(!preLote){
      const m = fLote.match(/\d+$/);
      preLote = m ? parseInt(m[0]) : '';
    }
  }

  // Fincas para captura libre (no programada)
  const fincasUnicas = [...new Set(plantios.map(p => p.descripcion_finca))]
    .filter(Boolean).sort();

  // Banner de contexto si es programada
  const contextoBanner = esProgramada ? `
    <div style="background:#E6F1FB;border-left:3px solid #185FA5;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#0C447C;text-transform:uppercase;letter-spacing:0.04em">Tarea programada</div>
      <div style="font-size:13px;color:#185FA5;margin-top:4px">
        <strong>${preFincaDescripcion || programacion.finca_lote}</strong> · Lote ${preLote}
      </div>
      ${programacion.horas_estimadas ? `<div style="font-size:12px;color:#185FA5;margin-top:2px"><i class="ti ti-clock"></i> ${programacion.horas_estimadas} horas estimadas de duración</div>` : ''}
      ${programacion.observacion_plan ? `<div style="font-size:11px;color:#185FA5;margin-top:4px;font-style:italic">Nota del jefe: "${programacion.observacion_plan}"</div>` : ''}
    </div>
  ` : `
    <div style="background:#FBF5E6;border-left:3px solid #BA7517;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em">Captura libre</div>
      <div style="font-size:12px;color:#A06410;margin-top:2px">Medición espontánea, fuera del plan diario</div>
    </div>
  `;

  // Bloque de finca y lote (lockeado si es programada)
  const bloqueFincaLote = esProgramada ? `
    <div class="field">
      <label>Finca</label>
      <input type="text" value="${preFincaDescripcion || programacion.finca_lote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <div class="field">
      <label>Lote</label>
      <input type="text" value="Lote ${preLote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <input type="hidden" id="humFinca" value="${preFinca}"/>
    <input type="hidden" id="humLote" value="${preLote}"/>
  ` : `
    <div class="field">
      <label>Finca</label>
      <select id="humFinca" onchange="actualizarLotesHumedad()">
        <option value="">Seleccionar...</option>
        ${fincasUnicas.map(f => `<option value="${f}">${f}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Lote</label>
      <select id="humLote"><option value="">Primero elige finca</option></select>
    </div>
  `;

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Medición de humedad</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. 69901</div>
    ${contextoBanner}
    ${bloqueFincaLote}

    <div class="field-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="humFecha" value="${hoyISO()}"/>
      </div>
      <div class="field">
        <label>Hora medición</label>
        <input type="time" id="humHora" value="${horaActual()}"/>
      </div>
    </div>

    <div class="field">
      <label>Tipo de medición</label>
      <div class="seg-control" style="display:flex;gap:6px;margin-top:6px">
        <button type="button" class="seg-btn active" id="tipoEmp"
                onclick="seleccionarTipoMedicion('EMPIRICA')">
          <i class="ti ti-eye"></i> Empírica / Calicata
        </button>
        <button type="button" class="seg-btn" id="tipoTens"
                onclick="seleccionarTipoMedicion('TENSIOMETROS')">
          <i class="ti ti-gauge"></i> Tensiómetros
        </button>
      </div>
    </div>

    <!-- Bloque EMPÍRICA -->
    <div id="bloqueEmpirica" class="hum-bloque">
      <div class="field">
        <label>Estado del suelo</label>
        <div class="estado-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px">
          <button type="button" class="estado-btn" data-estado="MARCHITEZ"
                  onclick="seleccionarEstado('MARCHITEZ')"
                  style="padding:14px 8px;border:1.5px solid #FCA5A5;background:#FEF2F2;color:#991B1B;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">
            <i class="ti ti-flame" style="display:block;font-size:22px;margin-bottom:4px"></i>
            Marchitez<br><span style="font-weight:400;font-size:10px">(bajo)</span>
          </button>
          <button type="button" class="estado-btn" data-estado="CAPACIDAD_CAMPO"
                  onclick="seleccionarEstado('CAPACIDAD_CAMPO')"
                  style="padding:14px 8px;border:1.5px solid #86EFAC;background:#F0FDF4;color:#166534;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">
            <i class="ti ti-check" style="display:block;font-size:22px;margin-bottom:4px"></i>
            Cap. campo<br><span style="font-weight:400;font-size:10px">(óptimo)</span>
          </button>
          <button type="button" class="estado-btn" data-estado="SATURADO"
                  onclick="seleccionarEstado('SATURADO')"
                  style="padding:14px 8px;border:1.5px solid #93C5FD;background:#EFF6FF;color:#1E40AF;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">
            <i class="ti ti-droplet-filled" style="display:block;font-size:22px;margin-bottom:4px"></i>
            Saturado<br><span style="font-weight:400;font-size:10px">(alto)</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Bloque TENSIÓMETROS -->
    <div id="bloqueTensiometros" class="hum-bloque" style="display:none">
      <div class="field-row">
        <div class="field">
          <label>Medición 20 cm <span style="color:#6b7280;font-weight:400">(cb)</span></label>
          <input type="number" step="0.1" id="humTens20" placeholder="0.0"/>
        </div>
        <div class="field">
          <label>Medición 40 cm <span style="color:#6b7280;font-weight:400">(cb)</span></label>
          <input type="number" step="0.1" id="humTens40" placeholder="0.0"/>
        </div>
      </div>
      <div style="font-size:11px;color:#6b7280;margin-top:-8px;margin-bottom:10px">
        Datos en centibares (cb). Valores altos = suelo seco.
      </div>
    </div>

    <div class="field">
      <label>Observaciones</label>
      <textarea id="humObs" placeholder="Notas adicionales sobre la medición..."></textarea>
    </div>

    <button class="btn btn-primary" id="btnHum" onclick="guardarMedicionHumedad()">
      <i class="ti ti-device-floppy"></i> Guardar medición
    </button>
  `;

  // Estado interno del modal
  window.__humTipo = 'EMPIRICA';
  window.__humEstado = null;

  showModal();
}

async function actualizarLotesHumedad(){
  const finca = document.getElementById('humFinca').value;
  const sel = document.getElementById('humLote');
  if(!finca){
    sel.innerHTML = '<option value="">Primero elige finca</option>';
    return;
  }
  sel.innerHTML = '<option value="">Cargando lotes...</option>';

  const { data: lotes, error } = await sb.from('maestro_plantios')
    .select('lote')
    .eq('descripcion_finca', finca)
    .order('lote');

  if(error){
    sel.innerHTML = '<option value="">Error cargando lotes</option>';
    toast('Error: ' + error.message, 'error');
    return;
  }

  const lotesUnicos = [...new Set((lotes || []).map(p => p.lote))].filter(l => l != null);
  if(lotesUnicos.length === 0){
    sel.innerHTML = '<option value="">No hay lotes para esta finca</option>';
    return;
  }
  sel.innerHTML = `<option value="">Seleccionar lote...</option>` +
    lotesUnicos.map(l => `<option value="${l}">Lote ${l}</option>`).join('');
}

function seleccionarTipoMedicion(tipo){
  window.__humTipo = tipo;
  window.__humEstado = null;

  // Toggle botones segmentados
  document.getElementById('tipoEmp').classList.toggle('active', tipo === 'EMPIRICA');
  document.getElementById('tipoTens').classList.toggle('active', tipo === 'TENSIOMETROS');

  // Mostrar/ocultar bloques
  document.getElementById('bloqueEmpirica').style.display    = tipo === 'EMPIRICA'     ? '' : 'none';
  document.getElementById('bloqueTensiometros').style.display = tipo === 'TENSIOMETROS' ? '' : 'none';

  // Limpiar selección de estado
  document.querySelectorAll('.estado-btn').forEach(b => {
    b.style.transform = '';
    b.style.boxShadow = '';
  });
}

function seleccionarEstado(estado){
  window.__humEstado = estado;
  document.querySelectorAll('.estado-btn').forEach(b => {
    const sel = b.dataset.estado === estado;
    b.style.transform = sel ? 'scale(1.03)' : '';
    b.style.boxShadow = sel ? '0 0 0 3px rgba(29,158,117,0.25)' : '';
  });
}

async function guardarMedicionHumedad(){
  const btn = document.getElementById('btnHum');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const finca   = document.getElementById('humFinca').value;
    const loteRaw = document.getElementById('humLote').value;
    const fecha   = document.getElementById('humFecha').value;
    const hora    = document.getElementById('humHora').value || null;
    const obs     = document.getElementById('humObs').value.trim() || null;
    const tipo    = window.__humTipo;
    const prog    = window.__humProgramacion || null;
    const esProgramada = !!prog;

    if(!finca)    throw new Error('Selecciona una finca');
    if(!loteRaw)  throw new Error('Selecciona un lote');
    if(!fecha)    throw new Error('Indica la fecha de medición');

    const lote = parseInt(loteRaw);
    const payload = {
      programacion_id: esProgramada ? prog.id : null,
      finca,
      lote,
      fecha,
      hora_medicion: hora,
      tipo_medicion: tipo,
      observaciones: obs,
      fuera_de_plan: !esProgramada,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    if(tipo === 'EMPIRICA'){
      if(!window.__humEstado) throw new Error('Selecciona el estado del suelo');
      payload.empirica_estado = window.__humEstado;
    } else {
      const t20 = parseFloat(document.getElementById('humTens20').value);
      const t40 = parseFloat(document.getElementById('humTens40').value);
      if(isNaN(t20) || isNaN(t40)) throw new Error('Indica ambas mediciones (20 cm y 40 cm)');
      payload.tens_20cm = t20;
      payload.tens_40cm = t40;
    }

    // 1) Insertar la medición
    const { error: e1 } = await sb.from('avc_riego_humedad').insert(payload);
    if(e1) throw new Error(e1.message);

    // 2) Si vino de una tarea programada, marcarla como completada
    if(esProgramada){
      const { error: e2 } = await sb.from('avc_programacion')
        .update({
          estado: 'completada',
          observacion_real: obs,
          cerrado_por: usuario.email,
          cerrado_en: new Date().toISOString()
        })
        .eq('id', prog.id);
      if(e2){
        console.warn('No se pudo cerrar la programación:', e2);
        // No throw: la medición se guardó, esto es secundario
      }

      // 3) Notificar al jefe que creó la tarea
      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) { /* notificación es best-effort */ }
    }

    toast(esProgramada ? 'Medición guardada y tarea completada' : 'Medición guardada correctamente');
    closeModal();
    window.__humProgramacion = null;
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar medición';
  }
}

async function renderOperadorCampoHistorial(){
  const { data: regs, error } = await sb.from('avc_riego_humedad')
    .select('*')
    .eq('registrado_por', usuario.email)
    .order('fecha', { ascending: false })
    .order('hora_medicion', { ascending: false })
    .limit(50);

  if(error){
    return `<div class="empty"><i class="ti ti-alert-triangle"></i>Error: ${error.message}</div>`;
  }
  if(!regs || regs.length === 0){
    return '<div class="empty"><i class="ti ti-file-text"></i>Aún no tienes mediciones registradas.</div>';
  }

  return regs.map(r => {
    let detalle = '';
    let color = '';
    if(r.tipo_medicion === 'EMPIRICA'){
      const labels = {
        'MARCHITEZ':        {txt:'Marchitez (bajo)',    color:'#991B1B'},
        'CAPACIDAD_CAMPO':  {txt:'Capacidad campo',     color:'#166534'},
        'SATURADO':         {txt:'Saturado (alto)',     color:'#1E40AF'}
      };
      const e = labels[r.empirica_estado] || {txt:r.empirica_estado, color:'#6b7280'};
      detalle = `<span style="color:${e.color};font-weight:600">${e.txt}</span>`;
    } else {
      detalle = `<span>20 cm: <strong>${r.tens_20cm} cb</strong> · 40 cm: <strong>${r.tens_40cm} cb</strong></span>`;
    }

    return `<div class="reg-item" style="cursor:pointer" onclick="mostrarDetalleHistorial('humedad', ${r.id})">
      <div class="reg-head">
        <span class="badge">${r.tipo_medicion === 'EMPIRICA' ? 'Empírica' : 'Tensiómetros'}</span>
        <span class="reg-fecha">${fmtFecha(r.fecha)}${r.hora_medicion ? ' · '+r.hora_medicion.substring(0,5) : ''}</span>
      </div>
      <div class="reg-finca">${r.finca} · Lote ${r.lote}</div>
      <div class="reg-meta">${detalle}</div>
      ${r.observaciones ? `<div class="reg-obs" style="font-size:11px;color:#6b7280;margin-top:4px;font-style:italic">"${r.observaciones}"</div>` : ''}
    </div>`;
  }).join('');
}

async function renderDigitadorRiegosTareas(){

  const { data: tareas, error } = await sb.from('avc_programacion')
    .select('*')
    .eq('email_supervisor', usuario.email)
    .eq('fecha', hoy)
    .eq('eliminada', false)
    .neq('estado', 'solicitud_pm')

  }

  const total = (tareas || []).length;
  const compl = (tareas || []).filter(t => t.estado === 'completada' || t.estado === 'modificada').length;
  const pend  = (tareas || []).filter(t => t.estado === 'planificado' || t.estado === 'pendiente').length;

  let html = `
    <div class="banner blue">
      <div class="banner-lbl">Mediciones y riegos del día</div>
      <div class="banner-txt">${total} tarea${total!==1?'s':''} asignada${total!==1?'s':''} hoy</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">Compl.</div><div class="stat-val ok">${compl}</div></div>
      <div class="stat"><div class="stat-lbl">Pend.</div><div class="stat-val">${pend}</div></div>
    </div>
  `;

  if(total === 0){
    html += `<div class="empty"><i class="ti ti-calendar-off"></i>Sin tareas asignadas hoy. Puedes registrar una medición espontánea desde "Captura libre".</div>`;
    return html;
  }

  tareas.forEach(t => {
    const ico = iconoActividad(t.codigo_actividad);
    const prio = t.prioridad === 'alta' ? '<span class="badge b-prio-alta">ALTA</span>' :
                 t.prioridad === 'baja' ? '<span class="badge b-prio-baja">BAJA</span>' : '';
    let metaTxt = '';
    if(t.estado === 'planificado' || t.estado === 'pendiente'){
      metaTxt = `Pendiente de registro`;
    } else if(t.estado === 'completada' || t.estado === 'modificada'){
      metaTxt = `Completada`;
    } else {
      metaTxt = t.estado;
    }
    html += `<div class="tarea-card estado-${t.estado}" onclick="abrirTareaDigitador(${t.id})">
      <div class="tarea-head">
        <div class="tarea-left">
          <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
          <div class="tarea-info">
            ${t.hora_programada ? `<div class="tarea-hora">${t.hora_programada}</div>` : ''}
            <div class="tarea-title">${actNombre(t.codigo_actividad)}</div>
          </div>
        </div>
        <div class="tarea-tags">${badge(t.estado)}${prio}</div>
      </div>
      <div class="tarea-sub">${t.finca_lote || '—'}</div>
      <div class="tarea-meta">${metaTxt}</div>
    </div>`;
  });

  return html;
}

async function abrirTareaDigitador(progId){
  const { data: t, error } = await sb.from('avc_programacion')
    .select('*').eq('id', progId).maybeSingle();
  if(error || !t){
    toast('No se pudo cargar la tarea', 'error');
    return;
  }

  if(t.estado === 'completada' || t.estado === 'modificada'){
    toast('Esta tarea ya fue completada', 'info');
    return;
  }

  const act = actividadesAll.find(a => a.codigo_actividad === t.codigo_actividad);
  if(!act){
    toast('Actividad no encontrada en catálogo', 'error');
    return;
  }

  if(act.requiere_detalle === 'avc_riego_caudales'){
    return abrirCapturaCaudales(t);
  }
  if(act.requiere_detalle === 'avc_riego_aspersion'){
    return abrirCapturaAspersion(t);
  }
  if(act.requiere_detalle === 'avc_riego_gravedad'){
    return abrirCapturaGravedad(t);
  }
  if(act.requiere_detalle === 'avc_riego_pivote'){
    return abrirCapturaPivote(t);
  }
  if(act.requiere_detalle === 'avc_riego_drenajes'){
    return abrirCapturaDrenajes(t);
  }
  toast('Tipo de actividad no manejado por la app del digitador: ' + (act.requiere_detalle || 'sin tabla detalle'), 'error');
}

// Cache de fuentes de agua (ríos / canales / lagunas)
let fuentesAguaCache = null;
async function cargarFuentesAgua(){
  if(fuentesAguaCache) return fuentesAguaCache;
  const { data, error } = await sb.from('pm_fuentes_agua')
    .select('id, codigo, nombre, tipo, unidad')
    .eq('activa', true)
    .order('tipo')
    .order('nombre');
  if(error){ console.error('Error cargando fuentes:', error); return []; }
  fuentesAguaCache = data || [];
  return fuentesAguaCache;
}

async function abrirCapturaCaudales(programacion){

    <div style="background:#FBF5E6;border-left:3px solid #BA7517;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em">Captura libre</div>
      <div style="font-size:12px;color:#A06410;margin-top:2px">Medición espontánea, fuera del plan diario</div>
    </div>
  `;

  // Construir el <select> agrupando por tipo

      opcionesHtml += `<option value="${f.id}" data-unidad="${f.unidad}" data-tipo="${f.tipo}" data-nombre="${f.nombre}">${f.nombre}</option>`;
    });

  if(grupos.canal.length){
    opcionesHtml += '<optgroup label="Canales">';
    grupos.canal.forEach(f => {
      opcionesHtml += `<option value="${f.id}" data-unidad="${f.unidad}" data-tipo="${f.tipo}" data-nombre="${f.nombre}">${f.nombre}</option>`;
    });
    opcionesHtml += '</optgroup>';
  }
  if(grupos.laguna.length){
    opcionesHtml += '<optgroup label="Lagunas">';
    grupos.laguna.forEach(f => {
      opcionesHtml += `<option value="${f.id}" data-unidad="${f.unidad}" data-tipo="${f.tipo}" data-nombre="${f.nombre}">${f.nombre}</option>`;
    });

    <h2>Medición de caudales</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. 69902</div>
    ${contextoBanner}

      <label>Fuente de agua</label>

function onCaudalFuenteChange(){
  const sel = document.getElementById('caudFuente');
  const unidadSpan = document.getElementById('caudUnidad');
  const lbl = document.getElementById('caudValorLbl');
  const help = document.getElementById('caudValorHelp');
  const opt = sel.options[sel.selectedIndex];
  if(!opt || !opt.value){
    unidadSpan.textContent = '—';
    lbl.textContent = 'Valor medido';
    help.style.display = 'none';
    return;
  }
  const unidad = opt.getAttribute('data-unidad');
  const tipo = opt.getAttribute('data-tipo');
  if(unidad === 'metros_cubicos'){
    unidadSpan.textContent = 'm³';
    lbl.textContent = 'Volumen';
    help.textContent = 'Las lagunas se miden en metros cúbicos (m³)';
    help.style.display = 'block';
  } else {
    unidadSpan.textContent = 'gal/min';
    lbl.textContent = 'Caudal';
    help.textContent = 'Ríos y canales se miden en galones por minuto';
    help.style.display = 'block';
  }
}

async function guardarMedicionCaudal(){
  const btn = document.getElementById('btnCaud');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

  try {
    const sel = document.getElementById('caudFuente');
    const fuenteId = parseInt(sel.value);
    const opt = sel.options[sel.selectedIndex];
    const fecha = document.getElementById('caudFecha').value;
    const hora = document.getElementById('caudHora').value || null;
    const valorRaw = document.getElementById('caudValor').value;
    const obs = document.getElementById('caudObs').value.trim() || null;
    const prog = window.__caudalProgramacion || null;
    const esProgramada = !!prog;

    if(!fuenteId)          throw new Error('Selecciona la fuente de agua');
    if(!fecha)             throw new Error('Indica la fecha');
    const valor = parseFloat(valorRaw);
    if(isNaN(valor) || valor < 0) throw new Error('Indica un valor numérico válido');

    const unidad = opt.getAttribute('data-unidad');

    const payload = {
      fuente_id: fuenteId,
      fecha,
      hora,
      valor_medido: valor,
      unidad,
      observaciones: obs,
      registrado_por: usuario.email,
      dispositivo: navigator.userAgent.substring(0, 200)
    };

    const { error: e1 } = await sb.from('avc_riego_caudales').insert(payload);
    if(e1) throw new Error(e1.message);

    // Si vino de programación, cerrar la tarea
    if(esProgramada){
      const { error: e2 } = await sb.from('avc_programacion')
        .update({
          estado: 'completada',
          observacion_real: obs,
          cerrado_por: usuario.email,
          cerrado_en: new Date().toISOString()
        })
        .eq('id', prog.id);
      if(e2) console.warn('No se pudo cerrar la programación:', e2);

      try {
        const { data: progActual } = await sb.from('avc_programacion')
          .select('*').eq('id', prog.id).maybeSingle();
        if(progActual && typeof notificarTareaCompletada === 'function'){
          await notificarTareaCompletada(progActual);
        }
      } catch(_) {}
    }

    toast(esProgramada ? 'Caudal registrado y tarea completada' : 'Caudal registrado correctamente');
    closeModal();
    window.__caudalProgramacion = null;
    routerPorRol();

  } catch(err){
    toast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar medición';
  }
}

async function abrirCapturaGravedad(programacion){
  const esProgramada = !!programacion;
  window.__gravedadProgramacion = programacion || null;

  // Si es programada, finca/lote vienen del finca_lote de la programación
  let preFinca = '';
  let preLote = '';
  let preFincaDescripcion = '';
  let preArea = null;
  if(esProgramada){
    const fLote = programacion.finca_lote;
    const reg = plantios.find(p => p.finca_lote === fLote);
    if(reg){
      preFincaDescripcion = reg.descripcion_finca;
      preFinca = reg.descripcion_finca;
      preArea = reg.area_ha;
    } else {
      const { data } = await sb.from('maestro_plantios')
        .select('descripcion_finca, lote, area_ha')
        .eq('finca_lote', fLote)
        .maybeSingle();
      if(data){
        preFincaDescripcion = data.descripcion_finca;
        preFinca = data.descripcion_finca;
        preLote = data.lote;
        preArea = data.area_ha;
      }
    }
    if(!preLote){
      const m = fLote.match(/\d+$/);
      preLote = m ? parseInt(m[0]) : '';
    }
  }

  const fincasUnicas = [...new Set(plantios.map(p => p.descripcion_finca))]
    .filter(Boolean).sort();

  const contextoBanner = esProgramada ? `
    <div style="background:#E6F1FB;border-left:3px solid #185FA5;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#0C447C;text-transform:uppercase;letter-spacing:0.04em">Tarea programada</div>
      <div style="font-size:13px;color:#185FA5;margin-top:4px">
        <strong>${preFincaDescripcion || programacion.finca_lote}</strong> · Lote ${preLote}${preArea ? ` (${preArea} ha)` : ''}
      </div>
      ${programacion.ha_plan ? `<div style="font-size:12px;color:#185FA5;margin-top:2px">Plan: ${programacion.ha_plan} ha · ${programacion.personal_plan || 0} personas</div>` : ''}
      ${programacion.horas_estimadas ? `<div style="font-size:12px;color:#185FA5;margin-top:2px"><i class="ti ti-clock"></i> ${programacion.horas_estimadas} horas estimadas de duración</div>` : ''}
      ${programacion.observacion_plan ? `<div style="font-size:11px;color:#185FA5;margin-top:4px;font-style:italic">Nota del jefe: "${programacion.observacion_plan}"</div>` : ''}
    </div>
  ` : `
    <div style="background:#FBF5E6;border-left:3px solid #BA7517;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#A06410;text-transform:uppercase;letter-spacing:0.04em">Captura libre</div>
      <div style="font-size:12px;color:#A06410;margin-top:2px">Registro espontáneo, fuera del plan diario</div>
    </div>
  `;

  const bloqueFincaLote = esProgramada ? `
    <div class="field">
      <label>Finca</label>
      <input type="text" value="${preFincaDescripcion || programacion.finca_lote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <div class="field">
      <label>Lote</label>
      <input type="text" value="Lote ${preLote}" disabled style="background:#F4F6F4;color:#374151"/>
    </div>
    <input type="hidden" id="gravFinca" value="${preFinca}"/>
    <input type="hidden" id="gravLote" value="${preLote}"/>
  ` : `
    <div class="field">
      <label>Finca</label>
      <select id="gravFinca" onchange="actualizarLotesGravedad()">
        <option value="">Seleccionar...</option>
        ${fincasUnicas.map(f => `<option value="${f}">${f}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Lote</label>
      <select id="gravLote"><option value="">Primero elige finca</option></select>
    </div>
  `;

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Riego por gravedad</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">cód. 12101</div>
    ${contextoBanner}
    ${bloqueFincaLote}

    <div class="field-row">
      <div class="field">
        <label>Fecha inicio</label>
        <input type="date" id="gravFechaIni" value="${hoyISO()}"/>
      </div>
      <div class="field">
        <label>Fecha fin</label>
        <input type="date" id="gravFechaFin" value="${hoyISO()}"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hora inicio</label>
        <input type="time" id="gravHoraIni"/>
      </div>
      <div class="field">
        <label>Hora fin</label>
        <input type="time" id="gravHoraFin"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>HA regadas</label>
        <input type="number" step="0.01" id="gravHa" placeholder="0.00" value="${esProgramada && programacion.ha_plan ? programacion.ha_plan : ''}"/>
      </div>
      <div class="field">
        <label>Personal</label>
        <input type="number" id="gravPersonal" placeholder="0" value="${esProgramada && programacion.personal_plan ? programacion.personal_plan : ''}"/>
      </div>

    <div class="field">
      <label>Tiempo de agua en el lote <span style="color:#6b7280;font-weight:400">(horas)</span></label>

  showModal();
