<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSIA Campo - Chumbagua</title>

<!-- PWA: manifest e íconos -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1D9E75"/>
<meta name="application-name" content="CSIA Campo"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CSIA Campo"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6F4;min-height:100vh;font-size:14px;color:#111827}
.app{max-width:480px;margin:0 auto;padding:0 0 5rem;min-height:100vh}

/* === LOGIN === */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(160deg,#F4F6F4 0%,#E1F5EE 100%)}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;box-shadow:0 8px 24px rgba(29,158,117,0.25)}
.login-logo svg{width:64px;height:64px}
.login-card{background:white;border-radius:20px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.06);border:0.5px solid rgba(0,0,0,0.05)}
.login-card h2{font-size:22px;font-weight:600;color:#111827;margin-bottom:6px;letter-spacing:-0.01em}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:1.75rem}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
.login-field input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;background:#FAFAFA;color:#111827;transition:all 0.15s}
.login-field input:focus{outline:none;border-color:#1D9E75;background:white;box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:transform 0.1s;letter-spacing:0.02em}
.login-btn:active{transform:scale(0.98)}
.login-btn:disabled{background:#9ca3af;cursor:not-allowed}
.login-error{background:#FEE2E2;color:#B91C1C;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.login-loading{text-align:center;color:#6b7280;font-size:13px;padding:8px;display:none}

/* === HEADER === */
.header{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);padding:1rem 1.25rem;color:white;flex-shrink:0;position:sticky;top:0;z-index:20}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.header-brand{display:flex;align-items:center;gap:10px;flex:1}
.header-logo{width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-logo svg{width:28px;height:28px}
.header h1{font-size:15px;font-weight:500;line-height:1.2}
.header .user{font-size:11px;opacity:0.85;margin-top:2px}
.header .rol{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.06em;margin-top:1px}
.header .fecha{font-size:11px;opacity:0.85;margin-top:8px}
.logout-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.18);border:none;color:white;padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:500}
.logout-btn:active{background:rgba(255,255,255,0.28)}
.logout-btn i{font-size:13px}
.header-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:white;font-size:18px;flex-shrink:0}

/* Campana de notificaciones */
.notif-btn{position:relative;width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.18);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:6px;padding:0;font-size:18px}
.notif-btn:active{background:rgba(255,255,255,0.28)}
.notif-badge{position:absolute;top:-3px;right:-3px;background:#E24B4A;color:white;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #1D9E75;font-family:-apple-system,sans-serif}

/* Panel de notificaciones */
.notif-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:150;display:none}
.notif-panel-overlay.open{display:block}
.notif-panel{position:fixed;top:0;right:0;width:100%;max-width:380px;height:100%;background:white;z-index:160;transform:translateX(100%);transition:transform 0.25s ease;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,0.1)}
.notif-panel.open{transform:translateX(0)}
.notif-panel-head{padding:1.1rem 1.2rem;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#1D9E75;color:white}
.notif-panel-head h3{font-size:16px;font-weight:600}
.notif-panel-close{background:rgba(255,255,255,0.2);border:none;color:white;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.notif-panel-body{flex:1;overflow-y:auto;padding:0}
.notif-item{padding:0.9rem 1.2rem;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background 0.12s;position:relative}
.notif-item:active{background:#F9FAFB}
.notif-item.no-leida{background:#F0FDF4}
.notif-item.no-leida::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:#1D9E75}
.notif-item-titulo{font-size:13px;font-weight:600;color:#111827;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.notif-item-msg{font-size:12px;color:#6b7280;line-height:1.4}
.notif-item-time{font-size:11px;color:#9ca3af;margin-top:5px}
.notif-panel-foot{padding:0.7rem 1.2rem;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#FAFAFA}
.notif-marcar-todo{background:none;border:none;color:#1D9E75;font-size:12px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:4px}
.notif-marcar-todo:disabled{color:#9ca3af;cursor:not-allowed}
.notif-empty{padding:3rem 1.5rem;text-align:center;color:#9ca3af}
.notif-empty i{font-size:42px;display:block;margin-bottom:8px;opacity:0.5}

/* === TABS === */
.tabs{display:flex;background:white;border-bottom:0.5px solid #e5e7eb;position:sticky;top:0;z-index:5}
.tab{flex:1;padding:13px 4px;font-size:12px;font-weight:500;border:none;background:none;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}

/* === SECTIONS === */
.sec{display:none;padding:1rem;gap:0.75rem;flex-direction:column}
.sec.active{display:flex}

/* === CARDS === */
.card{background:white;border-radius:14px;padding:1rem 1.25rem;border:0.5px solid #e5e7eb}
.card-title{font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em}

/* === STATS === */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.stat-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.stat{background:white;border-radius:12px;padding:12px 8px;text-align:center;border:0.5px solid #e5e7eb}
.stat-lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
.stat-val{font-size:22px;font-weight:600;color:#111827;margin-top:2px;letter-spacing:-0.01em}
.stat-val.ok{color:#1D9E75}
.stat-val.warn{color:#BA7517}
.stat-val.danger{color:#A32D2D}

/* === LISTAS === */
.sec-h{font-size:10px;font-weight:600;color:#9ca3af;margin:8px 0 0;text-transform:uppercase;letter-spacing:0.06em;display:flex;justify-content:space-between;align-items:center}

/* === TAREA CARD (con ícono lateral) === */
.tarea-card{background:white;border-radius:14px;padding:14px;border:0.5px solid #e5e7eb;cursor:pointer;transition:transform 0.1s,box-shadow 0.15s;display:flex;flex-direction:column;gap:6px}
.tarea-card:active{transform:scale(0.99)}
.tarea-card.estado-pendiente,.tarea-card.estado-planificado{border-left:3px solid #B4B2A9}
.tarea-card.estado-en_curso{border-left:3px solid #EF9F27}
.tarea-card.estado-completada{border-left:3px solid #1D9E75}
.tarea-card.estado-modificada{border-left:3px solid #378ADD}
.tarea-card.estado-no_ejecutable{border-left:3px solid #E24B4A}
.tarea-card.estado-esperando_supervisor,.tarea-card.estado-esperando_encargado{border-left:3px solid #7F77DD;background:#FBFAFE;border-color:#CECBF6}
.tarea-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.tarea-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tarea-icon{width:36px;height:36px;border-radius:10px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tarea-icon i{font-size:18px;color:#0F6E56}
.tarea-icon.amber{background:#FAEEDA}
.tarea-icon.amber i{color:#854F0B}
.tarea-icon.purple{background:#EEEDFE}
.tarea-icon.purple i{color:#3C3489}
.tarea-icon.blue{background:#E6F1FB}
.tarea-icon.blue i{color:#0C447C}
.tarea-icon.gray{background:#F1EFE8}
.tarea-icon.gray i{color:#444441}
.tarea-icon.green{background:#EAF3DE}
.tarea-icon.green i{color:#3B6D11}
.tarea-icon.pink{background:#FBEAF0}
.tarea-icon.pink i{color:#993556}
.tarea-info{flex:1;min-width:0}
.tarea-hora{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums;font-weight:500}
.tarea-title{font-size:14px;font-weight:500;color:#111827;line-height:1.2;margin-top:1px}
.tarea-tags{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tarea-sub{font-size:12px;color:#6b7280;margin-top:2px}
.tarea-meta{font-size:11px;color:#9ca3af}
.tarea-meta strong{color:#854F0B;font-weight:500}

/* === BADGES === */
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-block;white-space:nowrap}
.b-planificado,.b-pendiente{background:#F1EFE8;color:#444441}
.b-en_curso{background:#FAEEDA;color:#854F0B}
.b-completada{background:#E1F5EE;color:#0F6E56}
.b-modificada{background:#E6F1FB;color:#0C447C}
.b-no_ejecutable{background:#FCEBEB;color:#791F1F}
.b-esperando_supervisor,.b-esperando_encargado{background:#EEEDFE;color:#3C3489;font-weight:700}
.b-prio-alta{background:#FCEBEB;color:#791F1F;font-size:9px;padding:2px 6px;font-weight:700}
.b-prio-media{background:#FAEEDA;color:#854F0B;font-size:9px;padding:2px 6px}
.b-prio-baja{background:#F1EFE8;color:#444441;font-size:9px;padding:2px 6px}
.badge.fp{background:#FEE2E2;color:#B91C1C}

/* === PROGRESS === */
.prog{height:5px;background:#f0f0eb;border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:#1D9E75;transition:width 0.3s}
.prog-fill.warn{background:#EF9F27}
.prog-fill.danger{background:#E24B4A}

/* === SEMÁFORO === */
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#1D9E75}
.dot.alerta{background:#EF9F27}
.dot.critico{background:#E24B4A}

/* === BANNERS === */
.banner{background:linear-gradient(135deg,#E1F5EE 0%,#F4F6F4 100%);border-radius:14px;padding:14px;border-left:3px solid #1D9E75;margin-bottom:4px}
.banner.blue{background:linear-gradient(135deg,#E6F1FB 0%,#F4F6F4 100%);border-left-color:#378ADD}
.banner.amber{background:linear-gradient(135deg,#FAEEDA 0%,#F4F6F4 100%);border-left-color:#EF9F27}
.banner.purple{background:linear-gradient(135deg,#EEEDFE 0%,#F4F6F4 100%);border-left-color:#7F77DD}
.banner.red{background:linear-gradient(135deg,#FCEBEB 0%,#F4F6F4 100%);border-left-color:#E24B4A}
.banner-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#0F6E56}
.banner.blue .banner-lbl{color:#0C447C}
.banner.amber .banner-lbl{color:#854F0B}
.banner.purple .banner-lbl{color:#3C3489}
.banner.red .banner-lbl{color:#791F1F}
.banner-txt{font-size:13px;color:#04342C;margin-top:4px;font-weight:500}
.banner.blue .banner-txt{color:#042C53}
.banner.amber .banner-txt{color:#412402}
.banner.purple .banner-txt{color:#26215C}
.banner.red .banner-txt{color:#501313}

/* === FORMS === */
label{display:block;font-size:12px;color:#374151;margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;font-size:15px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;background:#FAFAFA;color:#111827;transition:all 0.15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1D9E75;background:white;box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
textarea{height:65px;resize:none}
.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.field-row .field{margin-bottom:0}
.field-help{font-size:11px;color:#9ca3af;margin-top:4px;font-style:italic}

/* === BUTTONS === */
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform 0.1s;font-family:inherit}
.btn:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);color:white}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed;transform:none}
.btn-secondary{background:white;color:#374151;border:1px solid #e5e7eb}
.btn-purple{background:linear-gradient(135deg,#7F77DD 0%,#534AB7 100%);color:white}
.btn-danger{background:#E24B4A;color:white}
.btn-sm{padding:8px 12px;font-size:12px;width:auto}

/* === COUNTER === */
.counter{display:flex;align-items:center;gap:8px;margin-top:4px}
.cbtn{width:34px;height:34px;border:1.5px solid #e5e7eb;border-radius:10px;background:#FAFAFA;color:#374151;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cval{font-size:20px;font-weight:600;min-width:28px;text-align:center}

/* === CHECKBOX ROW === */
.check-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#FAFAFA;border:1.5px solid #e5e7eb;border-radius:10px;cursor:pointer;margin-top:4px;transition:all 0.15s}
.check-row.checked{background:#E1F5EE;border-color:#1D9E75}
.check-row input{width:18px;height:18px;margin:0;flex-shrink:0;cursor:pointer;accent-color:#1D9E75}
.check-row label{margin:0;cursor:pointer;font-size:13px;color:#374151;flex:1}

/* === DETALLE === */
.detail-section{background:white;border-radius:14px;padding:14px;margin-bottom:8px;border:0.5px solid #e5e7eb}
.detail-lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
.detail-row .key{color:#6b7280}
.detail-row .val{color:#111827;font-weight:500;text-align:right}

/* === PARTES (operaciones compartidas) === */
.parte{border-radius:14px;padding:14px;margin-bottom:8px;border:0.5px solid}
.parte-supervisor{background:linear-gradient(135deg,#E1F5EE 0%,#FAFAFA 100%);border-color:#9FE1CB}
.parte-supervisor .detail-lbl{color:#0F6E56}
.parte-encargado{background:linear-gradient(135deg,#E6F1FB 0%,#FAFAFA 100%);border-color:#85B7EB}
.parte-encargado .detail-lbl{color:#0C447C}
.parte-vacia{background:#FAEEDA;border:2px dashed #BA7517;text-align:center;padding:20px}
.parte-vacia .detail-lbl{color:#854F0B;margin-bottom:6px}
.firma{font-size:10px;color:#9ca3af;margin-top:8px;font-style:italic}

/* === ACTIVIDAD GRID (selector) === */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{padding:14px 8px;font-size:12px;font-weight:500;border:1.5px solid #e5e7eb;border-radius:12px;background:#FAFAFA;color:#374151;cursor:pointer;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.15s;font-family:inherit}
.act-btn:active{transform:scale(0.98)}
.act-btn.sel{background:#E1F5EE;color:#0F6E56;border-color:#1D9E75}
.act-btn i{font-size:22px;color:#1D9E75}
.act-btn.sel i{color:#0F6E56}

/* === FERTIRRIEGO TURNOS === */
.turno-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px}
.turno-btn{padding:12px 4px;font-size:14px;font-weight:600;border:1.5px solid #e5e7eb;border-radius:10px;background:#FAFAFA;color:#6b7280;cursor:pointer;text-align:center}
.turno-btn.sel{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);color:white;border-color:#0F6E56}
.turno-btn.done{background:#E1F5EE;color:#0F6E56;border-color:#bbf7d0;cursor:not-allowed}

/* === INFO LOTE === */
.info-lote{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 12px;margin-top:8px;display:none}
.info-lote.show{display:block}
.info-lote-title{font-size:12px;color:#166534;font-weight:600;margin-bottom:4px}
.info-lote-row{display:flex;justify-content:space-between;font-size:12px;color:#166534;margin-bottom:2px}
.info-lote-warn{background:#FEF3C7;color:#92400E;padding:6px 10px;border-radius:6px;font-size:11px;margin-top:6px;display:none}

/* === HISTORIAL === */
.reg-item{background:white;border-radius:14px;padding:0.9rem 1.1rem;border:0.5px solid #e5e7eb;margin-bottom:8px}
.reg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.reg-fecha{font-size:11px;color:#9ca3af}
.reg-finca{font-size:14px;font-weight:500;color:#111827;margin-bottom:2px}
.reg-meta{font-size:12px;color:#6b7280}

/* === EMPTY === */
.empty{text-align:center;padding:2.5rem 1rem;color:#9ca3af;font-size:13px;line-height:1.5}
.empty i{font-size:32px;display:block;margin-bottom:8px;color:#d1d5db}

/* === TOAST === */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111827;color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:999;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#B91C1C}
.toast.success{background:#0F6E56}
.toast.info{background:#0C447C}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn 0.2s;backdrop-filter:blur(4px)}
.modal{background:white;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:20px;max-height:90vh;overflow-y:auto;animation:slideUp 0.25s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px)}to{transform:translateY(0)}}
.modal h2{font-size:18px;font-weight:600;margin-bottom:12px;letter-spacing:-0.01em}
.modal-close{float:right;background:none;border:none;font-size:22px;color:#9ca3af;cursor:pointer;line-height:1;padding:0;width:32px;height:32px;border-radius:8px}
.modal-close:active{background:#f0f0eb}

<script>

const SUPABASE_URL = 'https://dhbyjqmdcezdiucxeqpp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoYnlqcW1kY2V6ZGl1Y3hlcXBwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzEzMjY2MSwiZXhwIjoyMDkyNzA4NjYxfQ.zs3TkSbu2QTOfF1XV3qsiIO9R4Iv3nu8I9u1xNLd-e4';

// === ESTADO GLOBAL ===
let usuario = null;          // perfil del usuario logueado
let plantios = [];           // todos los lotes accesibles (filtrados por permisos)

// === HELPERS ===
function toast(msg, tipo='success'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + tipo;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function fmtFecha(iso, mostrarHora=true){
  if(!iso) return '-';
  const d = new Date(iso);
  const opts = {day:'numeric', month:'short'};
  if(mostrarHora) Object.assign(opts, {hour:'2-digit', minute:'2-digit'});
  return d.toLocaleDateString('es-HN', opts);
}

function fmtHoy(){
  return new Date().toLocaleDateString('es-HN', {weekday:'long', day:'numeric', month:'long'});
}

function hoyISO(){
  return new Date().toISOString().split('T')[0];
}

function badge(estado){
  const labels = {
    planificado:'Planificado', pendiente:'Pendiente', en_curso:'En curso',
    completada:'Completada', modificada:'Modificada', no_ejecutable:'No ejecutable',
    esperando_supervisor:'Esperando supervisor', esperando_encargado:'Aporta tu parte',
    reprogramada:'Reprogramada'
  };
  return `<span class="badge b-${estado}">${labels[estado] || estado}</span>`;
}

function actNombre(codigo){
  const a = actividadesAll.find(x => x.codigo_actividad === codigo);
  return a ? a.nombre_actividad : 'Actividad ' + codigo;
}

// ============================================================
// HISTORIAL EXPANDIBLE: ver datos de un registro en modo lectura
// ============================================================
async function mostrarDetalleHistorial(tabla, id){
  // Mapa de tablas a su query con joins
  const queries = {
    'humedad': () => sb.from('avc_riego_humedad').select('*').eq('id', id).maybeSingle(),
    'caudales': () => sb.from('avc_riego_caudales').select('*, pm_fuentes_agua(nombre, tipo, unidad)').eq('id', id).maybeSingle(),
    'gravedad': () => sb.from('avc_riego_gravedad').select('*').eq('id', id).maybeSingle(),
    'drenajes': () => sb.from('avc_riego_drenajes').select('*, pm_tipos_drenaje(nombre, es_mecanizado), pm_tipos_maquinaria_drenaje(nombre), pm_actividades_drenaje(nombre)').eq('id', id).maybeSingle(),
    'pivote': () => sb.from('avc_riego_pivote').select('*').eq('id', id).maybeSingle(),
    'aspersion': () => sb.from('avc_riego_aspersion').select('*').eq('id', id).maybeSingle(),
    'goteo': () => sb.from('avc_riego_goteo').select('*, pm_estaciones_riego(nombre), pm_tipos_riego_goteo(nombre)').eq('id', id).maybeSingle(),
    'reparacion_goteo': () => sb.from('avc_riego_reparacion_goteo').select('*').eq('id', id).maybeSingle()
  };

  const qFn = queries[tabla];
  if(!qFn){ toast('Tipo de registro no reconocido', 'error'); return; }

  const { data: r, error } = await qFn();
  if(error || !r){ toast('No se pudo cargar el detalle', 'error'); return; }

  // Cargar tiempos perdidos si aplica
  let tiemposPerdidos = [];
  if(tabla === 'aspersion' || tabla === 'goteo'){
    const { data: tps } = await sb.from('avc_riego_tiempo_perdido')
      .select('*, pm_causas_tiempo_perdido(nombre)')
      .eq('tipo_riego', tabla)
      .eq('riego_id', id);
    tiemposPerdidos = tps || [];
  }

  // Cargar materiales si es reparación
  let materiales = [];
  if(tabla === 'reparacion_goteo'){
    const { data: mats } = await sb.from('avc_riego_reparacion_materiales')
      .select('*, pm_materiales_reparacion_goteo(nombre, unidad)')
      .eq('reparacion_id', id);
    materiales = mats || [];
  }

  modalContent = construirDetalleHTML(tabla, r, tiemposPerdidos, materiales);
  showModal();
}

function detalleCampo(label, valor, unidad){
  if(valor == null || valor === '') return '';
  const u = unidad ? ` <span style="color:#9CA3AF;font-weight:400">${unidad}</span>` : '';
  return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6">
    <span style="color:#6b7280;font-size:12px">${label}</span>
    <span style="font-weight:500;font-size:13px">${valor}${u}</span>
  </div>`;
}

function construirDetalleHTML(tabla, r, tiemposPerdidos, materiales){
  const titulos = {
    'humedad':         'Medición de humedad',
    'caudales':        'Medición de caudales',
    'gravedad':        'Riego por gravedad',
    'drenajes':        'Drenaje',
    'pivote':          'Riego por pivote',
    'aspersion':       'Riego por aspersión',
    'goteo':           'Riego por goteo',
    'reparacion_goteo':'Reparación de goteo'
  };

  let header = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${titulos[tabla] || 'Detalle'}</h2>
    <div style="background:#F3F4F6;color:#374151;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:14px">
      <i class="ti ti-eye"></i> Vista de solo lectura
    </div>
  `;

  let cuerpo = '<div style="display:flex;flex-direction:column">';

  // Campos comunes
  cuerpo += detalleCampo('Fecha', fmtFecha(r.fecha || r.fecha_inicio));
  if(r.fecha_fin && r.fecha_fin !== r.fecha_inicio) cuerpo += detalleCampo('Fecha fin', fmtFecha(r.fecha_fin));
  if(r.hora_inicio) cuerpo += detalleCampo('Hora inicio', r.hora_inicio.substring(0,5));
  if(r.hora_medicion) cuerpo += detalleCampo('Hora medición', r.hora_medicion.substring(0,5));
  if(r.hora) cuerpo += detalleCampo('Hora', r.hora.substring(0,5));
  if(r.hora_fin) cuerpo += detalleCampo('Hora fin', r.hora_fin.substring(0,5));
  if(r.finca) cuerpo += detalleCampo('Finca', r.finca);
  if(r.lote != null) cuerpo += detalleCampo('Lote', r.lote);
  if(r.lote_o_turno) cuerpo += detalleCampo('Lote / Turno', r.lote_o_turno);
  if(r.turno) cuerpo += detalleCampo('Turno', 'TURNO ' + r.turno);

  // Campos específicos por tabla
  if(tabla === 'humedad'){
    if(r.tipo_medicion === 'EMPIRICA'){
      const map = {MARCHITEZ:'Marchitez (bajo)', CAPACIDAD_CAMPO:'Capacidad campo (óptimo)', SATURADO:'Saturado (alto)'};
      cuerpo += detalleCampo('Tipo', 'Empírica / Calicata');
      cuerpo += detalleCampo('Estado del suelo', map[r.empirica_estado] || r.empirica_estado);
    } else {
      cuerpo += detalleCampo('Tipo', 'Tensiómetros');
      cuerpo += detalleCampo('Tens. 20 cm', r.tens_20cm, 'cb');
      cuerpo += detalleCampo('Tens. 40 cm', r.tens_40cm, 'cb');
    }
  }

  if(tabla === 'caudales'){
    const f = r.pm_fuentes_agua || {};
    cuerpo += detalleCampo('Fuente', f.nombre);
    cuerpo += detalleCampo('Tipo de fuente', f.tipo === 'rio' ? 'Río' : f.tipo === 'canal' ? 'Canal' : f.tipo === 'laguna' ? 'Laguna' : '');
    cuerpo += detalleCampo('Valor medido', r.valor_medido, r.unidad === 'metros_cubicos' ? 'm³' : 'gal/min');
  }

  if(tabla === 'gravedad'){
    cuerpo += detalleCampo('HA regadas', r.ha_regadas, 'ha');
    cuerpo += detalleCampo('Personal', r.personal);
    cuerpo += detalleCampo('Tiempo de agua en el lote', r.tiempo_agua_lote, 'h');
  }

  if(tabla === 'drenajes'){
    const tipo = r.pm_tipos_drenaje || {};
    const maq = r.pm_tipos_maquinaria_drenaje || {};
    const act = r.pm_actividades_drenaje || {};
    cuerpo += detalleCampo('Tipo de drenaje', tipo.nombre);
    cuerpo += detalleCampo('Actividad', act.nombre);
    cuerpo += detalleCampo('Metros de avance', r.metros_avance, 'mts');
    if(tipo.es_mecanizado){
      cuerpo += detalleCampo('Maquinaria', maq.nombre);
      cuerpo += detalleCampo('Propio / Alquilado', r.propio_alquilado);
      cuerpo += detalleCampo('Horómetro inicio', r.horometro_ini);
      cuerpo += detalleCampo('Horómetro fin', r.horometro_fin);
    }
  }

  if(tabla === 'pivote'){
    const tamMap = {pequeno:'Pequeño', mediano:'Mediano', grande:'Grande'};
    cuerpo += detalleCampo('Bomba', r.codigo_bomba);
    cuerpo += detalleCampo('Tipo operación', r.tipo_pivote_op);
    cuerpo += detalleCampo('Tamaño pivote', tamMap[r.tipo_pivote_tam] || r.tipo_pivote_tam);
    cuerpo += detalleCampo('Horómetro inicio', r.horometro_ini);
    cuerpo += detalleCampo('Horómetro fin', r.horometro_fin);
    cuerpo += detalleCampo('Número vueltas', r.numero_vueltas);
    cuerpo += detalleCampo('% trabajo', r.pct_trabajo, '%');
    cuerpo += detalleCampo('HA regadas', r.ha_regadas, 'ha');
  }

  if(tabla === 'aspersion'){
    cuerpo += detalleCampo('HA regadas', r.ha_regadas, 'ha');
    cuerpo += detalleCampo('Personal', r.cant_personas);
    cuerpo += detalleCampo('Bomba', r.codigo_bomba);
    cuerpo += detalleCampo('Energía', r.energia);
    cuerpo += detalleCampo('Horómetro inicio', r.horometro_ini);
    cuerpo += detalleCampo('Horómetro fin', r.horometro_fin);
    cuerpo += detalleCampo('Horas programadas', r.horas_programadas, 'h');
    cuerpo += detalleCampo('% cumplimiento', r.pct_cumplimiento, '%');
    cuerpo += detalleCampo('N° riego', r.numero_riego);
    cuerpo += detalleCampo('N° cambios', r.numero_cambios);
    cuerpo += detalleCampo('N° aspersores', r.numero_aspersores);
    cuerpo += detalleCampo('RPM', r.rpm);
  }

  if(tabla === 'goteo'){
    const est = r.pm_estaciones_riego || {};
    const tipo = r.pm_tipos_riego_goteo || {};
    cuerpo += detalleCampo('Estación', est.nombre);
    cuerpo += detalleCampo('Tipo de riego', tipo.nombre);
    cuerpo += detalleCampo('Bomba', r.codigo_bomba);
    cuerpo += detalleCampo('Energía', r.energia);
    cuerpo += detalleCampo('Horas solicitadas', r.horas_solicitadas, 'h');
    cuerpo += detalleCampo('Horómetro ini/fin', (r.horometro_ini != null ? r.horometro_ini : '—') + ' / ' + (r.horometro_fin != null ? r.horometro_fin : '—'));
    cuerpo += detalleCampo('KW ini/fin', (r.kw_ini != null ? r.kw_ini : '—') + ' / ' + (r.kw_fin != null ? r.kw_fin : '—'));
    cuerpo += detalleCampo('Presión ent/sal', (r.presion_entrada != null ? r.presion_entrada : '—') + ' / ' + (r.presion_salida != null ? r.presion_salida : '—'));
    cuerpo += detalleCampo('Caudal ini/fin', (r.caudal_ini != null ? r.caudal_ini : '—') + ' / ' + (r.caudal_fin != null ? r.caudal_fin : '—'));
    cuerpo += detalleCampo('Producto aplicado', r.producto_aplicado);
  }

  if(tabla === 'reparacion_goteo'){
    cuerpo += detalleCampo('Avance', r.avance_ha, 'ha');
    cuerpo += detalleCampo('Personal', r.personal);
  }

  cuerpo += '</div>';

  // Tiempos perdidos
  if(tiemposPerdidos && tiemposPerdidos.length > 0){
    cuerpo += '<div style="margin-top:14px;background:#FEF3F2;border-left:3px solid #F87171;padding:10px 12px;border-radius:0 6px 6px 0">';
    cuerpo += '<div style="font-size:11px;font-weight:600;color:#7F1D1D;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px"><i class="ti ti-clock-pause"></i> Tiempo perdido</div>';
    tiemposPerdidos.forEach(tp => {
      const causa = (tp.pm_causas_tiempo_perdido && tp.pm_causas_tiempo_perdido.nombre) || 'Causa';
      cuerpo += `<div style="font-size:12px;padding:4px 0">• ${causa}: <strong>${tp.minutos} min</strong>${tp.observaciones ? ' — '+tp.observaciones : ''}</div>`;
    });
    cuerpo += '</div>';
  }

  // Materiales reparación
  if(materiales && materiales.length > 0){
    cuerpo += '<div style="margin-top:14px;background:#F0F9FF;border-left:3px solid #38BDF8;padding:10px 12px;border-radius:0 6px 6px 0">';
    cuerpo += '<div style="font-size:11px;font-weight:600;color:#075985;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px"><i class="ti ti-tools"></i> Materiales utilizados</div>';
    materiales.forEach(m => {
      const mat = (m.pm_materiales_reparacion_goteo && m.pm_materiales_reparacion_goteo.nombre) || 'Material';
      const unidad = (m.pm_materiales_reparacion_goteo && m.pm_materiales_reparacion_goteo.unidad) || '';
      cuerpo += `<div style="font-size:12px;padding:4px 0">• ${mat}: <strong>${m.cantidad}</strong> ${unidad}</div>`;
    });
    cuerpo += '</div>';
  }

  // Observaciones
  if(r.observaciones){
    cuerpo += `<div style="margin-top:14px;background:#F9FAFB;border-radius:6px;padding:10px;font-size:12px;color:#374151;font-style:italic">"${r.observaciones}"</div>`;
  }

  // Footer
  cuerpo += `<div style="margin-top:14px;padding-top:10px;border-top:1px solid #E5E7EB;font-size:11px;color:#9CA3AF">
    Registrado por ${r.registrado_por}<br>
    ${r.creado_en ? fmtFecha(r.creado_en.substring(0,10)) + ' · ' + r.creado_en.substring(11,16) : ''}
  </div>`;

  return header + cuerpo;
}

function esCompartida(codigo){
  // Una actividad es "compartida" si su modelo es COMPARTIDA o EXTERNA
  // (en ambos casos el encargado aporta solo personal y el supervisor/PM lo demás)
  const a = actividadesAll.find(x => x.codigo_actividad === codigo);
  if(!a) return false;
  return a.modelo_comparticion === 'COMPARTIDA' || a.modelo_comparticion === 'EXTERNA';
}

function iconoActividad(codigo){
  // Mapeo de códigos a íconos Tabler + color de fondo
  // Devuelve { icon, color } donde color es la clase CSS: green, amber, blue, purple, pink, gray
  const a = actividadesAll.find(x => x.codigo_actividad === codigo);
  const nombre = (a?.nombre_actividad || '').toLowerCase();

  if(codigo >= 10101 && codigo <= 10119) return { icon: 'ti-plant', color: 'amber' };
  if(codigo === 10220 || (codigo >= 10201 && codigo <= 10219)) return { icon: 'ti-fertilizer', color: 'green' };
  if(codigo >= 10301 && codigo <= 10314) return { icon: 'ti-leaf', color: 'pink' };
  if(codigo === 10401 || codigo === 10429 || codigo === 10430) return { icon: 'ti-truck-loading', color: '' };
  if(codigo >= 10401 && codigo <= 10430) return { icon: 'ti-tractor', color: 'gray' };
  if(codigo === 10508 || codigo === 10509 || codigo === 50204 || codigo === 50704) return { icon: 'ti-seedling', color: '' };
  if(codigo >= 10601 && codigo <= 10614) return { icon: 'ti-droplet', color: 'blue' };
  if(codigo >= 10701 && codigo <= 10714) return { icon: 'ti-droplet-filled', color: 'blue' };
  if(codigo >= 11401 && codigo <= 11417) return { icon: 'ti-bug', color: 'pink' };
  if(codigo >= 11501 && codigo <= 11510) return { icon: 'ti-droplet-half-2', color: 'purple' };
  if(codigo >= 12101 && codigo <= 12206) return { icon: 'ti-droplets', color: 'blue' };
  if(codigo === 50101 || codigo === 50601) return { icon: 'ti-tractor', color: 'gray' };

  // fallback por nombre
  if(nombre.includes('siembra') || nombre.includes('resiembra')) return { icon: 'ti-seedling', color: '' };
  if(nombre.includes('riego') || nombre.includes('drenaje')) return { icon: 'ti-droplet', color: 'blue' };
  if(nombre.includes('fertili')) return { icon: 'ti-fertilizer', color: 'green' };
  if(nombre.includes('herbicida') || nombre.includes('maleza')) return { icon: 'ti-plant', color: 'amber' };
  if(nombre.includes('acarrileo')) return { icon: 'ti-truck-loading', color: '' };
  if(nombre.includes('madur') || nombre.includes('inhibi')) return { icon: 'ti-leaf', color: 'pink' };
  if(nombre.includes('plaga') || nombre.includes('barrenador')) return { icon: 'ti-bug', color: 'pink' };
  if(nombre.includes('enmienda') || nombre.includes('foliar')) return { icon: 'ti-droplet-half-2', color: 'purple' };
  if(nombre.includes('despedrado') || nombre.includes('descomp') || nombre.includes('prepar')) return { icon: 'ti-tractor', color: 'gray' };

  return { icon: 'ti-checklist', color: '' };
}

// === AUTH ===
async function login(){
  const email = document.getElementById('inputEmail').value.trim().toLowerCase();
  const pass = document.getElementById('inputPass').value;
  const errBox = document.getElementById('loginError');
  const loadBox = document.getElementById('loginLoading');
  const btn = document.getElementById('btnLogin');

  errBox.style.display = 'none';
  if(!email || !pass){
    errBox.textContent = 'Ingresa email y contraseña';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  loadBox.style.display = 'block';

  try {
    const { error: authErr } = await sb.auth.signInWithPassword({ email, password: pass });
    if(authErr) throw authErr;

    const { data: perfil, error: e2 } = await sb.from('user_perfiles').select('*').eq('email', email).maybeSingle();
    if(e2 || !perfil) throw new Error('Tu usuario no tiene perfil configurado');
    if(!perfil.activo) throw new Error('Tu usuario está desactivado');
    if(!perfil.rol_avc) throw new Error('Tu usuario no tiene rol asignado');

    usuario = perfil;
    sessionStorage.setItem('usuario', JSON.stringify(perfil));
    await iniciarApp();

  } catch(err){
    errBox.textContent = err.message || 'Error de autenticación';
    errBox.style.display = 'block';
    btn.disabled = false;
    loadBox.style.display = 'none';
  }
}

async function logout(){
  detenerPollingNotif();
  await sb.auth.signOut();
  sessionStorage.clear();
  usuario = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('inputPass').value = '';
  document.getElementById('btnLogin').disabled = false;
  document.getElementById('loginLoading').style.display = 'none';
}

// === CARGA INICIAL ===
async function iniciarApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  await cargarMaestros();
  routerPorRol();
  iniciarPollingNotif();
  
  // Disparar evento para inicializaciones que dependen de usuario logueado (push, etc.)
  window.dispatchEvent(new CustomEvent('csia-usuario-listo'));
}

async function cargarMaestros(){
  // 1. Catálogo completo de actividades (para resolver nombres)
  const { data: acts } = await sb.from('avc_actividades').select('*').eq('activa', true).order('codigo_actividad');
  actividadesAll = acts || [];

  // 1.b Catálogo de procesos (para el selector previo del jefe)
  const { data: procs } = await sb.from('avc_procesos').select('*').order('codigo_macroproceso').order('codigo_proceso');
  procesosAll = procs || [];

  // 2. Plantíos (lotes) - filtrados por permisos si es usuario regular
  const esAdmin = usuario.rol_avc === 'admin' || usuario.rol_avc === 'programador';
  let queryP = sb.from('maestro_plantios').select('finca_lote, finca, descripcion_finca, area_ha, variedad, tipo_riego, jefe_distrito, encargado_finca, distrito');

  if(!esAdmin){
    // Encargado: solo sus fincas. Supervisor: todas (cruza distritos). Jefe: las de su distrito.
    if(usuario.rol_avc === 'encargado_finca'){
      queryP = queryP.eq('encargado_finca', usuario.nombre_completo);
    } else if(usuario.rol_avc === 'jefe_distrito'){
      queryP = queryP.eq('jefe_distrito', usuario.nombre_completo);
    }
    // supervisor_actividad ve todo, filtrado luego por actividad
  }

  const { data: pl } = await queryP;
  plantios = pl || [];

  // 3. Permisos de actividades (para supervisores y encargados)
  if(esAdmin){
    actividadesPerm = actividadesAll;
  } else {
    const { data: ua } = await sb.from('avc_usuario_actividades')
      .select('codigo_actividad, avc_actividades(*)')
      .eq('email', usuario.email);
    actividadesPerm = (ua || []).map(r => r.avc_actividades).filter(a => a && a.activa);
  }

  // 4. Armar jerarquía completa (necesaria para vista del jefe y "asignar a quién")
  await cargarJerarquia();
}

async function cargarJerarquia(){
  // Traer todos los plantios (sin filtro, para construir el árbol)
  // Pero solo si soy admin o jefe - para encargados/supervisores no es necesario
  if(!['admin','programador','jefe_distrito','supervisor_actividad'].includes(usuario.rol_avc)) return;

  const { data: all } = await sb.from('maestro_plantios')
    .select('finca, descripcion_finca, lote, tipo_riego, jefe_distrito, encargado_finca, distrito')
    .not('jefe_distrito','is',null)
    .not('encargado_finca','is',null);

  // Traer emails de encargados (cross-ref nombre -> email)
  const { data: encUsers } = await sb.from('user_perfiles')
    .select('email, nombre_completo')
    .eq('rol_avc', 'encargado_finca')
    .eq('activo', true);
  const encMap = {};
  (encUsers || []).forEach(u => { encMap[u.nombre_completo] = u.email; });

  jerarquia = {};
  (all || []).forEach(p => {
    if(!jerarquia[p.distrito]){
      jerarquia[p.distrito] = { jefe: p.jefe_distrito, encargados: {} };
    }
    const d = jerarquia[p.distrito];
    if(!d.encargados[p.encargado_finca]){
      d.encargados[p.encargado_finca] = {
        nombre: p.encargado_finca,
        email: encMap[p.encargado_finca] || null,
        fincas: {}
      };
    }
    const e = d.encargados[p.encargado_finca];
    if(!e.fincas[p.finca]){
      e.fincas[p.finca] = {
        codigo: p.finca,
        nombre: p.descripcion_finca,
        tipo_riego: p.tipo_riego,
        lotes: []
      };
    }
    e.fincas[p.finca].lotes.push(p.lote);
  });

  // Convertir Maps a Arrays para fácil iteración
  Object.values(jerarquia).forEach(d => {
    d.encargados = Object.values(d.encargados);
    d.encargados.forEach(e => {
      e.fincas = Object.values(e.fincas);
      e.fincas.forEach(f => f.lotes.sort((a,b)=>a-b));
    });
    d.encargados.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  });
}

function routerPorRol(){
  if(usuario.rol_avc === 'jefe_distrito')           renderJefe();
  else if(usuario.rol_avc === 'encargado_finca')    renderEncargado();
  else if(usuario.rol_avc === 'supervisor_actividad')renderSupervisor();
  else if(usuario.rol_avc === 'operador_campo')     renderOperadorCampo();
  else if(usuario.rol_avc === 'digitador_riegos')   renderDigitadorRiegos();
  else if(usuario.rol_avc === 'operador_riegos')    renderOperadorRiegos();
  else if(usuario.rol_avc === 'admin' || usuario.rol_avc === 'programador') renderAdmin();
  else {
    document.getElementById('appBody').innerHTML = `<div class="empty">Tu rol "${usuario.rol_avc}" todavía no tiene vista en CSIA Campo. Usa la app de captura tradicional.</div>`;
    renderHeader();
  }
}

      <text x="10.5" y="25">S</text>
      <text x="27.5" y="25">A</text>
    </g>
    <g transform="translate(23,20)">
      <rect x="-1.2" y="-5" width="2.4" height="10" rx="0.5" fill="#FFFFFF"/>
      <rect x="-1.2" y="-2.5" width="2.4" height="0.6" fill="#0F6E56"/>
      <rect x="-1.2" y="0" width="2.4" height="0.6" fill="#0F6E56"/>
      <rect x="-1.2" y="2.5" width="2.4" height="0.6" fill="#0F6E56"/>
    </g>
  </svg>`;

  document.getElementById('appHeader').innerHTML = `
    <div class="header-top">

      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i>Salir</button>

function encontrarDistritoDeEncargado(nombre){
  for(const [d, info] of Object.entries(jerarquia)){
    if(info.encargados.some(e => e.nombre === nombre)) return d;
  }
  return null;
}

function renderTabs(tabs){
  return `<div class="tabs">${tabs.map(t =>
    `<button class="tab ${currentTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join('')}</div>`;
}

function setTab(t){
  currentTab = t;
  routerPorRol();
}

async function renderJefe(){
  if(!currentTab) currentTab = 'distrito';
  const tabs = [
    {id:'distrito', label:'Mi distrito'},
    {id:'programar', label:'Programar'},
    {id:'historial', label:'Historial'}
  ];

async function renderJefeDistrito(){
  const distritoNombre = encontrarDistritoDeJefe(usuario.nombre_completo);
  if(!distritoNombre) return '<div class="empty">No se encontró tu distrito en maestro_plantios.</div>';

  const distrito = jerarquia[distritoNombre];
  const hoy = hoyISO();

  // Programaciones del día de mis encargados (no eliminadas)
  const emailsEnc = distrito.encargados.map(e => e.email).filter(Boolean);
  let progHoy = [];
  if(emailsEnc.length > 0){
    const { data } = await sb.from('avc_programacion')
      .select('*')
      .eq('fecha', hoy)
      .eq('eliminada', false)
      .in('email_encargado', emailsEnc);
    progHoy = data || [];
  }

  // Estadísticas
  const total = progHoy.length;
  const completadas = progHoy.filter(p => p.estado === 'completada' || p.estado === 'modificada').length;
  const haPlan = progHoy.reduce((s,p) => s + parseFloat(p.ha_plan || 0), 0);
  const haReal = progHoy.reduce((s,p) => s + parseFloat(p.ha_real || 0), 0);
  const cumpl = total > 0 ? Math.round((completadas / total) * 100) : 0;

  // Resumen por encargado
  const resumen = distrito.encargados.map(e => {
    const ops = progHoy.filter(p => p.email_encargado === e.email);
    const compl = ops.filter(p => p.estado === 'completada' || p.estado === 'modificada').length;
    const enCurso = ops.filter(p => p.estado === 'en_curso' || p.estado === 'esperando_encargado' || p.estado === 'esperando_supervisor').length;
    const pend = ops.filter(p => p.estado === 'planificado' || p.estado === 'pendiente').length;
    const haOk = ops.filter(p => p.estado === 'completada').reduce((s,p) => s + parseFloat(p.ha_real || 0), 0);
    const haPr = ops.reduce((s,p) => s + parseFloat(p.ha_plan || 0), 0);
    let semaforo = 'ok';
    if(ops.length === 0) semaforo = ops.length === 0 && pend === 0 ? 'critico' : 'critico';
    else if(compl + enCurso < ops.length * 0.5) semaforo = 'alerta';
    if(ops.length === 0 && pend === 0) semaforo = 'critico';
    return {
      ...e,
      total: ops.length,
      completadas: compl,
      en_curso: enCurso,
      pendientes: pend,
      ha_real: haOk,
      ha_plan: haPr,
      semaforo
    };
  });

  let html = `
    <div class="banner">
      <div class="banner-lbl">${distritoNombre} · ${distrito.encargados.length} encargados</div>
      <div class="banner-txt">Avance del día en tiempo real</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Tareas</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-lbl">HA hoy</div><div class="stat-val">${haReal.toFixed(1)}</div></div>
      <div class="stat"><div class="stat-lbl">Cumpl.</div><div class="stat-val ${cumpl>=70?'ok':cumpl>=40?'warn':'danger'}">${cumpl}%</div></div>
    </div>
    <div class="sec-h"><span>Mis encargados</span><span style="font-weight:400;color:#9ca3af">${haReal.toFixed(1)} / ${haPlan.toFixed(1)} ha</span></div>
  `;

  if(resumen.length === 0){
    html += '<div class="empty"><i class="ti ti-users-group"></i>No hay encargados registrados en tu distrito.</div>';
  } else {
    resumen.forEach(e => {
      const porc = e.total > 0 ? Math.round(((e.completadas + e.en_curso) / e.total) * 100) : 0;
      const fincas = e.fincas.map(f => f.nombre).join(', ');
      const iniciales = e.nombre.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
      const semColor = e.semaforo === 'ok' ? '#1D9E75' : e.semaforo === 'alerta' ? '#EF9F27' : '#E24B4A';
      html += `<div class="tarea-card" style="border-left:3px solid ${semColor}" onclick="modalEncargado('${e.nombre.replace(/'/g,"\\'")}')">
        <div class="tarea-head">
          <div class="tarea-left">
            <div class="tarea-icon" style="background:#E1F5EE"><span style="font-size:13px;font-weight:600;color:#0F6E56">${iniciales}</span></div>
            <div class="tarea-info">
              <div class="tarea-title">${e.nombre}</div>
              <div class="tarea-sub" style="margin-top:0">${fincas}</div>
            </div>
          </div>
          <div class="dot ${e.semaforo}"></div>
        </div>
        <div class="prog"><div class="prog-fill ${e.semaforo==='alerta'?'warn':''} ${e.semaforo==='critico'?'danger':''}" style="width:${porc}%"></div></div>
        <div class="tarea-meta">
          ${e.total === 0 ? 'Sin tareas hoy' : `${e.completadas} compl · ${e.en_curso} en curso${e.pendientes?` · ${e.pendientes} pend`:''} · ${e.ha_real.toFixed(1)}/${e.ha_plan.toFixed(1)} ha`}
        </div>
      </div>`;
    });
  }

  html += `<button class="btn btn-primary" style="margin-top:14px" onclick="setTab('programar')"><i class="ti ti-plus"></i>Programar nueva tarea</button>`;
  return html;
}

function encontrarDistritoDeJefe(nombre){
  for(const [d, info] of Object.entries(jerarquia)){
    if(info.jefe === nombre) return d;
  }
  return null;
}

async function modalEncargado(nombre){
  const distritoNombre = encontrarDistritoDeJefe(usuario.nombre_completo);
  const enc = jerarquia[distritoNombre].encargados.find(e => e.nombre === nombre);
  if(!enc) return;

  const hoy = hoyISO();
  let progHoy = [];
  if(enc.email){
    const { data } = await sb.from('avc_programacion')
      .select('*')
      .eq('fecha', hoy)
      .eq('email_encargado', enc.email)
      .eq('eliminada', false)
      .order('hora_programada', { nullsFirst: false });
    progHoy = data || [];
  }

  let listaHTML = '<div class="empty"><i class="ti ti-calendar-off"></i>Sin tareas programadas hoy</div>';
  if(progHoy.length > 0){
    listaHTML = progHoy.map(p => {
      const ico = iconoActividad(p.codigo_actividad);
      return `
        <div class="tarea-card estado-${p.estado}" style="margin-bottom:6px">
          <div class="tarea-head">
            <div class="tarea-left">
              <div class="tarea-icon ${ico.color}"><i class="ti ${ico.icon}"></i></div>
              <div class="tarea-info">
                ${p.hora_programada ? `<div class="tarea-hora">${p.hora_programada}</div>` : ''}
                <div class="tarea-title" style="font-size:13px">${actNombre(p.codigo_actividad)}</div>
              </div>
            </div>
            ${badge(p.estado)}
          </div>
          <div class="tarea-sub">${p.finca_lote} · plan ${p.ha_plan} ha${p.ha_real?` · real ${p.ha_real} ha`:''}</div>
        </div>
      `;
    }).join('');
  }

  modalContent = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${enc.nombre}</h2>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">${enc.fincas.map(f=>f.nombre).join(', ')}</div>
    ${listaHTML}
  `;
  showModal();
}

async function renderJefeProgramar(){
  const distritoNombre = encontrarDistritoDeJefe(usuario.nombre_completo);
  if(!distritoNombre) return '<div class="empty">No se encontró tu distrito.</div>';

  const distrito = jerarquia[distritoNombre];
  const fechaDefault = hoyISO();

  // Listado de actividades programables.
  // Incluimos los fertirriegos solo si están enlazados a 'avc_riego_goteo'
  // (subactividades del proceso RIEGO GOTEO). Los demás fertirriegos antiguos
  // (sin requiere_detalle) se siguen excluyendo porque tienen su propio flujo.
  const actsProg = actividadesAll.filter(a =>
    !a.es_fertirriego || a.requiere_detalle === 'avc_riego_goteo'
  );
  // Guardar para que onProcesoChange lo encuentre
  window.__actsProgramables = actsProg;

  // Lista plana de lotes del distrito + lista de fincas
  const todosLotes = [];
  const fincasMap = {}; // nombre -> {nombre, codigo}
  distrito.encargados.forEach(e => {
    e.fincas.forEach(f => {
      if(!fincasMap[f.nombre]) fincasMap[f.nombre] = {nombre: f.nombre, codigo: f.codigo};
      f.lotes.forEach(l => {
        todosLotes.push({
          finca_lote: f.codigo + l,
          finca_nombre: f.nombre,
          lote_num: l,
          display: `${f.nombre} · Lote ${l}`,
          tipo_riego: f.tipo_riego,
          encargado_nombre: e.nombre,
          encargado_email: e.email,
          area_ha: (plantios.find(p => p.finca_lote === f.codigo + l) || {}).area_ha
        });
      });
    });
  });
  todosLotes.sort((a,b) => a.display.localeCompare(b.display));
  const fincasOrdenadas = Object.values(fincasMap).sort((a,b) => a.nombre.localeCompare(b.nombre));
  
  // Guardar para acceso desde onFincaChange
  window._progLotes = todosLotes;

  return `
    <div class="banner amber">
      <div class="banner-lbl">Programar nueva tarea</div>
      <div class="banner-txt">La app deducirá automáticamente a quién asignar según el lote y la actividad</div>
    </div>
    <div class="card">
      <div class="card-title">Datos de la tarea</div>
      <div class="field-row">
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="progFecha" value="${fechaDefault}"/>
        </div>
        <div class="field">
          <label>Prioridad</label>
          <select id="progPrioridad">
            <option value="media" selected>Media</option>
            <option value="alta">Alta</option>
            <option value="baja">Baja</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Finca</label>
          <select id="progFinca" onchange="onFincaChange()">
            <option value="">Seleccionar finca...</option>
            ${fincasOrdenadas.map(f => `<option value="${f.nombre}">${f.nombre}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Lote</label>
          <select id="progLote" onchange="onLoteChange()" disabled>
            <option value="">Elige una finca primero</option>
          </select>
        </div>
      </div>
      <div class="field-help" id="loteInfo" style="display:none;margin-top:-8px;margin-bottom:14px"></div>
      <div class="field">
        <label>Proceso</label>
        <select id="progProceso" onchange="onProcesoChange()">
          <option value="">Seleccionar proceso...</option>
          ${(() => {
            // Procesos únicos que tienen al menos una actividad programable (no fertirriego)
            const procsConActs = new Set(actsProg.map(a => `${a.codigo_macroproceso}-${a.codigo_proceso}`));
            return procesosAll
              .filter(p => procsConActs.has(`${p.codigo_macroproceso}-${p.codigo_proceso}`))
              .map(p => `<option value="${p.codigo_macroproceso}-${p.codigo_proceso}">${p.nombre}</option>`)
              .join('');
          })()}
        </select>

// Cache: { codigo_actividad: 'email_supervisor' } para deducción instantánea
let mapaActividadSupervisor = null;

async function cargarMapaActividadSupervisor(){
  if(mapaActividadSupervisor !== null) return mapaActividadSupervisor;
  const { data, error } = await sb.from('avc_usuario_actividades')
    .select('email, codigo_actividad, user_perfiles!inner(nombre_completo, cargo, rol_avc, activo, estacion_default)');
  if(error){ console.error('Error cargando supervisores:', error); mapaActividadSupervisor = {}; return mapaActividadSupervisor; }
  
  const m = {};
  // Para goteo: mapa especial { codigo_actividad: { fincaNombre: ejecutor } }
  // resuelto al saber qué finca está eligiendo el jefe
  const goteoPorOperador = []; // [{email, nombre, cargo, estacion_default, codigo_actividad}]
  
  const rolesEjecutorUnico = new Set([
    'supervisor_actividad',
    'operador_campo',
    'operador_riegos',
    'digitador_riegos'
  ]);
  (data||[]).forEach(r => {
    if(r.user_perfiles && rolesEjecutorUnico.has(r.user_perfiles.rol_avc) && r.user_perfiles.activo){
      // Para operadores de riegos (goteo), guardamos por estación
      if(r.user_perfiles.rol_avc === 'operador_riegos'){
        goteoPorOperador.push({
          email: r.email,
          nombre: r.user_perfiles.nombre_completo,
          cargo: r.user_perfiles.cargo,
          estacion_default: r.user_perfiles.estacion_default,
          codigo_actividad: r.codigo_actividad
        });
      } else {
        // Para el resto, tomamos el primero (1:1)
        m[r.codigo_actividad] = {
          email: r.email,
          nombre: r.user_perfiles.nombre_completo,
          cargo: r.user_perfiles.cargo
        };
      }
    }
  });
  mapaActividadSupervisor = m;
  // Cache aparte para goteo
  window.__operadoresGoteo = goteoPorOperador;
  return m;
}

// Resuelve qué operador de goteo está asignado a la estación que cubre la finca dada
async function resolverOperadorGoteo(codigoActividad, fincaNombre){
  if(!window.__operadoresGoteo || window.__operadoresGoteo.length === 0) return null;
  if(!fincaNombre) return null;

  // 1. Buscar la estación que cubre esa finca
  const { data: estacionFincas, error } = await sb.from('pm_estacion_fincas')
    .select('estacion_id, finca_nombre, pm_estaciones_riego(nombre)')
    .ilike('finca_nombre', fincaNombre);
  if(error || !estacionFincas || estacionFincas.length === 0){
    return null;
  }
  const estacionId = estacionFincas[0].estacion_id;
  const estacionNombre = estacionFincas[0].pm_estaciones_riego ? estacionFincas[0].pm_estaciones_riego.nombre : '';

  // 2. Buscar operador con esa estación y permiso para esa actividad
  const op = window.__operadoresGoteo.find(o =>
    o.estacion_default === estacionId && o.codigo_actividad === codigoActividad
  );
  if(!op) return null;

  return {
    email: op.email,
    nombre: op.nombre,
    cargo: op.cargo,
    estacion_nombre: estacionNombre,
    estacion_id: estacionId
  };
}

// Cache de mezclas activas y sus productos
let mezclasCache = null;

async function cargarMezclas(){
  if(mezclasCache !== null) return mezclasCache;
  
  // Query 1: mezclas activas
  const { data: mezclas, error: e1 } = await sb.from('avc_mezclas')
    .select('id, nombre, descripcion')
    .eq('activa', true)
    .order('nombre');
  
  if(e1){ console.error('Error cargando mezclas:', e1); mezclasCache = []; return mezclasCache; }
  
  // Query 2: relación mezcla-producto (sin join)
  const { data: relaciones, error: e2 } = await sb.from('avc_mezcla_productos')
    .select('mezcla_id, producto_id, dosis_default, orden')
    .order('orden');
  
  if(e2){ console.error('Error cargando relaciones:', e2); mezclasCache = []; return mezclasCache; }
  
  // Query 3: productos
  const { data: productos, error: e3 } = await sb.from('avc_productos')
    .select('id, nombre, unidad_medida')
    .eq('activo', true);
  
  if(e3){ console.error('Error cargando productos:', e3); mezclasCache = []; return mezclasCache; }
  
  // Indexar productos por id
  const productosById = {};
  (productos || []).forEach(p => { productosById[p.id] = p; });
  
  // Ensamblar
  mezclasCache = (mezclas || []).map(m => ({
    id: m.id,
    nombre: m.nombre,
    descripcion: m.descripcion,
    productos: (relaciones || [])
      .filter(r => r.mezcla_id === m.id)
      .map(r => {
        const prod = productosById[r.producto_id];
        return {
          producto_id: r.producto_id,
          nombre: prod ? prod.nombre : `Producto ${r.producto_id}`,
          unidad: prod ? prod.unidad_medida : '',
          dosis_default: parseFloat(r.dosis_default),
          orden: r.orden
        };
      })
      .sort((a,b) => (a.orden || 0) - (b.orden || 0))
  }));
  
  console.log('Mezclas cargadas:', mezclasCache.length, mezclasCache);
  return mezclasCache;
}

function onFincaChange(){
  const fincaSel = document.getElementById('progFinca');
  const loteSel = document.getElementById('progLote');
  const info = document.getElementById('loteInfo');
  const finca = fincaSel.value;
  
  // Reset lote
  loteSel.innerHTML = '<option value="">Seleccionar lote...</option>';
  if(info) info.style.display = 'none';
  
  if(!finca){
    loteSel.disabled = true;
    loteSel.innerHTML = '<option value="">Elige una finca primero</option>';
    actualizarBloqueAsignacion();
    return;
  }
  
  // Recuperar todos los lotes desde la variable global
  const todosLotes = window._progLotes || [];
  
  // Filtrar por finca
  const lotesFinca = todosLotes
    .filter(l => l.finca_nombre === finca)
    .sort((a,b) => {
      // Orden numérico de "Lote N"
      const an = parseInt(String(a.lote_num).replace(/\D/g,'')) || 0;
      const bn = parseInt(String(b.lote_num).replace(/\D/g,'')) || 0;
      return an - bn;
    });
  
  if(lotesFinca.length === 0){
    loteSel.disabled = true;
    loteSel.innerHTML = '<option value="">Sin lotes en esta finca</option>';
    actualizarBloqueAsignacion();
    return;
  }
  
  loteSel.disabled = false;
  loteSel.innerHTML = '<option value="">Seleccionar lote...</option>' + lotesFinca.map(l => 
    `<option value="${l.finca_lote}" data-encargado-nombre="${l.encargado_nombre}" data-encargado-email="${l.encargado_email || ''}" data-area="${l.area_ha || ''}">Lote ${l.lote_num}${l.area_ha ? ` (${l.area_ha} ha)`:''}</option>`
  ).join('');
  
  actualizarBloqueAsignacion();
}

async function onProcesoChange(){
  const procSel = document.getElementById('progProceso');
  const actSel = document.getElementById('progActividad');
  if(!procSel || !actSel) return;

  const valor = procSel.value; // "macro-proc" ej "1-6"
  if(!valor){
    actSel.innerHTML = '<option value="">Primero elige un proceso</option>';
    actSel.disabled = true;
    actSel.value = '';
    // Resetear todo lo que dependa de la actividad
    await onActividadChange();
    return;
  }

  const [macro, proc] = valor.split('-').map(n => parseInt(n));
  const actsProg = window.__actsProgramables || actividadesAll.filter(a => !a.es_fertirriego);
  const filtered = actsProg.filter(a =>
    a.codigo_macroproceso === macro && a.codigo_proceso === proc
  );

  if(filtered.length === 0){
    actSel.innerHTML = '<option value="">No hay actividades en este proceso</option>';
    actSel.disabled = true;
  } else {
    actSel.innerHTML = '<option value="">Seleccionar actividad...</option>' +
      filtered.map(a => `<option value="${a.codigo_actividad}">${a.codigo_actividad} · ${a.nombre_actividad}</option>`).join('');
    actSel.disabled = false;
  }
  actSel.value = '';
  // Disparar el reset de bloques dependientes
  await onActividadChange();

async function onActividadChange(){
  const cod = parseInt(document.getElementById('progActividad').value);
  const lbl = document.getElementById('progMetricaLbl');
  const helpEl = document.getElementById('progMetricaHelp');
  const row = document.getElementById('progMetricaRow');
  const extras = document.getElementById('progExtras');

  if(!cod){ 
    if(lbl) lbl.textContent = 'HA proyectadas';
    if(helpEl) helpEl.style.display = 'none';
    if(row) row.style.display = 'grid';
    if(extras) extras.innerHTML = '';
    const pf = document.getElementById('progPersonalField');
    if(pf) pf.style.display = '';
    actualizarBloqueAsignacion();
    return; 
  }

  // Métrica dinámica según tipo_captura
  const act = actividadesAll.find(a => a.codigo_actividad === cod);
  if(act && lbl && helpEl && row){
    const tipo = act.tipo_captura;
    row.style.display = 'grid';
    helpEl.style.display = 'none';
    if(tipo === 'MTS'){
      lbl.textContent = 'Metros proyectados';
      helpEl.textContent = 'Esta actividad se mide en metros (drenajes/cercos).';
      helpEl.style.display = 'block';
    } else if(tipo === 'NINGUNA'){
      lbl.textContent = 'Estimado de avance (referencial)';
      helpEl.textContent = 'Esta actividad no requiere métrica de avance. Puedes dejar 0.';
      helpEl.style.display = 'block';
    } else {
      lbl.textContent = 'HA proyectadas';
    }
  }

  // Ocultar/mostrar campo Personal según requiere_personal
  const persoField = document.getElementById('progPersonalField');
  const persoInput = document.getElementById('progPersonal');
  if(persoField && act){
    if(act.requiere_personal === false){
      persoField.style.display = 'none';
      if(persoInput) persoInput.value = '0';
    } else {
      persoField.style.display = '';
    }
  }

  // Campos extras según tipo_captura
  if(act && extras){
    let html = armarCamposExtrasJefe(act);
    
    // Si es EXTERNA, también agrega el bloque PM (mezcla + jornada)
    if(act.modelo_comparticion === 'EXTERNA'){
      const mezclas = await cargarMezclas();
      html += armarBloqueJefeEXTERNA(mezclas);
    }
    
    extras.innerHTML = html;
  }

  // Cargar mapa de supervisores si aún no está
  await cargarMapaActividadSupervisor();

  actualizarBloqueAsignacion();
}

function actualizarBloqueAsignacion(){
  const box = document.getElementById('progAsignacion');
  const loteSel = document.getElementById('progLote');
  const actSel = document.getElementById('progActividad');
  const btnProg = document.getElementById('btnProg');
  if(!box) return;

  const cod = parseInt(actSel.value);
  const loteOpt = loteSel.options[loteSel.selectedIndex];
  const hayLote = loteOpt && loteOpt.value;
  const hayAct = !!cod;

  // Si falta algo, ocultar el bloque
  if(!hayLote || !hayAct){
    box.style.display = 'none';
    if(btnProg) btnProg.disabled = false;
    return;
  }

  // Datos del lote
  const encNombre = loteOpt.getAttribute('data-encargado-nombre');
  const encEmail = loteOpt.getAttribute('data-encargado-email');

  // Datos de la actividad
  const act = actividadesAll.find(a => a.codigo_actividad === cod);
  if(!act){ box.style.display = 'none'; return; }
  const modelo = act.modelo_comparticion;
  let supInfo = mapaActividadSupervisor ? mapaActividadSupervisor[cod] : null;

  // CASO ESPECIAL: riego goteo (operador por estación según finca)
  // resolverOperadorGoteo es async, así que lo invocamos por separado y
  // re-renderizamos cuando llegue el resultado.
  if(act.requiere_detalle === 'avc_riego_goteo'){
    const fincaLote = loteOpt.value;
    const reg = plantios.find(p => p.finca_lote === fincaLote);
    const fincaNombre = reg ? reg.descripcion_finca : null;
    if(fincaNombre){
      resolverOperadorGoteo(cod, fincaNombre).then(opInfo => {
        if(opInfo){
          // Inyectar en el mapa para que guardarProgramacion lo encuentre
          mapaActividadSupervisor[cod] = {
            email: opInfo.email,
            nombre: opInfo.nombre,
            cargo: opInfo.cargo
          };
          // Re-render manual del bloque con esta info
          renderizarBloqueOperadorGoteo(box, opInfo, btnProg);
        } else {
          // No hay operador asignado a esa estación
